                onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()} onPointerDown={e=>e.stopPropagation()}>
                <span style={{fontSize:P(20*fs),fontWeight:700,color:'#aaa',letterSpacing:1.5,textTransform:'uppercase'}}>MODEL</span>
                <ModelDropdown value={nd.model} onChange={v=>updateNode(nd.id,{model:v})}
                  models={MODELS} nodeBg={t.nodeBg} accent={t.accent} color={t.text} zoom={zoom}
                  fontSize={P(20*fs)} dotSize={dotSz}/>
              </div>
            )}
            {nd.h>=THRESH_PROMPT_BODY?
              (()=>{
                /* Show multi-line prompt until 75% display zoom (0.306),
                   then collapse to single-line in deeper compact */
                const multiLine=zoom>=0.306;
                return <div style={{flex:1,margin:`0 ${P(32*pd)}px`,padding:`${P(12*pd)}px 0`,overflow:'hidden'}}>
                  <div style={{fontSize:P(26*fs),lineHeight:1.35,color:isErr?'#cc9999':t.text+'aa',
                    overflow:'hidden',textOverflow:'ellipsis',
                    whiteSpace:multiLine?'pre-wrap':'nowrap',
                    wordBreak:multiLine?'break-word':'normal'}}>{nd.prompt}</div>
                </div>;
              })()
              :<div style={{flex:1,background:isErr?'#2a1414':t.nodeBg}}/>}
          </>};

          const renderFull=()=>{
            const compact=nd.w<THRESH_WIDTH_COMPACT;
            const P=Math.round; /* shorthand for rounding scaled values */
            const hdrH=P(80*pd), hdrPad=P(32*pd), hdrGap=P(14*pd);
            const btnSz=P(44*pd), dotSz=P(12*pd), badgePad=`${P(6*pd)}px ${P(14*pd)}px`;
            const secPad=compact?`${P(16*pd)}px ${P(20*pd)}px`:`${P(22*pd)}px ${P(32*pd)}px`;
            const mx=P((compact?20:32)*pd);
            const promptPadTop=compact?`${P(18*pd)}px ${P(20*pd)}px 0`:`${P(26*pd)}px ${P(32*pd)}px 0`;
            return <>
            <div data-nheader="1" style={{height:hdrH,background:isErr?'#2a1414':t.headerBg,display:'flex',
              alignItems:'center',padding:`0 ${hdrPad}px`,gap:hdrGap,
              borderBottom:`1px solid ${isErr?'#cc333344':t.accent+'22'}`,flexShrink:0}}>
              <div style={{width:dotSz,height:dotSz,borderRadius:dotSz/2,flexShrink:0,
                background:isErr?'#cc3333':t.accent,
                boxShadow:`0 0 ${P(8*pd)}px ${isErr?'#cc333388':t.accent+'88'}`}}/>
              <span style={{flex:1,color:isErr?'#ff6666':t.text,fontSize:P(28*fs),fontWeight:600,overflow:'hidden',
                textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{nd.label}</span>
              {nd.auth&&<span style={{cursor:'default'}}
                onMouseEnter={e=>{if(window._tipTimer)clearTimeout(window._tipTimer);const r=e.currentTarget.getBoundingClientRect();setBadgeTip({type:'auth',x:r.right,y:r.bottom,perms:nd.authPerms||[]})}}
                onMouseLeave={()=>{window._tipTimer=setTimeout(()=>setBadgeTip(null),150)}}>
                <span style={{fontSize:P(20*fs),fontWeight:700,background:'#d4a03033',
                  color:'#d4a030',padding:badgePad,borderRadius:P(5*pd),letterSpacing:1}}>AUTH</span>
              </span>}
              {isErr&&<span style={{cursor:'default'}}
                onMouseEnter={e=>{if(window._tipTimer)clearTimeout(window._tipTimer);const r=e.currentTarget.getBoundingClientRect();setBadgeTip({type:'error',x:r.right,y:r.bottom,errorInfo:nd.errorInfo})}}
                onMouseLeave={()=>{window._tipTimer=setTimeout(()=>setBadgeTip(null),150)}}>
                <span style={{fontSize:P(20*fs),fontWeight:700,background:'#cc333333',
                  color:'#ff6666',padding:badgePad,borderRadius:P(5*pd),letterSpacing:1}}>ERROR</span>
              </span>}
              <button onClick={e=>{e.stopPropagation();updateNode(nd.id,{status:nd.status==='ok'?'error':'ok'})}}
                onMouseDown={e=>e.stopPropagation()}
                style={{background:t.accent+'15',border:`1px solid ${t.accent}44`,color:isErr?'#cc3333':t.accent,
                  fontSize:P(28*fs),cursor:'pointer',padding:0,lineHeight:1,width:btnSz,height:btnSz,
                  display:'flex',alignItems:'center',justifyContent:'center',borderRadius:P(8*pd),
                  opacity:0.7,transition:'opacity 0.15s, background 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.background=t.accent+'33'}}
                onMouseLeave={e=>{e.currentTarget.style.opacity='0.7';e.currentTarget.style.background=t.accent+'15'}}>{isErr?'⚠':'✓'}</button>
              <button onClick={e=>{e.stopPropagation();requestDelete(nd.id)}}
                onMouseDown={e=>e.stopPropagation()}
                style={{background:t.accent+'15',border:`1px solid ${t.accent}44`,color:t.text,
                  fontSize:P(28*fs),cursor:'pointer',padding:0,lineHeight:1,width:btnSz,height:btnSz,
                  display:'flex',alignItems:'center',justifyContent:'center',borderRadius:P(8*pd),
                  opacity:0.7,transition:'opacity 0.15s, background 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.background=t.accent+'33'}}
                onMouseLeave={e=>{e.currentTarget.style.opacity='0.7';e.currentTarget.style.background=t.accent+'15'}}>✕</button>
            </div>
            {nd.h>=THRESH_MODEL&&(
              <div style={{padding:secPad,borderBottom:`1px solid ${isErr?'#cc333322':t.accent+'15'}`,
                display:'flex',alignItems:'center',gap:P(16*pd),flexShrink:0,overflow:'hidden'}}
                onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()} onPointerDown={e=>e.stopPropagation()}>
                <span style={{fontSize:P(20*fs),fontWeight:700,color:'#aaa',letterSpacing:1.5,textTransform:'uppercase'}}>MODEL</span>
                <ModelDropdown value={nd.model} onChange={v=>updateNode(nd.id,{model:v})}
                  models={MODELS} nodeBg={t.nodeBg} accent={t.accent} color={t.text} zoom={zoom}
                  fontSize={P(20*fs)} dotSize={dotSz}/>
              </div>
            )}
            {nd.h>=THRESH_PROMPT_LABEL&&(
              <div style={{padding:promptPadTop,marginBottom:P(10*pd),flexShrink:0,overflow:'hidden'}}>
                <span style={{fontSize:P(20*fs),fontWeight:700,color:'#aaa',letterSpacing:1.5,
                  textTransform:'uppercase',display:'block'}}>BEHAVIOUR PROMPT</span>
              </div>
            )}
            {nd.h>=THRESH_PROMPT_BODY&&(()=>{
              const lineH=Math.ceil(P(26*fs)*1.35);
              const threeLines=lineH*3;
              const isDefault=nd.h<=NH;
              return <div className={sb} data-node-scroll="1"
                style={{flex:isDefault?'none':1,height:isDefault?threeLines:undefined,
                  minHeight:isDefault?undefined:0,
                  overflow:'auto',margin:`0 ${mx}px`,
                  overscrollBehavior:'contain',pointerEvents:'auto'}}>
                <div style={{fontSize:P(26*fs),lineHeight:1.35,color:isErr?'#cc9999':t.text+'cc',
                  whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{nd.prompt}</div>
              </div>;
            })()}
            </>;
          };

          return(
            <div key={nd.id} data-node={nd.id}
              onMouseEnter={()=>setHoverNode(nd.id)}
              onMouseLeave={()=>setHoverNode(h=>h===nd.id?null:h)}
              style={{
              position:'absolute',left:abs.x,top:abs.y,width:lodW,height:lodH,
              background:isErr?'#1a1212':t.nodeBg,
              border:isErr?'2px solid #cc3333':(isSel||hoverNode===nd.id)?'1px solid transparent':`1px solid ${t.accent+'33'}`,
              borderRadius:8,zIndex:isSel?18:12,pointerEvents:'auto',
              display:'flex',flexDirection:'column',cursor:'pointer',
              boxShadow:isErr?'inset 0 0 12px #cc333315':'none',
              transition:gpNode?'background 0.3s ease, border-color 0.3s ease':'none',
              animation:loadPhase<4?(loadPhase>=2?`nodeFadeIn 0.35s ease-out ${nodeDelay}s both`:'none'):isErr?'errorPulse 3s ease infinite':'none',
              opacity:loadPhase<2?0:(selected!==null&&!isSel&&!connectedToSel)?0.45:gSelDimmed?0.35:undefined,
              userSelect:'none',overflow:'visible',
              transition:'border 0.15s, box-shadow 0.15s',
            }}>

              {/* flowing beads border on hover/select/connected */}
              {(hoverNode===nd.id||isSel||connectedToHover||connectedToSel)&&!isErr&&(()=>{
                const intense=isSel||connectedToSel;
                const pad=10;
                return <svg style={{position:'absolute',left:-pad,top:-pad,width:lodW+pad*2,height:lodH+pad*2,pointerEvents:'none',zIndex:30,overflow:'visible'}}>
                  {/* solid cable */}
                  <rect x={pad} y={pad} width={lodW} height={lodH} rx="8" ry="8"
                    fill="none" stroke={t.accent} strokeWidth="3.5"
                    strokeOpacity="0.55"/>
                  {/* flowing beads */}
                  <rect x={pad} y={pad} width={lodW} height={lodH} rx="8" ry="8"
                    fill="none" stroke={t.accent} strokeWidth="5"
                    strokeDasharray="6 20" strokeLinecap="round" opacity="0.8"
                    className="node-border-flow"/>
                </svg>;
              })()}

              {/* INNER CONTENT — LOD dispatch */}
              <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',borderRadius:7}}>
              {lod==='strip'?renderStrip()
                :lod==='minimal'?renderMinimal()
                :lod==='compact'?renderCompact()
                :renderFull()}
              </div>{/* /inner content */}

              {/* PORTS — positioned from immutable port definitions */}
              {(()=>{
                const isW=wiringFrom!==null;
                const isTarget=isW&&wiringFrom.nid!==nd.id;
                const glow=isErr?'#cc3333':t.accent;
                const P=Math.round;
                /* Counter-scale port visuals so they stay clickable at low zoom */
                const pfs=Math.min(fs,2.5);
                const HIT=P(50*pfs);
                const pOuter=P(20*pfs), pInner=P(8*pfs), pBorder=P(3*pfs);
                const pGlow=P(8*pfs);
                const nodePortData=portsByNode[nd.id]||{};
                const ports=[];
                SIDES.forEach(side=>{
                  const slots=nodePortData[side]||[];
                  slots.forEach((slot,si)=>{
                    const isConn=slot.connected;
                    const localX=slot.x-abs.x;
                    const localY=slot.y-abs.y;
                    const col=isConn?(isErr?'#cc3333':t.accent):(isW?t.accent:'#555');
                    ports.push(
                      <div key={slot.id} data-port-id={slot.id} data-port={side} data-nid={nd.id}
                        draggable={false}
                        onDragStart={e=>e.preventDefault()}
                        style={{position:'absolute',left:localX-HIT/2,top:localY-HIT/2,
                          width:HIT,height:HIT,borderRadius:HIT/2,
                          cursor:'crosshair',zIndex:35,display:'flex',alignItems:'center',
                          justifyContent:'center',pointerEvents:'auto'}}>
                        <div style={{width:pOuter,height:pOuter,borderRadius:pOuter/2,
                          border:`${pBorder}px solid ${col}`,
                          background:isConn?col+'22':(isW?col+'33':'transparent'),
                          display:'flex',alignItems:'center',justifyContent:'center',
                          boxShadow:isConn?`0 0 ${pGlow}px ${glow}44`:'none',
                          animation:(!isConn&&isTarget)?'portPulse 1s ease infinite':'none',
                          pointerEvents:'none',
                        }}>
                          <div style={{width:pInner,height:pInner,borderRadius:pInner/2,background:col,
                            pointerEvents:'none'}}/>
                        </div>
                      </div>
                    );
                  });
                });
                return ports;
              })()}
              {nodeResizeHandles(nd.id,nd.w,nd.h,startNResize)}
            </div>
          );
        })}

        {/* SVG WIRE LAYER */}
        {(()=>{
          /* Counter-scale wire thickness so wires stay visible at low zoom */
          const _wd=getDims(zoom);
          const wfs=Math.min(_wd.fs,2.5);
          const wMain=Math.round(3.5*wfs*10)/10;
          const wShadow=Math.round(8*wfs);
          const wHit=Math.round(28*wfs);
          const wFlow=Math.round(4*wfs);
          const wDie=Math.round(4*wfs);
          /* Markers use default markerUnits="strokeWidth" so they scale
             proportionally with the counter-scaled wire strokeWidth */
          return <svg style={{position:'absolute',left:0,top:0,width:1,height:1,
          zIndex:5,pointerEvents:'none',overflow:'visible',
          opacity:loadPhase>=3?1:0,
          animation:loadPhase>=3&&loadPhase<4?'wireFadeIn 0.6s ease-out forwards':'none'}}>
          <defs>
            <marker id="arr" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
              <path d="M0,0 L10,4 L0,8" fill="#666" stroke="none"/></marker>
            <marker id="arr-e" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
              <path d="M0,0 L10,4 L0,8" fill="#cc3333" stroke="none"/></marker>
            {/* Per-color arrow markers so each wire's arrowhead matches its color */}
            {[...new Set(wireData.map(w=>w.accent))].map(c=>(
              <marker key={'arr-'+c} id={'arr-'+c.replace('#','')} markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
                <path d="M0,0 L10,4 L0,8" fill={c} stroke="none"/></marker>
            ))}
            <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>

          {/* DYING WIRES (retract animation) */}
          {dyingWires.map((dw,i)=>(
            <path key={'die-'+i} d={dw.path} fill="none" stroke="#cc3333" strokeWidth={wDie}
              className="wire-dying" strokeLinecap="round" strokeDasharray="1000"/>
          ))}

          {/* ACTIVE WIRES — smooth bezier curves with hover highlight */}
          {wireData.map(wd=>{
            const isHov=hoverWire===wd.i;
            /* When any wire is hovered, dim all others */
            const anyHov=hoverWire!==null;
            /* Highlight if hovered OR selected node is connected */
            const nodeHov=hoverNode!==null&&(wd.src===hoverNode||wd.tgt===hoverNode);
            const nodeSel=selected!==null&&(wd.src===selected||wd.tgt===selected);
            /* Group selection: wire connects to a node in the selected group */
            const groupSel=selectedGroup!==null&&(()=>{
              const gNids=new Set(nodes.filter(n=>n.gid===selectedGroup).map(n=>n.id));
              return gNids.has(wd.src)||gNids.has(wd.tgt);
            })();
            const litStrong=isHov||nodeSel||groupSel; /* click/wire-hover: intensified */
            const litSoft=nodeHov; /* node-hover: keep normal appearance, just don't dim */
            const lit=litStrong||litSoft;
            const anyActive=anyHov||hoverNode!==null||selected!==null||selectedGroup!==null;
            const dim=anyActive&&!lit;
            const mainOpacity=wd.isErr?0.7:dim?0.03:0.55;
            const mainWidth=wMain;
            const flowOpacity=dim?0.03:0.8;
            return(
            <g key={wd.i}
              onMouseEnter={()=>setHoverWire(wd.i)}
              onMouseLeave={()=>setHoverWire(h=>h===wd.i?null:h)}>
              {/* subtle shadow — brighter on hover */}
              <path d={wd.path} fill="none" stroke={wd.isErr?'#cc3333':wd.accent}
                strokeWidth={wShadow} opacity={dim?0.005:0.06}
                pointerEvents="none" strokeLinecap="round"/>
              {/* wide invisible hit area for hover detection */}
              <path d={wd.path} fill="none" stroke="transparent" strokeWidth={wHit}
                style={{pointerEvents:'stroke',cursor:'pointer'}}
                data-wire={wd.i}/>
              {/* main cable */}
              <path d={wd.path} fill="none" stroke={wd.isErr?'#cc3333':wd.accent}
                strokeWidth={mainWidth}
                strokeDasharray={wd.isErr?`${Math.round(6*wfs)} ${Math.round(4*wfs)}`:'none'} strokeOpacity={mainOpacity}
                markerEnd={dim?'none':wd.isErr?'url(#arr-e)':`url(#arr-${wd.accent.replace('#','')})`}
                pointerEvents="none" strokeLinecap="round"
                style={{transition:'stroke-opacity 0.15s, stroke-width 0.15s'}}/>
              {/* dimmed arrowhead — uses opacity so marker dims too */}
              {dim&&<path d={wd.path} fill="none" stroke="transparent" strokeWidth="0.1"
                markerEnd={wd.isErr?'url(#arr-e)':`url(#arr-${wd.accent.replace('#','')})`}
                opacity={0.03}
                pointerEvents="none"/>}
              {/* flow particles */}
              {!wd.isErr&&(
                <path d={wd.path} fill="none" stroke={wd.accent} className="wire-flow"
                  strokeWidth={wFlow} strokeDasharray={`${Math.round(6*wfs)} ${Math.round(20*wfs)}`} opacity={flowOpacity}
                  strokeLinecap="round" pointerEvents="none"
                  style={{transition:'opacity 0.15s'}}/>
              )}
            </g>);
          })}

          {/* TEMPORARY WIRE — uses wiringFrom.portPos (captured at mousedown) */}
          {wiringFrom&&wiringMouse&&wiringFrom.portPos&&(()=>{
            const srcN=nodes.find(n=>n.id===wiringFrom.nid);
            if(!srcN)return null;
            const pp=wiringFrom.portPos;
            const srcTier=tierMap[srcN.gid]||'worker';
            const accent=wiringFrom.isDragDisconnect?'#cc3333':getTheme(srcTier).accent;
            const mx=wiringMouse.x,my=wiringMouse.y;
            /* Use snap target's side if snapped, otherwise opposite of source */
            const tgtSide=wiringMouse.side||oppositeSide(wiringFrom.side);
            /* Direct Bézier preview wire */
            const path=makeSimpleBezier(pp.x,pp.y,mx,my,wiringFrom.side,tgtSide);
            return(
              <g>
                <circle cx={pp.x} cy={pp.y} r={Math.round(8*wfs)} fill={accent} opacity="0.9"/>
                <path d={path} fill="none" stroke={accent} strokeWidth={wMain} opacity="0.7"
                  strokeLinecap="round"
                  strokeDasharray={wiringFrom.isDragDisconnect?`${Math.round(8*wfs)} ${Math.round(6*wfs)}`:'none'}/>
                <circle cx={mx} cy={my} r={Math.round(7*wfs)} fill={accent} opacity="0.6"
                  stroke={accent} strokeWidth={Math.round(2*wfs)} strokeOpacity="0.3"/>
              </g>
            );
          })()}

          {/* DEBUG OVERLAY — press D to toggle. Shows all anchor sources. */}
          {debugPorts&&(()=>{
            const marks=[];
            /* Cyan rings: visible marker centres from portsByNode */
            nodes.forEach(nd=>{
              const np=portsByNode[nd.id];if(!np)return;
              ['right','left','top','bottom'].forEach(side=>{
                (np[side]||[]).forEach((slot,i)=>{
                  marks.push(<circle key={`mc-${nd.id}-${side}-${i}`}
                    cx={slot.x} cy={slot.y} r="6" fill="none" stroke="cyan" strokeWidth="1" opacity="0.9"/>);
                });
              });
            });
            /* Red dots: wire anchors from portMap (src + tgt endpoints) */
            wireData.forEach(wd=>{
              marks.push(<circle key={`ws-${wd.i}`} cx={wd.pA.x} cy={wd.pA.y} r="3" fill="red" opacity="0.8"/>);
              marks.push(<circle key={`wt-${wd.i}`} cx={wd.pB.x} cy={wd.pB.y} r="3" fill="red" opacity="0.8"/>);
            });
            /* Yellow diamond: preview wire anchor from wiringFrom.portPos */
            if(wiringFrom&&wiringFrom.portPos){
              const p=wiringFrom.portPos;
              marks.push(<rect key="prev" x={p.x-4} y={p.y-4} width={8} height={8}
                fill="yellow" opacity="0.9" transform={`rotate(45 ${p.x} ${p.y})`}/>);
            }
            /* Magenta cross: snap target (wiringMouse when snapped to a port) */
            if(wiringFrom&&wiringMouse&&wiringMouse.nid){
              marks.push(<line key="sx" x1={wiringMouse.x-5} y1={wiringMouse.y} x2={wiringMouse.x+5} y2={wiringMouse.y} stroke="magenta" strokeWidth="2" opacity="0.9"/>);
              marks.push(<line key="sy" x1={wiringMouse.x} y1={wiringMouse.y-5} x2={wiringMouse.x} y2={wiringMouse.y+5} stroke="magenta" strokeWidth="2" opacity="0.9"/>);
            }
            return marks;
          })()}
        </svg>;
        })()}
      </div>

      {/* ZOOM CONTROLS */}
      <div style={{position:'absolute',bottom:20,left:20,display:'flex',flexDirection:'column',
        gap:4,zIndex:50,pointerEvents:'auto'}}>
        {[{l:'+',f:zoomIn,type:'btn',tip:'Zoom in'},{type:'pct',tip:'Set zoom'},{l:'\u2212',f:zoomOut,type:'btn',tip:'Zoom out'},{l:'',f:zoomCenter,type:'center',tip:'Centre canvas'},{l:'',f:zoomReset,type:'fit',tip:'Fit to screen'}].map((b,i)=>{
          const tipEl=<span className="zoom-tip" style={{position:'absolute',left:'calc(100% + 10px)',top:'50%',transform:'translateY(-50%)',
            background:'#333',color:'#ddd',fontSize:11,fontWeight:600,padding:'5px 10px',borderRadius:6,
            whiteSpace:'nowrap',pointerEvents:'none',opacity:0,transition:'opacity 0.15s, transform 0.15s',
            boxShadow:'0 2px 8px rgba(0,0,0,0.4)',letterSpacing:0.3}}>{b.tip}</span>;
          if(b.type==='pct'){
            return <div key={i} style={{position:'relative'}}
              onMouseEnter={e=>{const t=e.currentTarget.querySelector('.zoom-tip');if(t){t.style.opacity='1';t.style.transform='translateY(-50%) translateX(0)'}}}
              onMouseLeave={e=>{const t=e.currentTarget.querySelector('.zoom-tip');if(t){t.style.opacity='0';t.style.transform='translateY(-50%) translateX(-4px)'}}}>
              <input type="text"
                key="zoom-pct"
                defaultValue={Math.round(zoom/ZOOM_BASELINE*100)+'%'}
                ref={el=>{if(el&&document.activeElement!==el)el.value=Math.round(zoom/ZOOM_BASELINE*100)+'%'}}
                onKeyDown={e=>{
                  if(e.key==='Enter'){
                    const v=parseInt(e.target.value.replace(/[^0-9]/g,''),10);
                    if(!isNaN(v)&&v>0)setZoom(clamp(v/100*ZOOM_BASELINE,0.1,2));
                    e.target.blur();
                  }else if(e.key==='Escape'){
                    e.target.value=Math.round(zoom/ZOOM_BASELINE*100)+'%';
                    e.target.blur();
                  }
                }}
                onBlur={e=>{
                  const v=parseInt(e.target.value.replace(/[^0-9]/g,''),10);
                  if(!isNaN(v)&&v>0)setZoom(clamp(v/100*ZOOM_BASELINE,0.1,2));
                  else e.target.value=Math.round(zoom/ZOOM_BASELINE*100)+'%';
                }}
                onFocus={e=>{e.target.value=Math.round(zoom/ZOOM_BASELINE*100).toString();e.target.select()}}
                style={{
                  width:48,height:32,background:'#252525',border:'1px solid #333',
                  borderRadius:8,color:'#aaa',fontSize:11,cursor:'text',
                  textAlign:'center',fontWeight:600,fontFamily:'inherit',
                  outline:'none',transition:'border-color 0.15s, background 0.15s',padding:0
                }}
                onMouseEnter={e=>{e.target.style.borderColor='#555';e.target.style.background='#2a2a2a'}}
                onMouseLeave={e=>{if(document.activeElement!==e.target){e.target.style.borderColor='#333';e.target.style.background='#252525'}}}
              />
              {tipEl}
            </div>;
          }
          return <div key={i} style={{position:'relative'}}
            onMouseEnter={e=>{const t=e.currentTarget.querySelector('.zoom-tip');if(t){t.style.opacity='1';t.style.transform='translateY(-50%) translateX(0)'}}}
            onMouseLeave={e=>{const t=e.currentTarget.querySelector('.zoom-tip');if(t){t.style.opacity='0';t.style.transform='translateY(-50%) translateX(-4px)'}}}>
            <button ref={el=>{if(el&&(b.type==='center'||b.type==='fit')&&!el.dataset.svgSet){el.dataset.svgSet='1';
                if(b.type==='center'){
                  /* Four arrows pointing INWARD — L-shaped arrows with heads at centre */
                  el.innerHTML='<svg width="22" height="22" viewBox="0 0 18 18" fill="none">'

                  +'<path d="M6.5 11.5 L11 11.5 L11 13 L8.6 13 L11.6 16 L10.5 17.1 L7.5 14.1 L7.5 16.5 L6 16.5Z" fill="currentColor"/>'
                  +'</svg>';
                } else {
                  /* Four arrows pointing OUTWARD from centre */

                  +'<path d="M1 17 L6 17 L6 15.5 L3.2 15.5 L6.5 12.2 L5.4 11.1 L2.1 14.4 L2.1 11.5 L0.6 11.5 L0.6 17Z" fill="currentColor"/>'
                  +'<path d="M17 17 L12 17 L12 15.5 L14.8 15.5 L11.5 12.2 L12.6 11.1 L15.9 14.4 L15.9 11.5 L17.4 11.5 L17.4 17Z" fill="currentColor"/>'
                  +'</svg>';
                }}}}
              onClick={e=>{
                b.f();

                el.style.transform='scale(0.85)';

                width:48,height:48,background:'#252525',border:'1px solid #333',

                display:'flex',alignItems:'center',justifyContent:'center',fontWeight:600,

              }}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='#555';e.currentTarget.style.background='#2a2a2a';e.currentTarget.style.color='#ddd'}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='#333';e.currentTarget.style.background='#252525';e.currentTarget.style.color='#aaa'}}
            >{b.l}</button>
            {tipEl}
          </div>;
        })}
      </div>

      {/* WIRING STATUS BAR */}
      {wiringFrom&&(()=>{
        const nd=nodes.find(n=>n.id===wiringFrom.nid);

          <div style={{position:'absolute',bottom:0,left:0,right:0,height:36,zIndex:50,
            background:'#252525ee',display:'flex',alignItems:'center',justifyContent:'center',
            borderTop:'1px solid #333',fontSize:12,color:'#78c0f0'}}>
            Wiring from <strong style={{margin:'0 5px'}}>{nd?.label||wiringFrom.nid}</strong> — click a target port to connect
          </div>
        );
      })()}

      </div>{/* END CANVAS SHIFT WRAPPER */}

      {/* SIDE PANEL — Live inspection layer */}
      {panelNode&&(()=>{
        const nd=nodes.find(n=>n.id===panelNode);
        if(!nd)return null;
        const tier=tierMap[nd.gid]||'worker';
        const t=getTheme(tier);
        const isErr=nd.status==='error';
        return <LivePanel nd={nd} tier={tier} t={t} isErr={isErr}
          wires={wires} nodes={nodes} groups={groups} updateNode={updateNode}
          onChangeGroup={changeNodeGroup}
          onClose={()=>{panelDirtyRef.current=false;setPanelNode(null);setSelected(null)}}
          dirtyRef={panelDirtyRef} exitRef={panelExitRef} exitPromptRef={panelExitPromptRef}
          customThemesRef={customThemesRef} tierMap={tierMap}
          hsvToHex={hsvToHex} hexToHsv={hexToHsv} hueToHex={hueToHex} tintFromAccent={tintFromAccent}
          onColorChange={()=>setColorTick(t=>t+1)}
          panelW={panelW} setPanelW={setPanelW}/>;
      })()}

      {/* BADGE TOOLTIP — rendered at root level to escape canvas transform */}
      {badgeTip&&(()=>{const isAuth=badgeTip.type==='auth';const accent=isAuth?'#d4a030':'#ff6666';
        const s=Math.max(1,zoom/0.5);
        const vw=window.innerWidth,vh=window.innerHeight;const w=Math.min(320,vw-16);
        const sw=w*s,sh=160*s;
        let tipLeft=Math.max(8,badgeTip.x-sw);if(tipLeft+sw>vw-8)tipLeft=vw-sw-8;
        let tipTop=badgeTip.y+5;if(tipTop+sh>vh)tipTop=badgeTip.y-sh-5;
        return <div
          ref={el=>{if(el&&!el._wheelBound){el._wheelBound=true;el.addEventListener('wheel',e=>{e.stopPropagation();e.preventDefault();const sc=el.querySelector('[style*="overflow-y"]');if(sc)sc.scrollTop+=e.deltaY},{passive:false})}}}
          onMouseEnter={()=>{if(window._tipTimer)clearTimeout(window._tipTimer)}}
          onMouseLeave={()=>{window._tipTimer=setTimeout(()=>setBadgeTip(null),150)}}
          style={{position:'fixed',top:tipTop,left:tipLeft,
          background:'#1e1e1e',borderRadius:6,padding:'10px 14px 10px 14px',width:w,
          zIndex:9999,boxShadow:'0 6px 22px rgba(0,0,0,0.6)',
          borderLeft:`2px solid ${accent}`,
          transform:`scale(${s})`,transformOrigin:'top left',
          animation:'fadeInQuick 0.12s ease-out'}}>
          <div style={{fontSize:8,fontWeight:700,color:accent,letterSpacing:1.2,textTransform:'uppercase',marginBottom:4,opacity:0.85}}>
            {isAuth?'Authority':'Error'}

          {isAuth&&<div>
            <div style={{fontSize:11,fontWeight:600,color:'#e0e0e0',marginBottom:6}}>Permissions</div>
            <div style={{maxHeight:53,overflowY:'auto',paddingRight:3}}>
              {badgeTip.perms.map((p,i)=><div key={i} style={{fontSize:10.5,color:'#999',lineHeight:1.7}}>{p}</div>)}
            </div>
          </div>}
          {!isAuth&&<div>
            {badgeTip.errorInfo&&<div style={{fontSize:10,fontFamily:'monospace',color:accent,background:'#cc333315',
              padding:'3px 6px',borderRadius:3,marginBottom:5,display:'inline-block'}}>{badgeTip.errorInfo.code}</div>}
            <div style={{fontSize:9,color:'#999',lineHeight:1.5}}>{badgeTip.errorInfo?badgeTip.errorInfo.message:'Unknown error — check node logs.'}</div>
          </div>}
        </div>})()}

      {/* DELETE CONFIRMATION MODAL (node deletion only) */}
      {modal&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <h3>Confirm Deletion</h3>
            <p>{modal.msg}</p>
            <div className="btn-row">
              <button onClick={()=>setModal(null)}>Cancel</button>
              <button className="danger" onClick={modal.onConfirm}>Remove Node</button>
            </div>
          </div>
        </div>
      )}

      {/* GROUP MENU POPOVER */}
      {groupMenu&&(()=>{
        const gm=groupMenu;
        const g=groups.find(g=>g.id===gm.gid);
        if(!g)return null;
        const theme=getTheme(g.tier);
        const groupNodes=nodes.filter(n=>n.gid===gm.gid);
        return <div className="modal-overlay" onClick={()=>setGroupMenu(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:'#1e1e1e',border:'1px solid #333',borderRadius:14,
            padding:'28px 32px',maxWidth:400,width:'100%',boxShadow:'0 12px 48px rgba(0,0,0,0.6)',
            animation:'modalFadeIn 0.15s ease-out'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
              <div style={{width:12,height:12,borderRadius:6,background:theme.accent,
                boxShadow:`0 0 10px ${theme.accent}88`}}/>
              <span style={{fontSize:16,fontWeight:700,color:'#e0e0e0'}}>{g.label}</span>
              <span style={{fontSize:10,color:'#888',marginLeft:'auto',textTransform:'uppercase',letterSpacing:1}}>
                {groupNodes.length} node{groupNodes.length!==1?'s':''}</span>
            </div>

            {!gm.confirm?<div style={{display:'flex',flexDirection:'column',gap:12}}>
              {/* Edit — primary action */}
              <button onClick={()=>{setGroupMenu(null);editGroup(gm.gid)}}
                style={{width:'100%',padding:'12px 16px',borderRadius:8,border:'1px solid #555',
                  background:'#2a2a2a',color:'#e0e0e0',fontSize:12,fontWeight:600,cursor:'pointer',
                  textAlign:'left',transition:'all 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.background='#333';e.currentTarget.style.borderColor='#777'}}
                onMouseLeave={e=>{e.currentTarget.style.background='#2a2a2a';e.currentTarget.style.borderColor='#555'}}>
                Edit
                <div style={{fontSize:10,color:'#888',fontWeight:400,marginTop:6,lineHeight:1.5}}>
                  Open the side panel to manage colours, delete specific nodes, and configure group settings.</div>
              </button>

              {/* Delete All — triggers confirmation */}
              <button onClick={()=>setGroupMenu(m=>({...m,confirm:'deleteAll'}))}
                style={{width:'100%',padding:'12px 16px',borderRadius:8,border:'1px solid #333',
                  background:'#252525',color:'#ccc',fontSize:12,fontWeight:600,cursor:'pointer',
                  textAlign:'left',transition:'all 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.background='#2a2a2a';e.currentTarget.style.borderColor='#555'}}
                onMouseLeave={e=>{e.currentTarget.style.background='#252525';e.currentTarget.style.borderColor='#333'}}>
                Delete All
                <div style={{fontSize:10,color:'#888',fontWeight:400,marginTop:6,lineHeight:1.5}}>
                  Permanently delete "{g.label}" and all {groupNodes.length} node{groupNodes.length!==1?'s':''} inside it.</div>
              </button>

              {/* Remove Group Only */}
              <button onClick={()=>{
                setGroupMenu(null);
                const ts=Date.now();
                const color=theme.accent;
                const nt=tintFromAccent(color);
                const tid='orphan-'+ts;
                customThemesRef.current[tid]={nodeBg:nt.nodeBg,headerBg:nt.headerBg,accent:color,text:nt.text};
                tierMap[tid]=tid;
                setNodes(ns=>ns.map(n=>{
                  if(n.gid!==gm.gid)return n;
                  const abs=nAbs(n,groups,zoom);
                  return{...n,gid:tid,x:abs.x,y:abs.y};
                }));
                setGroups(gs=>gs.filter(gg=>gg.id!==gm.gid));
              }}
                style={{width:'100%',padding:'12px 16px',borderRadius:8,border:'1px solid #333',
                  background:'#252525',color:'#ccc',fontSize:12,fontWeight:600,cursor:'pointer',
                  textAlign:'left',transition:'all 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.background='#2a2a2a';e.currentTarget.style.borderColor='#555'}}
                onMouseLeave={e=>{e.currentTarget.style.background='#252525';e.currentTarget.style.borderColor='#333'}}>
                Remove Group Only
                <div style={{fontSize:10,color:'#888',fontWeight:400,marginTop:6,lineHeight:1.5}}>

              </button>
            </div>

            :<div>
              {/* Delete All confirmation */}
              <div style={{fontSize:13,fontWeight:600,color:'#e0e0e0',marginBottom:10}}>Are you sure?</div>
              <div style={{fontSize:11,color:'#999',lineHeight:1.6,marginBottom:20}}>
                This will permanently delete <strong style={{color:'#ddd'}}>"{g.label}"</strong> and
                all <strong style={{color:'#ddd'}}>{groupNodes.length} node{groupNodes.length!==1?'s':''}</strong> inside
                it, along with their connections. This action cannot be undone.</div>
              <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
                <button onClick={()=>setGroupMenu(m=>({...m,confirm:null}))}
                  style={{padding:'8px 20px',borderRadius:8,border:'1px solid #333',background:'#252525',
                    color:'#aaa',fontSize:12,fontWeight:600,cursor:'pointer',transition:'all 0.15s'}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor='#555';e.currentTarget.style.background='#2a2a2a';e.currentTarget.style.color='#ddd'}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='#333';e.currentTarget.style.background='#252525';e.currentTarget.style.color='#aaa'}}>
                  Cancel</button>
                <button onClick={()=>{
                  setGroupMenu(null);
                  const nids=new Set(groupNodes.map(n=>n.id));
                  const dying=wireData.filter(wd=>nids.has(wd.src)||nids.has(wd.tgt)).map(wd=>({path:wd.path}));
                  setDyingWires(dying);
                  setNodes(ns=>ns.filter(n=>n.gid!==gm.gid));
                  setWires(ws=>ws.filter(w=>!nids.has(w.src)&&!nids.has(w.tgt)));
                  setGroups(gs=>gs.filter(gg=>gg.id!==gm.gid));
                  if(nids.has(selected))setSelected(null);
                  if(nids.has(panelNode))setPanelNode(null);
                }}
                  style={{padding:'8px 20px',borderRadius:8,border:'1px solid #cc4444',background:'#cc333322',
                    color:'#ff6666',fontSize:12,fontWeight:600,cursor:'pointer',transition:'all 0.15s'}}
                  onMouseEnter={e=>{e.currentTarget.style.background='#cc333344'}}
                  onMouseLeave={e=>{e.currentTarget.style.background='#cc333322'}}>
                  Delete All</button>
              </div>
            </div>}

          </div>
        </div>;
      })()}

      {/* GROUP CREATION WIZARD */}
      {groupWizard&&(()=>{
        const gw=groupWizard;
        const gwTint=tintFromAccent(gw.color);
        const GW_COLORS=['#ffffff','#b0b0b0','#666666','#e05050','#e88030','#d0a040','#38d07a','#50b868','#40b8d8','#6080e0','#9860d8','#c060d8','#e07098','#70d0c0','#a0d050'];
        return <div className="modal-overlay" onClick={()=>setGroupWizard(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:'#1e1e1e',border:'1px solid #333',borderRadius:14,
            padding:'28px 32px',maxWidth:420,width:'100%',boxShadow:'0 12px 48px rgba(0,0,0,0.6)',
            animation:'modalFadeIn 0.15s ease-out'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
              <div style={{width:12,height:12,borderRadius:6,background:gw.color,
                boxShadow:`0 0 10px ${gw.color}88`,transition:'background 0.2s, box-shadow 0.2s'}}/>
              <span style={{fontSize:16,fontWeight:700,color:'#e0e0e0'}}>New Group</span>
            </div>

            {/* Group name */}
            <div style={{marginBottom:20}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color:'#888',marginBottom:8}}>Group Name</div>
              <input value={gw.name} onChange={e=>setGroupWizard(w=>({...w,name:e.target.value}))}
                placeholder="Enter group name..."
                autoFocus
                style={{width:'100%',background:'#252525',border:'1px solid #444',borderRadius:8,
                  color:'#e0e0e0',fontSize:13,padding:'10px 14px',fontFamily:'inherit',outline:'none',
                  transition:'border-color 0.15s',boxSizing:'border-box'}}
                onFocus={e=>{e.target.style.borderColor=gw.color+'88'}}
                onBlur={e=>{e.target.style.borderColor='#444'}}/>
            </div>

            {/* Colour picker */}
            <div style={{marginBottom:24}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color:'#888',marginBottom:8}}>Group Colour</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {GW_COLORS.map(c=>(
                  <div key={c} onClick={()=>setGroupWizard(w=>({...w,color:c}))}
                    style={{width:28,height:28,borderRadius:6,background:c,cursor:'pointer',
                      border:gw.color===c?'3px solid #fff':'3px solid transparent',
                      transition:'border 0.15s'}}/>
                ))}
              </div>
            </div>

            {/* Preview */}
            <div style={{marginBottom:24,padding:'12px 16px',borderRadius:8,background:gwTint.headerBg,
              border:`1px solid ${gw.color}22`,transition:'background 0.2s'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:10,height:10,borderRadius:5,background:gw.color,
                  boxShadow:`0 0 8px ${gw.color}88`,transition:'background 0.2s, box-shadow 0.2s'}}/>
                <span style={{fontSize:13,fontWeight:700,color:gwTint.text,letterSpacing:1,
                  textTransform:'uppercase',transition:'color 0.2s'}}>
                  {gw.name||'Group Name'}</span>
              </div>
            </div>

            {/* Actions */}
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button onClick={()=>setGroupWizard(null)}
                style={{padding:'8px 20px',borderRadius:8,border:'1px solid #333',background:'#252525',
                  color:'#aaa',fontSize:12,fontWeight:600,cursor:'pointer',transition:'all 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='#555';e.currentTarget.style.background='#2a2a2a';e.currentTarget.style.color='#ddd'}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='#333';e.currentTarget.style.background='#252525';e.currentTarget.style.color='#aaa'}}>
                Cancel</button>
              <button onClick={()=>{
                if(!gw.name.trim())return;
                const id='custom-'+Date.now();
                const label=gw.name.trim();
                const nt=tintFromAccent(gw.color);
                const theme={nodeBg:nt.nodeBg,headerBg:nt.headerBg,accent:gw.color,text:nt.text};
                customThemesRef.current[id]=theme;
                tierMap[id]=id;
                const maxX=groups.reduce((mx,g)=>Math.max(mx,g.x+g.w),0);
                setGroups(gs=>pushGroups(id,[...gs,{id,label,tier:id,x:maxX+60,y:100,w:EP+NW+EP,h:GH+EP+NH+EP}]));
                setGroupWizard(null);
              }} disabled={!gw.name.trim()}
                style={{padding:'8px 20px',borderRadius:8,border:'1px solid #555',
                  background:gw.name.trim()?'#2a2a2a':'#1e1e1e',
                  color:gw.name.trim()?'#e0e0e0':'#555',fontSize:12,fontWeight:600,cursor:'pointer',
                  transition:'all 0.15s'}}
                onMouseEnter={e=>{if(gw.name.trim()){e.currentTarget.style.background='#333';e.currentTarget.style.borderColor='#777'}}}
                onMouseLeave={e=>{e.currentTarget.style.background='#2a2a2a';e.currentTarget.style.borderColor='#555'}}>
                Create Group</button>
            </div>
          </div>
        </div>;
      })()}

      {/* GROUP EDIT SIDE PANEL */}
      {groupEdit&&(()=>{
        const ge=groupEdit;
        const g=groups.find(g=>g.id===ge.gid);
        if(!g)return null;
        const accent=ge.customColor||'#cccccc';
        const groupNodes=nodes.filter(n=>n.gid===ge.gid);
        return <GroupPanel
          gid={ge.gid} group={g} groupNodes={groupNodes} accent={accent} initPerNodeColors={ge.savedPerNodeColors||{}}
          openDanger={!!ge._openDanger} panelW={panelW} setPanelW={setPanelW}
          onClose={()=>{groupDirtyRef.current=false;setGroupPreview(null);setGroupEdit(null)}}
          onPreview={setGroupPreview}
          onSave={({label:newLabel,accent:newAccent,perNodeColors})=>{
            if(!newLabel.trim())return;
            const color=newAccent||accent;
            const tint=tintFromAccent(color);
            const theme={nodeBg:tint.nodeBg,headerBg:tint.headerBg,accent:color,text:tint.text};
            customThemesRef.current[g.tier]=theme;
            customThemesRef.current[ge.gid]=theme;
            /* Apply per-node colour overrides */
            if(perNodeColors&&Object.keys(perNodeColors).length>0){
              const ts=Date.now();
              Object.entries(perNodeColors).forEach(([nid,nc],i)=>{
                const tid='nodecolor-'+ts+'-'+i;
                const nt=tintFromAccent(nc);
                customThemesRef.current[tid]={nodeBg:nt.nodeBg,headerBg:nt.headerBg,accent:nc,text:nt.text};
                tierMap[tid]=tid;
                /* Update node — create a virtual gid that still renders in the group but uses custom theme */
                /* Actually, store override in tierMap keyed by node id */
                tierMap['_node_'+nid]=tid;
              });
            }
            setGroups(gs=>gs.map(gg=>gg.id!==ge.gid?gg:{...gg,label:newLabel.trim()}));
            setGroupEdit(prev=>({...prev,label:newLabel.trim(),customColor:color,savedPerNodeColors:perNodeColors||{}}));
          }}
          onDeleteGroup={()=>{
            const nids=new Set(groupNodes.map(n=>n.id));
            const dying=wireData.filter(wd=>nids.has(wd.src)||nids.has(wd.tgt)).map(wd=>({path:wd.path}));
            setDyingWires(dying);
            setNodes(ns=>ns.filter(n=>n.gid!==ge.gid));
            setWires(ws=>ws.filter(w=>!nids.has(w.src)&&!nids.has(w.tgt)));
            setGroups(gs=>gs.filter(gg=>gg.id!==ge.gid));
            if(nids.has(selected))setSelected(null);
            if(nids.has(panelNode))setPanelNode(null);
            setGroupPreview(null);setGroupEdit(null);
          }}
          onDeleteGroupOnly={({perNodeColors:pnc,globalColor})=>{
            const ts=Date.now();
            const colorTiers={};
            const getOrCreateTier=(color)=>{
              if(colorTiers[color])return colorTiers[color];
              const tid='orphan-'+ts+'-'+Object.keys(colorTiers).length;
              const nt=tintFromAccent(color);
              customThemesRef.current[tid]={nodeBg:nt.nodeBg,headerBg:nt.headerBg,accent:color,text:nt.text};
              tierMap[tid]=tid;
              colorTiers[color]=tid;
              return tid;
            };
            setNodes(ns=>ns.map(n=>{
              if(n.gid!==ge.gid)return n;
              const abs=nAbs(n,groups,zoom);
              const color=(pnc&&pnc[n.id])||globalColor;
              return{...n,gid:getOrCreateTier(color),x:abs.x,y:abs.y};
            }));
            setGroups(gs=>gs.filter(gg=>gg.id!==ge.gid));
            setGroupPreview(null);setGroupEdit(null);
          }}
          onDeleteNode={nid=>{
            const dying=wireData.filter(wd=>wd.src===nid||wd.tgt===nid).map(wd=>({path:wd.path}));
            setDyingWires(dying);
            setNodes(ns=>ns.filter(n=>n.id!==nid));
            setWires(ws=>ws.filter(w=>w.src!==nid&&w.tgt!==nid));
            if(selected===nid)setSelected(null);
            if(panelNode===nid)setPanelNode(null);
          }}
          dirtyRef={groupDirtyRef} exitRef={groupExitRef} exitPromptRef={groupExitPromptRef}
          customThemesRef={customThemesRef} tierMap={tierMap}
          nAbsFn={nAbs} hsvToHex={hsvToHex} hexToHsv={hexToHsv}
          hueToHex={hueToHex} tintFromAccent={tintFromAccent}
        />;
      })()}

      {/* NODE CREATION WIZARD */}
      {wizard&&(()=>{
        const w=wizard;
        const tier=w.tier||'worker';
        const hasCustomColor=!!w.customColor;
        const customAccent=w.customColor||'#cccccc';
        /* Build a dynamic tier theme for custom groups */
        const ct=hasCustomColor?tintFromAccent(customAccent):{nodeBg:'#1a1a1a',headerBg:'#222',text:'#ccc'};
        const customTier={nodeBg:ct.nodeBg,headerBg:ct.headerBg,accent:customAccent,text:ct.text};
        const t=tier==='custom'?customTier:(TIERS[tier]||TIERS.worker);
        const canCreate=w.name.trim()&&w.prompt.trim()&&(tier!=='custom'||(w.groupName&&w.groupName.trim()));
        const TIER_DESC={orchestrator:'Top-level coordinator',manager:'Domain manager',worker:'Task executor',infra:'Infrastructure service',custom:'User-defined group'};
        const CUSTOM_COLORS=['#ffffff','#b0b0b0','#666666','#e05050','#e88030','#d0a040','#50b868','#40b8d8','#6080e0','#c060d8','#e07098','#70d0c0','#a0d050'];
        const wizUpdate=patch=>setWizard(wz=>({...wz,...patch}));
        const doCreate=()=>{
          if(!canCreate)return;
          try{
          const id=newId();
          const gid=w.gid;
          /* If tier changed from group's tier, find/create matching group */
          let targetGid=gid;
          const gTier=tierMap[gid];
          if(tier==='custom'){
            /* Always create a new custom group with user-defined name and color */
            targetGid='custom-'+Date.now();
            const maxX=groups.reduce((mx,g)=>Math.max(mx,g.x+g.w),0);
            const groupLabel=(w.groupName&&w.groupName.trim())||'Custom';
            const ca=customAccent;
            /* Register theme so getTheme() can find it */
            const tint=tintFromAccent(ca);
            customThemesRef.current[targetGid]={nodeBg:tint.nodeBg,headerBg:tint.headerBg,accent:ca,text:tint.text};
            tierMap[targetGid]=targetGid;
            const newGroup={id:targetGid,label:groupLabel,tier:targetGid,x:maxX+60,y:100,w:NW+EP*2,h:NH+EP*2+GH};
            setGroups(gs=>{try{return pushGroups(targetGid,[...gs,newGroup])}catch(e){return[...gs,newGroup]}});
          } else if(gTier!==tier){
            const existing=groups.find(g=>tierMap[g.id]===tier);
            if(existing)targetGid=existing.id;
            else{
              targetGid=tier+'-'+Date.now();
              const maxX=groups.reduce((mx,g)=>Math.max(mx,g.x+g.w),0);
              setGroups(gs=>pushGroups(targetGid,[...gs,{id:targetGid,label:tier.charAt(0).toUpperCase()+tier.slice(1),tier,x:maxX+60,y:100,w:EP+NW+EP,h:GH+EP+NH+EP}]));
              tierMap[targetGid]=tier;
            }
          }
          const prompt=w.constraints?w.prompt.trim()+'\n\nConstraints: '+w.constraints.trim():w.prompt.trim();
          const ports={top:[{id:id+':t0'}],bottom:[{id:id+':b0'}],right:[{id:id+':r0'}],left:[{id:id+':l0'}]};
          /* Grid-based placement — insert at right edge, expand group if needed */
          const groupNodes=nodes.filter(n=>n.gid===targetGid);
          groupNodes.forEach(n=>migrateNodeGrid(n,zoom));
          dedupeGrid(groupNodes,zoom);
          const tg=groups.find(g=>g.id===targetGid);
          const newNode={w:NW,h:NH}; /* incoming node has default size */
          const snap=findInsertionSlot('right',groupNodes,getDims(zoom).ep+groupNodes.length*(getDims(zoom).cw+getDims(zoom).ng),getDims(zoom).ep,zoom,newNode);
          if(tg){
            const expanded=expandGroupForPlacement(tg,snap.col,snap.row,groups,groupNodes,zoom,newNode);
            setGroups(expanded.groups);
            setNodes(ns=>{
              let updated=ns.map(n=>{
                const shifted=expanded.nodes.find(en=>en.id===n.id);
                if(shifted)return{...n,col:shifted.col,row:shifted.row,x:shifted.x,y:shifted.y};
                return n;
              });
              return[...updated,{id,gid:targetGid,label:w.name.trim(),col:expanded.col,row:expanded.row,x:expanded.slotX,y:expanded.slotY,w:NW,h:NH,model:w.model,status:'ok',auth:false,prompt,ports}];
            });
          }else{
            const pos=gridToPosInGroup(snap.col,snap.row,groupNodes,zoom);
            setNodes(ns=>[...ns,{id,gid:targetGid,label:w.name.trim(),col:snap.col,row:snap.row,x:pos.x,y:pos.y,w:NW,h:NH,model:w.model,status:'ok',auth:false,prompt,ports}]);
          }
          setWizard(null);
          setSelected(id);
          setPanelNode(id);
          }catch(err){console.error('doCreate error:',err);setWizard(null);}
        };
        return(
          <div className="wiz-overlay" onClick={()=>setWizard(null)}>
            <div className="wiz-box" onClick={e=>e.stopPropagation()}>
              <div className="wiz-hdr">
                <div style={{width:10,height:10,borderRadius:5,background:t.accent,boxShadow:`0 0 8px ${t.accent}66`}}/>
                <h3>Create New Node</h3>
                <button onClick={()=>setWizard(null)} style={{background:'none',border:'none',color:'#666',fontSize:16,cursor:'pointer',padding:0}}>✕</button>
              </div>
              <div className="wiz-body">
                {/* NAME */}
                <div className="wiz-field">
                  <label>Node Name</label>
                  <input autoFocus value={w.name} onChange={e=>wizUpdate({name:e.target.value})}
                    placeholder="e.g. Sentiment analyzer" spellCheck="false"/>
                </div>

                {/* ROLE / TIER */}
                <div className="wiz-field">
                  <label>Role</label>
                  <div className="wiz-tier-grid">
                    {Object.keys(TIERS).map(tk=>{
                      const tt=TIERS[tk];
                      const sel=tier===tk;
                      return(
                        <div key={tk} className="wiz-tier-btn" onClick={()=>wizUpdate({tier:tk})}
                          style={{background:tt.nodeBg,borderColor:sel?tt.accent:'transparent'}}>
                          <span className="wiz-tier-name" style={{color:tt.text}}>{tk.charAt(0).toUpperCase()+tk.slice(1)}</span>
                          <span className="wiz-tier-desc" style={{color:tt.text}}>{TIER_DESC[tk]}</span>
                        </div>
                      );
                    })}
                    {/* Custom group option */}
                    {(()=>{
                      const ct=hasCustomColor?tintFromAccent(customAccent):null;
                      return <div className="wiz-tier-btn" onClick={()=>wizUpdate({tier:'custom'})}
                        style={{background:ct?ct.nodeBg:'#1a1a1a',borderColor:tier==='custom'?(hasCustomColor?customAccent:'#ccc'):'transparent'}}>
                        <span className="wiz-tier-name" style={{color:ct?ct.text:'#ccc'}}>Custom</span>
                        <span className="wiz-tier-desc" style={{color:ct?customAccent:'#999'}}>User-defined group</span>
                      </div>;
                    })()}
                  </div>
                </div>

                {/* CUSTOM GROUP OPTIONS — only shown when "Custom" tier selected */}
                {tier==='custom'&&(
                  <div className="wiz-field">
                    <label>Group Name</label>
                    <input value={w.groupName||''} onChange={e=>wizUpdate({groupName:e.target.value})}
                      placeholder="e.g. Analytics, Signals, Execution..." spellCheck="false"/>
                    <label style={{marginTop:10}}>Group Colour</label>
                    <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',marginTop:6,alignItems:'center'}}>
                      {CUSTOM_COLORS.map(c=>(
                        <div key={c} onClick={()=>wizUpdate({customColor:c})}
                          style={{width:32,height:32,borderRadius:6,background:c,cursor:'pointer',
                            border:hasCustomColor&&customAccent===c?'3px solid #fff':'3px solid transparent',
                            transition:'border 0.15s'}}/>
                      ))}
                    </div>
                    {/* Full colour picker */}
                    {(()=>{
                      const hsv=hasCustomColor?hexToHsv(customAccent):{h:0,s:1,v:1};
                      const pureHue=hueToHex(hsv.h);
                      const panelH=90;
                      /* Sat-Val 2D panel drag */
                      const handleSVDrag=(e,rect)=>{
                        if(!rect)return;
                        const x=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
                        const y=Math.max(0,Math.min(1,(e.clientY-rect.top)/rect.height));
                        wizUpdate({customColor:hsvToHex(hsv.h,x,1-y)});
                      };
                      const startSVDrag=e=>{
                        const rect=e.currentTarget.getBoundingClientRect();
                        handleSVDrag(e,rect);
                        const move=ev=>handleSVDrag(ev,rect);
                        const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up)};
                        window.addEventListener('mousemove',move);
                        window.addEventListener('mouseup',up);
                      };
                      return <div style={{marginTop:16}}>
                        {/* Saturation-Value panel */}
                        <div onMouseDown={startSVDrag} style={{position:'relative',width:'100%',height:panelH,borderRadius:8,overflow:'hidden',cursor:'crosshair',
                          background:pureHue}}>
                          <div style={{position:'absolute',inset:0,background:'linear-gradient(to right,#ffffff,transparent)'}}/>
                          <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,transparent,#000000)'}}/>
                          {/* Picker circle */}
                          <div style={{position:'absolute',left:`${hsv.s*100}%`,top:`${(1-hsv.v)*100}%`,
                            width:16,height:16,borderRadius:'50%',border:'3px solid #fff',
                            boxShadow:'0 0 0 1px rgba(0,0,0,0.3),0 2px 6px rgba(0,0,0,0.4)',
                            transform:'translate(-50%,-50%)',pointerEvents:'none'}}/>
                        </div>
                        {/* Hue slider + preview row */}
                        <div style={{display:'flex',gap:12,alignItems:'center',marginTop:12}}>
                          <div className="hue-bar" style={{flex:1}} onMouseDown={e=>{
                            const bar=e.currentTarget,rect=bar.getBoundingClientRect();
                            const setH=ev=>{const x=Math.max(0,Math.min(1,(ev.clientX-rect.left)/rect.width));
                              wizUpdate({customColor:hsvToHex(Math.round(x*360),hsv.s,hsv.v)})};
                            setH(e);
                            const move=ev=>setH(ev);
                            const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up)};
                            window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
                          }}>
                            <div className="hue-thumb" style={{left:`${hsv.h/360*100}%`}}/>
                          </div>
                        </div>
                        {/* Hex display */}
                        <div style={{marginTop:14,display:'flex',alignItems:'center',gap:8}}>
                          <span style={{fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color:'#888'}}>HEX</span>
                          <input value={w._hexDraft!=null?w._hexDraft:(hasCustomColor?customAccent:'#ffffff')}
                            onChange={e=>{
                              const raw=e.target.value;
                              wizUpdate({_hexDraft:raw});
                              const v=raw.startsWith('#')?raw:'#'+raw;
                              if(/^#[0-9a-fA-F]{6}$/.test(v))wizUpdate({customColor:v.toLowerCase(),_hexDraft:v.toLowerCase()});
                            }}
                            onBlur={e=>{
                              const raw=e.target.value;
                              const v=raw.startsWith('#')?raw:'#'+raw;
                              if(/^#[0-9a-fA-F]{6}$/.test(v))wizUpdate({customColor:v.toLowerCase(),_hexDraft:null});
                              else wizUpdate({_hexDraft:null});
                            }}
                            style={{width:90,background:'#252525',border:'1px solid #444',borderRadius:6,color:'#ccc',fontSize:12,padding:'5px 8px',fontFamily:'monospace'}}/>
                        </div>
                      </div>;
                    })()}
                  </div>
                )}

                {/* MODEL */}
                <div className="wiz-field">
                  <label>Model</label>
                  <div className="wiz-model-grid">
                    {MODELS.map(m=>{
                      const sel=w.model===m.id;
                      return(
                        <div key={m.id} className="wiz-model-btn" onClick={()=>wizUpdate({model:m.id})}
                          style={{borderColor:sel?m.color:'transparent'}}>
                          <span className="wiz-m-name" style={{color:sel?m.color:'#aaa'}}>{m.label}</span>
                          <span className="wiz-m-cost">{m.cost}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* BEHAVIOUR PROMPT */}
                <div className="wiz-field">
                  <label>Behaviour Prompt</label>
                  <textarea value={w.prompt} onChange={e=>wizUpdate({prompt:e.target.value})}
                    placeholder="Define what this node does, how it processes inputs, and what it outputs..."
                    spellCheck="false"/>
                </div>

                {/* CONSTRAINTS */}
                <div className="wiz-field">
                  <label>Constraints (optional)</label>
                  <textarea value={w.constraints} onChange={e=>wizUpdate({constraints:e.target.value})}
                    placeholder="e.g. Max 5% per trade, no override, must log all decisions..."
                    style={{minHeight:50}} spellCheck="false"/>
                </div>
              </div>
              <div className="wiz-foot">
                <button onClick={()=>setWizard(null)}>Cancel</button>
                <button className="primary" disabled={!canCreate} onClick={doCreate}
                  style={{color:canCreate?'#ccc':'#666'}}>Create Node</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* ── RESIZE HANDLES ── */
function resizeHandles(id,onStart){
  const s=12;
  return[
    {k:'nw',s:{top:-3,left:-3,width:s,height:s,cursor:'nwse-resize'}},
    {k:'ne',s:{top:-3,right:-3,width:s,height:s,cursor:'nesw-resize'}},
    {k:'sw',s:{bottom:-3,left:-3,width:s,height:s,cursor:'nesw-resize'}},
    {k:'se',s:{bottom:-3,right:-3,width:s,height:s,cursor:'nwse-resize'}},
    {k:'n',s:{top:-3,left:s,right:s,height:s,cursor:'ns-resize'}},
    {k:'s',s:{bottom:-3,left:s,right:s,height:s,cursor:'ns-resize'}},
    {k:'w',s:{top:s,bottom:s,left:-3,width:s,cursor:'ew-resize'}},
    {k:'e',s:{top:s,bottom:s,right:-3,width:s,cursor:'ew-resize'}},
  ].map(h=><div key={h.k} onMouseDown={e=>onStart(e,id,h.k)}
    style={{position:'absolute',...h.s,zIndex:20,pointerEvents:'auto'}}/>);
}
function nodeResizeHandles(id,w,h,onStart){
  const s=8;
  return[
    {k:'nw',s:{top:0,left:0,width:s,height:s,cursor:'nwse-resize'}},
    {k:'ne',s:{top:0,right:0,width:s,height:s,cursor:'nesw-resize'}},
    {k:'sw',s:{bottom:0,left:0,width:s,height:s,cursor:'nesw-resize'}},
    {k:'se',s:{bottom:0,right:0,width:s,height:s,cursor:'nwse-resize'}},
    {k:'n',s:{top:0,left:s,right:s,height:s,cursor:'ns-resize'}},
    {k:'s',s:{bottom:0,left:s,right:s,height:s,cursor:'ns-resize'}},
    {k:'w',s:{top:s,bottom:s,left:0,width:s,cursor:'ew-resize'}},
    {k:'e',s:{top:s,bottom:s,right:0,width:s,cursor:'ew-resize'}},
  ].map(h=><div key={h.k} onMouseDown={e=>onStart(e,id,h.k)}
    style={{position:'absolute',...h.s,zIndex:6,pointerEvents:'auto'}}/>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
