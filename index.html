    return()=>window.removeEventListener('resize',onResize);
  },[]);

  /* ── cleanup dying wires ── */
  useEffect(()=>{
    if(!dyingWires.length)return;
    const t=setTimeout(()=>setDyingWires([]),600);
    return()=>clearTimeout(t);
  },[dyingWires]);

  /* ── connected set ── */
  const connSet=useMemo(()=>{const s=new Set();wires.forEach(w=>{s.add(w.src);s.add(w.tgt)});return s},[wires]);

  /* ── measure actual rendered node sizes so ports track real edges ── */
  useEffect(()=>{
    const el=cRef.current;if(!el)return;
    const measured={};
    el.querySelectorAll('[data-node]').forEach(div=>{
      const id=div.getAttribute('data-node');
      measured[id]={w:div.offsetWidth,h:div.offsetHeight};
    });
    setNodeSizes(prev=>{
      let changed=false;
      for(const id in measured){
        if(!prev[id]||prev[id].w!==measured[id].w||prev[id].h!==measured[id].h){changed=true;break}
      }
      if(Object.keys(prev).length!==Object.keys(measured).length)changed=true;
      return changed?measured:prev;
    });
    /* Auto-fit groups to actual rendered node sizes + padding.
       Expands AND contracts. Respects manual resize floor.
       Cascades Y positions so groups never overlap.
       FROZEN during node drag — groups maintain fixed bounds while dragging nodes. */
    const ir=interRef.current;
    const isNodeDrag=ir&&(ir.type==='dragging_node'||ir.type==='pending_node');
    if(isNodeDrag)return; /* freeze group sizing during node drag */
    const isNodeResize=ir&&ir.type==='resizing_node';
    const activeResizeNodeId=isNodeResize?ir.id:null;
    const activeResizeId=(ir&&ir.type==='resizing_group')?ir.id:null;
    const activeDragId=(ir&&ir.type==='dragging_group')?ir.id:null;
    const ld=getDims(zoom);
    const lcw=ld.cw;
    const PAD=ld.ep;
    let changed=false;
    /* Fix stale node positions: if any grouped node's x/y doesn't match
       gridToPos(col,row), correct it. This catches cases where the drop
       handler or other code path failed to update x/y after changing col/row.
       Skip nodes in the actively resizing group (they use dynamic spacing).
       Skip the node currently being resized so fixup doesn't fight the drag. */
    /* Build group-node map for layout-aware fixup */
    const groupNodeMap={};
    nodes.forEach(nd=>{if(nd.gid){if(!groupNodeMap[nd.gid])groupNodeMap[nd.gid]=[];groupNodeMap[nd.gid].push(nd)}});
    let nodeFixups=null;
    nodes.forEach(nd=>{
      if(!nd.gid||nd.col==null||nd.row==null)return;
      if(nd.gid===activeResizeId)return; /* skip resizing group — dynamic spacing */
      if(nd.id===activeResizeNodeId)return; /* skip node being resized — user is dragging */
      const siblings=groupNodeMap[nd.gid]||[];
      const correctPos=gridToPosInGroup(nd.col,nd.row,siblings,zoom);
      if(Math.abs(nd.x-correctPos.x)>1||Math.abs(nd.y-correctPos.y)>1){
        if(!nodeFixups)nodeFixups={};
        nodeFixups[nd.id]=correctPos;
      }
    });
    if(nodeFixups){
      setNodes(ns=>ns.map(n=>{
        const fix=nodeFixups[n.id];
        return fix?{...n,x:fix.x,y:fix.y}:n;
      }));
    }
    let fitted=groups.map(g=>{
      if(g.id===activeResizeId)return g;
      const gNodes=nodes.filter(n=>n.gid===g.id);
      if(!gNodes.length)return g;
      let maxR=0,maxB=0;
      gNodes.forEach(nd=>{
        /* Use LOD-clamped sizes for bounds — DOM measurements lag by one frame
           and would make groups temporarily too large on zoom transitions.
           Also enforce port-based minimum so nodes contain all counter-scaled ports. */
        const _pm=portMinDims(nd,zoom);
        const mw=Math.max(Math.min(nd.w,lcw),_pm.minW);
        const mh=Math.max(Math.min(nd.h,ld.nh),_pm.minH);
        /* Use group-aware position for accurate bounds */
        const useX=(nd.col!=null)?gridToPosInGroup(nd.col,nd.row,gNodes,zoom).x:nd.x;
        const useY=(nd.row!=null)?gridToPosInGroup(nd.col,nd.row,gNodes,zoom).y:nd.y;
        maxR=Math.max(maxR,useX+mw+PAD);
        maxB=Math.max(maxB,useY+mh+PAD+ld.gh);
      });
      const floor=manualGroupSizes.current[g.id];
      /* Content minimum — never smaller than what nodes need */
      const contentW=Math.max(maxR, minGW(ld));
      const contentH=Math.max(maxB, minGH(ld));
      /* Respect manual resize floor — group stays at least as big as user set it */
      const fitW=floor?Math.max(contentW, floor.w):contentW;
      const fitH=floor?Math.max(contentH, floor.h):contentH;
      if(Math.abs(fitW-g.w)>1||Math.abs(fitH-g.h)>1){
        changed=true;return{...g,w:fitW,h:fitH}}
      return g;
    });
    /* Group position management:
       - On zoom change: cascade to pack groups tightly with LOD-appropriate gap.
       - On normal renders: only resolve actual 2D overlaps — no cascade.
       This lets users freely arrange groups while keeping zoom transitions clean. */
    if(!activeDragId){
      const prevZoom=lastCascadeZoomRef.current;
      const zoomChanged=prevZoom!==null&&Math.abs(prevZoom-zoom)>0.001;
      lastCascadeZoomRef.current=zoom;
      if(zoomChanged&&fitted.length>0){
        /* Zoom changed — scale group positions proportionally to LOD.
           Both X and Y scale so visual arrangement is preserved.
           No forced cascade — user's placement is respected. */
        const prevLD=getDims(prevZoom);
        const xPrev=prevLD.cw+prevLD.ng;
        const xNew=ld.cw+ld.ng;
        /* Y scale based on representative group height (2*ep+nh+gh) so that
           gaps between groups maintain consistent visual proportion */
        const yPrev=2*prevLD.ep+prevLD.nh+prevLD.gh;
        const yNew=2*ld.ep+ld.nh+ld.gh;
        if(Math.abs(xPrev-xNew)>1||Math.abs(yPrev-yNew)>1){
          const xScale=xNew/xPrev;
          const yScale=yNew/yPrev;
          for(let i=0;i<fitted.length;i++){
            const newX=fitted[i].x*xScale;
            const newY=fitted[i].y*yScale;
            if(Math.abs(fitted[i].x-newX)>1||Math.abs(fitted[i].y-newY)>1){
              fitted[i]={...fitted[i],x:newX,y:newY};
              changed=true;
            }
          }
        }
      }
      /* Overlap resolution — runs on EVERY render (zoom change or not).
         Only pushes down if groups actually overlap. Never changes X.
         Resolves overlaps from scaling or user drag in a single pass. */
      if(!activeDragId){
        const sorted=[...fitted].sort((a,b)=>a.y-b.y);
        for(let i=1;i<sorted.length;i++){
          for(let j=0;j<i;j++){
            const prev=sorted[j];
            const hOverlap=sorted[i].x<prev.x+prev.w+ld.gap&&sorted[i].x+sorted[i].w+ld.gap>prev.x;
            if(!hOverlap)continue;
            const targetY=prev.y+prev.h+ld.gap;
            if(sorted[i].y<targetY-1){
              const idx=fitted.findIndex(f=>f.id===sorted[i].id);
              fitted[idx]={...fitted[idx],y:targetY};
              sorted[i]={...sorted[i],y:targetY};
              changed=true;
            }
          }
        }
      }
    }
    if(changed){

    }
    /* Fit-to-screen on initial load. */
    if(!initialFitRef.current){
      initialFitRef.current=1;
      const vw=window.innerWidth,vh=window.innerHeight;
      const fit=findFitZoom(vw,vh,nodes,groups);
      setZoom(fit.z);
      const originX=groups.length?Math.min(...groups.map(g=>g.x)):LOD_DIMS[fit.tier].ep;
      const originY=groups.length?Math.min(...groups.map(g=>g.y)):LOD_DIMS[fit.tier].ep;
      setPan({x:(vw-fit.b.w*fit.z)/2-originX*fit.z,y:(vh-fit.b.h*fit.z)/2-originY*fit.z});

  });

  /* ── port positions from immutable port definitions ── */
  const{portPositions,portsByNode}=useMemo(()=>{
    return computePortPositions(wires,nodes,groups,sideAssignRef.current,nodeSizes,zoom);
  },[wires,nodes,groups,nodeSizes,zoom]);

  const wireData=useMemo(()=>{
    return wires.map((w,i)=>{
      const sN=nodes.find(n=>n.id===w.src),tN=nodes.find(n=>n.id===w.tgt);
      if(!sN||!tN)return null;
      const pA=portPositions[w.srcPort],pB=portPositions[w.tgtPort];
      if(!pA||!pB)return null;
      const sA=pA.side, sB=pB.side;
      const isErr=sN.status==='error';
      const srcTier=tierMap[sN.gid]||'worker';
      const accent=getTheme(srcTier).accent;
      const path=makeSimpleBezier(pA.x,pA.y,pB.x,pB.y,sA,sB);
      return{i,src:w.src,tgt:w.tgt,srcPort:w.srcPort,tgtPort:w.tgtPort,pA,pB,sA,sB,isErr,accent,path};
    }).filter(Boolean);
  },[wires,nodes,groups,portPositions]);

  /* ── LOD computation (also computed earlier for layout — kept here for reference) ── */

  /* ── MOUSE DOWN ── */
  const DRAG_THRESHOLD=5;
  const onMD=useCallback(e=>{
    if(e.button!==0||modal||wizard||panelExitPromptRef.current||groupExitPromptRef.current)return;
    /* If click is inside the side panel or its portaled dropdowns, let it handle its own events */
    if(e.target.closest('.panel-enter')||e.target.closest('#panel-model-dd')||e.target.closest('#node-model-dd')||e.target.closest('#panel-group-dd'))return;
    const tag=e.target.tagName;
    /* Buttons/options handle their own actions — let them through */
    if(tag==='BUTTON'||tag==='OPTION')return;

    const portEl=e.target.closest('[data-port-id]');
    if(portEl){
      e.preventDefault();
      e.stopPropagation();
      if(cRef.current&&e.pointerId!==undefined)cRef.current.setPointerCapture(e.pointerId);

      /* Read exact port identity from DOM — no searching, no guessing */
      const pid=portEl.getAttribute('data-port-id');
      const nid=portEl.getAttribute('data-nid');
      const side=portEl.getAttribute('data-port');
      const pp=portPositions[pid];
      const portPos=pp?{x:pp.x,y:pp.y}:null;

      interRef.current={type:'wiring'};

      /* Check if this port has a wire attached */
      const wireIdx=wires.findIndex(w=>w.srcPort===pid||w.tgtPort===pid);
      if(wireIdx>=0){
        /* Connected port → detach wire, enter reconnect drag from the OTHER end */
        const ew=wires[wireIdx];
        const isSource=ew.srcPort===pid;
        const otherPortId=isSource?ew.tgtPort:ew.srcPort;
        const otherNid=isSource?ew.tgt:ew.src;
        const otherPP=portPositions[otherPortId];
        const otherSide=otherPP?otherPP.side:'right';
        const otherPos=otherPP?{x:otherPP.x,y:otherPP.y}:null;
        const wd=wireData.find(w=>w.i===wireIdx);
        if(wd)setDyingWires([{path:wd.path}]);

        delete sideAssignRef.current[ew.src+'\u2192'+ew.tgt];

          const nw=ws.filter((_,i)=>i!==wireIdx);
          if(autoShrinkPorts(nodes,nw))setNodes([...nodes]);

        });
        setWiringFrom({nid:otherNid,portId:otherPortId,side:otherSide,portPos:otherPos,isDragDisconnect:true});
        setWiringMouse(toCanvas(e.clientX,e.clientY));
      }else{
        /* Unconnected port → start new connection drag */
        setWiringFrom({nid,portId:pid,side,portPos,isDragDisconnect:false});
        setWiringMouse(toCanvas(e.clientX,e.clientY));
      }
      return;
    }

    /* NODE CLICK — entire node uses pending→drag threshold */
    const nodeEl=e.target.closest('[data-node]');
    if(nodeEl){
      const nid=nodeEl.getAttribute('data-node');
      const nd=nodes.find(n=>n.id===nid);if(!nd)return;
      const g=groups.find(g=>g.id===nd.gid);
      if(wiringFrom){setWiringFrom(null);setWiringMouse(null)}
      const absX=g?g.x+nd.x:nd.x,absY=g?g.y+getDims(zoom).gh+2+nd.y:nd.y;
      const c=toCanvas(e.clientX,e.clientY);
      const isFormEl=tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT';
      setSelected(nid);
      interRef.current={type:'pending_node',id:nid,
        startX:e.clientX,startY:e.clientY,
        ox:c.x-absX,oy:c.y-absY,isFormEl,
        origGid:nd.gid,origX:nd.x,origY:nd.y,origCol:nd.col,origRow:nd.row};
      e.stopPropagation();return;
    }

    /* GROUP HEADER DRAG — also uses pending threshold */
    const ghEl=e.target.closest('[data-gh]');
    if(ghEl){
      const gid=ghEl.getAttribute('data-gh');
      const g=groups.find(g=>g.id===gid);if(!g)return;
      const c=toCanvas(e.clientX,e.clientY);
      interRef.current={type:'pending_group',id:gid,
        startX:e.clientX,startY:e.clientY,
        ox:c.x-g.x,oy:c.y-g.y};
      e.stopPropagation();return;
    }

    /* Cancel wiring on empty canvas click */
    if(wiringFrom){setWiringFrom(null);setWiringMouse(null);return}

    /* PAN — clear selection and sidebar (prompt if unsaved) */
    interRef.current={type:'panning',sx:e.clientX-pan.x,sy:e.clientY-pan.y};
    if(panelDirtyRef.current){panelExitRef.current&&panelExitRef.current();return}
    if(groupDirtyRef.current){groupExitRef.current&&groupExitRef.current();return}
    setSelected(null);
    setSelectedGroup(null);
    setPanelNode(null);
    setGroupPreview(null);setGroupEdit(null);
  },[nodes,groups,pan,zoom,wiringFrom,wires,modal,wizard,toCanvas,portPositions,portsByNode,wireData]);

  /* ── MOUSE MOVE ── */
  const onMM=useCallback(e=>{
    /* Wiring mouse tracking — follows cursor from port */
    if(wiringFrom){
      const c=toCanvas(e.clientX,e.clientY);
      /* ── Magnetic snap: pull toward nearest real port anchor ── */
      const SNAP_DIST=30;
      let snapTarget=null, bestD=SNAP_DIST;
      nodes.forEach(nd=>{
        if(nd.id===wiringFrom.nid)return;
        const np=portsByNode[nd.id];if(!np)return;
        SIDES.forEach(side=>{
          (np[side]||[]).forEach(slot=>{
            const d=Math.sqrt((c.x-slot.x)**2+(c.y-slot.y)**2);
            if(d<bestD){bestD=d;snapTarget={x:slot.x,y:slot.y,nid:nd.id,portId:slot.id,side}}
          });

      if(!interRef.current)return;
    }

    const ir=interRef.current;
    if(!ir)return;

    switch(ir.type){
      case 'wiring': return; /* locked for port drag — block canvas pan */
      case 'panning':
        setPan({x:e.clientX-ir.sx,y:e.clientY-ir.sy});
        break;

      case 'pending_node':{
        const dx=e.clientX-ir.startX,dy=e.clientY-ir.startY;
        if(!ir.isFormEl&&Math.sqrt(dx*dx+dy*dy)>DRAG_THRESHOLD){
          ir.type='dragging_node';
          /* Fall through to dragging_node */
        }else break;
      }
      /* falls through */
      case 'dragging_node':{
        const c=toCanvas(e.clientX,e.clientY);
        const{id,ox,oy,origGid}=ir;
        /* Compute absolute canvas position of the dragged node */
        const absNX=c.x-ox, absNY=c.y-oy;
        /* Store absolute position in interRef for use in mouseup */
        ir.lastAbsX=absNX; ir.lastAbsY=absNY;
        ir.lastCurX=c.x; ir.lastCurY=c.y;

        /* ── Detect which group the node centre is over (with snap margin) ── */
        const nodeCX=absNX+(nodes.find(n=>n.id===id)?.w||NW)/2;
        const nodeCY=absNY+(nodes.find(n=>n.id===id)?.h||NH)/2;
        const SNAP_MARGIN=200; /* px outside group edge — triggers highlight + snap */
        const SNAP_ACTIVATE=120; /* px outside group edge — triggers snap preview + ghost */
        const SNAP_CACHE_DIST=30; /* px cursor must move before re-evaluating cached snap target */
        let hoverGid=null;

        /* Phase 1: Check OTHER groups with SNAP_MARGIN (for approaching) */
        const lodGH=getDims(zoom).gh;
        for(const g of groups){
          if(g.id===origGid)continue; /* skip own group */
          const contentTop=g.y+lodGH;
          if(nodeCX>=g.x-SNAP_MARGIN && nodeCX<=g.x+g.w+SNAP_MARGIN && nodeCY>=contentTop-SNAP_MARGIN && nodeCY<=g.y+g.h+SNAP_MARGIN){
            hoverGid=g.id; break;
          }
        }

        /* Phase 2: Own group — use SNAP_MARGIN (same range as other groups).
           This allows dragging to expansion slots outside the group edge.
           Detach only happens when another group claims the node (Phase 1)
           or when truly far away (beyond SNAP_MARGIN). */
        if(!hoverGid && origGid){
          const g=groups.find(g=>g.id===origGid);
          if(g){
            const contentTop=g.y+lodGH;
            if(nodeCX>=g.x-SNAP_MARGIN && nodeCX<=g.x+g.w+SNAP_MARGIN && nodeCY>=contentTop-SNAP_MARGIN && nodeCY<=g.y+g.h+SNAP_MARGIN){
              hoverGid=origGid;
            }
          }
        }

        setDropTargetGroup(hoverGid ? hoverGid : '__detached');

        /* ── Compute directional snap preview with two-zone, direction lock, and caching ── */
        if(hoverGid){
          const tg=groups.find(g=>g.id===hoverGid);
          if(tg){
            /* Check if within the tighter SNAP_ACTIVATE zone */
            const contentTop=tg.y+lodGH;
            const inActivate=nodeCX>=tg.x-SNAP_ACTIVATE && nodeCX<=tg.x+tg.w+SNAP_ACTIVATE &&
                             nodeCY>=contentTop-SNAP_ACTIVATE && nodeCY<=tg.y+tg.h+SNAP_ACTIVATE;

            if(inActivate){
              /* Use CURSOR position (not node top-left) for slot proximity */
              const curRelX=c.x-tg.x, curRelY=c.y-tg.y-lodGH;
              /* Fix 1: clone before mutating — never touch React state directly */
              const groupNodes=nodes.filter(n=>n.gid===hoverGid && n.id!==id).map(n=>({...n}));
              groupNodes.forEach(n=>migrateNodeGrid(n,zoom));
              dedupeGrid(groupNodes,zoom);
              compactGrid(groupNodes,zoom);
              const dir=resolveEntryDirection(nodeCX,nodeCY,tg);

              const draggedNd=nodes.find(n=>n.id===id);
              const snap=findInsertionSlot(dir,groupNodes,curRelX,curRelY,zoom,draggedNd);
              const preview=previewExpandedSlot(snap.col,snap.row,groupNodes,zoom);
              /* Fix 7: store slot for mouseup reuse — ghost = drop */
              ir._lastSlot={col:snap.col,row:snap.row,gid:hoverGid};

              /* Snap stability: cache target, only re-evaluate if cursor moved significantly */
              const prev=ir._cachedSnap;
              if(prev && prev.gid===hoverGid && Math.hypot(c.x-(prev.cx||0),c.y-(prev.cy||0))<SNAP_CACHE_DIST){
                setSnapPreview({gid:hoverGid,x:prev.x,y:prev.y,dir});
              }else{
                ir._cachedSnap={gid:hoverGid,x:preview.x,y:preview.y,cx:c.x,cy:c.y};
                setSnapPreview({gid:hoverGid,x:preview.x,y:preview.y,dir});
              }
            }else{
              /* In SNAP_MARGIN but not SNAP_ACTIVATE: highlight group, no preview */
              setSnapPreview(null);
            }
          }
        }else{
          /* Exited snap zone — clean exit: clear everything synchronously */
          setSnapPreview(null);
          ir._lockedDir=null;ir._lockedGid=null;ir._cachedSnap=null;ir._lastSlot=null;
        }

        /* Update node visual position during drag (freeform for visual feedback) */
        setNodes(ns=>{
          const dragged=ns.find(n=>n.id===id);if(!dragged)return ns;
          const g=groups.find(g=>g.id===dragged.gid);
          let nx=g?absNX-g.x:absNX, ny=g?absNY-g.y-lodGH-2:absNY;
          return ns.map(n=>n.id===id?{...n,x:nx,y:ny}:n);
        });
        break;
      }

      case 'pending_group':{
        const dx=e.clientX-ir.startX,dy=e.clientY-ir.startY;
        if(Math.sqrt(dx*dx+dy*dy)>DRAG_THRESHOLD){
          ir.type='dragging_group';
          setSelected(null);setPanelNode(null);
        }else break;
      }
      /* falls through */
      case 'dragging_group':{
        const c=toCanvas(e.clientX,e.clientY);
        const{id,ox,oy}=ir;
        setGroups(gs=>pushGroups(id,gs.map(g=>g.id===id?{...g,x:c.x-ox,y:c.y-oy}:g)));
        break;
      }

      case 'resizing_group':{
        const c=toCanvas(e.clientX,e.clientY);
        const r=ir,dx=c.x-r.scx,dy=c.y-r.scy;
        /* Content-aware minimum width: prevent nodes from overlapping.
           Uses EP for edge padding, MIN_SPACING=20 for minimum inter-node gap. */
        const MIN_SPACING=40; /* minimum inter-node gap during resize — matches routing clearance */
        const contentMinW=2*EP+r.cols*r.nodeW+(r.cols>1?(r.cols-1)*MIN_SPACING:0);
        const contentMinH=2*EP+r.rows*r.nodeH+(r.rows>1?(r.rows-1)*MIN_SPACING:0)+getDims(zoom).gh;
        const _ld=getDims(zoom);
        const minW=Math.max(minGW(_ld),contentMinW);
        const minH=Math.max(minGH(_ld),contentMinH);
        let newX=r.x,newY=r.y,newW=r.w,newH=r.h;
        if(r.hnd.includes('e'))newW=Math.max(minW,r.w+dx);
        if(r.hnd.includes('s'))newH=Math.max(minH,r.h+dy);
        if(r.hnd.includes('w')){newW=Math.max(minW,r.w-dx);newX=r.x+(r.w-newW)}
        if(r.hnd.includes('n')){newH=Math.max(minH,r.h-dy);newY=r.y+(r.h-newH)}
        setGroups(gs=>pushGroups(r.id,gs.map(g=>g.id===r.id?{...g,x:newX,y:newY,w:newW,h:newH}:g)));
        if(r.origNodes&&r.origNodes.length>0&&r.rows>0&&r.cols>0){
          /* Even redistribution: distribute nodes evenly across available space.
             Symmetric by design — result depends only on target dimensions, not drag side. */
          const innerW=newW-EP*2, innerH=newH-getDims(zoom).gh-EP*2;
          if(innerW>0&&innerH>0){
            /* Compute even spacing for each row/column */
            const colSpace=r.cols>1?(innerW-r.cols*r.nodeW)/(r.cols-1):Math.max(0,(innerW-r.nodeW)/2);
            const rowSpace=r.rows>1?(innerH-r.rows*r.nodeH)/(r.rows-1):Math.max(0,(innerH-r.nodeH)/2);
            setNodes(ns=>ns.map(n=>{
              if(n.gid!==r.id)return n;
              const slot=r.nodeSlots[n.id];
              if(!slot)return n;
              const newNodeX=r.cols>1?EP+slot.col*(r.nodeW+colSpace):EP+colSpace;
              const newNodeY=r.rows>1?EP+slot.row*(r.nodeH+rowSpace):EP+rowSpace;
              return{...n,
                x:Math.max(10,Math.round(newNodeX)),
                y:Math.max(10,Math.round(newNodeY))
              };
            }));
          }
        }
        break;
      }
    }
  },[toCanvas,groups,nodes,wiringFrom,portsByNode,zoom]);

  /* ── MOUSE UP ── */
  const onMU=useCallback(e=>{
    /* ── Wiring drag release: resolve connection on mouseup ── */
    if(wiringFrom){
      /* ── Port detection on release — accept exact port, no guessing ── */
      let tgtNid=null, tgtPortId=null, tgtSide=null;
      const elUnder=document.elementFromPoint(e.clientX,e.clientY);
      const portEl=elUnder?.closest('[data-port-id]');
      if(portEl){
        /* Direct hit on a port element */
        tgtNid=portEl.getAttribute('data-nid');
        tgtPortId=portEl.getAttribute('data-port-id');
        tgtSide=portEl.getAttribute('data-port');
      }else if(wiringMouse&&wiringMouse.portId){
        /* Fallback: use snap target from mousemove */
        tgtNid=wiringMouse.nid;
        tgtPortId=wiringMouse.portId;
        tgtSide=wiringMouse.side;
      }
      if(tgtNid&&tgtNid!==wiringFrom.nid&&tgtPortId){
        /* Valid target → create port-to-port connection (skip if duplicate) */
        const srcPortId=wiringFrom.portId;
        setWires(w=>{
          const dup=w.some(e=>
            (e.srcPort===srcPortId&&e.tgtPort===tgtPortId)||
            (e.srcPort===tgtPortId&&e.tgtPort===srcPortId));
          if(dup)return w;
          const nw=[...w,{src:wiringFrom.nid,srcPort:srcPortId,tgt:tgtNid,tgtPort:tgtPortId}];
          /* Lock user-chosen sides so bestSide won't override them */
          const saKey=wiringFrom.nid+'\u2192'+tgtNid;
          sideAssignRef.current[saKey]={srcSide:wiringFrom.side,tgtSide,srcLocked:true,tgtLocked:true};
          /* Auto-expand: ensure 1 spare port per side */
          if(autoExpandPorts(nodes,nw))setNodes([...nodes]);
          return nw;
        });
      }
      setWiringFrom(null);setWiringMouse(null);
      interRef.current=null;
      if(cRef.current&&e.pointerId!==undefined){try{cRef.current.releasePointerCapture(e.pointerId)}catch(_){}}
    }

    const ir=interRef.current;
    if(!ir){return}

    switch(ir.type){
      case 'pending_node':
        /* Mouse released without moving past threshold = CLICK → open sidebar */
        if(panelDirtyRef.current&&panelNode&&panelNode!==ir.id){panelExitRef.current&&panelExitRef.current();break}
        setSelected(ir.id);
        setSelectedGroup(null); /* node selection overrides group selection */
        setPanelNode(prev=>prev===ir.id?null:ir.id);
        setGroupPreview(null);setGroupEdit(null);
        break;

      case 'pending_group':
        /* Click on group header — select this group, clear node selection */
        setSelectedGroup(prev=>prev===ir.id?null:ir.id);
        setSelected(null);setPanelNode(null);
        break;

      case 'dragging_node':{
        const nid=ir.id;
        const nd=nodes.find(n=>n.id===nid);
        setDropTargetGroup(null); /* clear highlight */
        setSnapPreview(null); /* clear snap ghost */
        if(nd){
          const lodGH=getDims(zoom).gh;
          const absNX=ir.lastAbsX!=null?ir.lastAbsX:(nAbs(nd,groups,zoom).x);
          const absNY=ir.lastAbsY!=null?ir.lastAbsY:(nAbs(nd,groups,zoom).y);
          const nodeCX=absNX+nd.w/2, nodeCY=absNY+nd.h/2;
          const SNAP_MARGIN=200;

          /* ── Determine target group (two-phase: other groups first, own group with SNAP_MARGIN) ── */
          let targetGid=null;

          /* Phase 1: OTHER groups with SNAP_MARGIN */
          for(const g of groups){
            if(g.id===ir.origGid)continue;
            const contentTop=g.y+lodGH;
            if(nodeCX>=g.x-SNAP_MARGIN && nodeCX<=g.x+g.w+SNAP_MARGIN && nodeCY>=contentTop-SNAP_MARGIN && nodeCY<=g.y+g.h+SNAP_MARGIN){
              targetGid=g.id; break;
            }
          }
          /* Phase 2: OWN group with SNAP_MARGIN (allows expansion slots outside edge) */
          if(!targetGid && ir.origGid){
            const g=groups.find(g=>g.id===ir.origGid);
            if(g){
              const contentTop=g.y+lodGH;
              if(nodeCX>=g.x-SNAP_MARGIN && nodeCX<=g.x+g.w+SNAP_MARGIN && nodeCY>=contentTop-SNAP_MARGIN && nodeCY<=g.y+g.h+SNAP_MARGIN){
                targetGid=ir.origGid;
              }
            }
          }

          /* ── Use locked direction from drag session, fallback to computed ── */
          const lockedDir=(ir._lockedDir && ir._lockedGid===targetGid)?ir._lockedDir:null;

          /* ── Fix 5: Consistent cursor coordinates — always use lastCurX/lastCurY ── */
          const curX=ir.lastCurX!=null?ir.lastCurX:(absNX+nd.w/2);
          const curY=ir.lastCurY!=null?ir.lastCurY:(absNY+nd.h/2);

          /* ── Unified drop handler (cross-group AND same-group use identical pipeline) ── */
          if(targetGid){
            const tg=groups.find(g=>g.id===targetGid);
            if(tg){
              const curRelX=curX-tg.x, curRelY=curY-tg.y-lodGH;
              /* Fix 1: clone before mutating */
              const groupNodes=nodes.filter(n=>n.gid===targetGid && n.id!==nid).map(n=>({...n}));
              groupNodes.forEach(n=>migrateNodeGrid(n,zoom));
              dedupeGrid(groupNodes,zoom);
              compactGrid(groupNodes,zoom);

              /* Fix 7: reuse preview slot, or recompute as fallback */
              let snap;
              if(ir._lastSlot && ir._lastSlot.gid===targetGid){
                snap={col:ir._lastSlot.col,row:ir._lastSlot.row,...gridToPosInGroup(ir._lastSlot.col,ir._lastSlot.row,groupNodes,zoom)};
              }else{
                const dir=lockedDir||resolveEntryDirection(nodeCX,nodeCY,tg);
                snap=findInsertionSlot(dir,groupNodes,curRelX,curRelY,zoom,nd);
              }

              const isCrossGroup=targetGid!==nd.gid;

              const expanded=expandGroupForPlacement(tg,snap.col,snap.row,groups,groupNodes,zoom,nd);

              /* Fix 6: post-expansion collision check */
              const safe=validateNoCollision(expanded.col,expanded.row,expanded.nodes);
              /* Use layout-aware position with the expanded nodes */
              const safePos=gridToPosInGroup(safe.col,safe.row,[...expanded.nodes,{col:safe.col,row:safe.row,w:nd.w,h:nd.h}],zoom);

              /* Compact source group if cross-group (node is leaving) */
              let sourceCompacted=[];
              if(isCrossGroup){
                sourceCompacted=nodes.filter(n=>n.gid===nd.gid && n.id!==nid).map(n=>({...n}));
                sourceCompacted.forEach(n=>migrateNodeGrid(n,zoom));
                compactGrid(sourceCompacted,zoom);
              }

              setGroups(expanded.groups);
              setNodes(ns=>ns.map(n=>{
                if(n.id===nid)return{...n,gid:targetGid,col:safe.col,row:safe.row,x:safePos.x,y:safePos.y};
                const shifted=expanded.nodes.find(en=>en.id===n.id);
                if(shifted)return{...n,col:shifted.col,row:shifted.row,x:shifted.x,y:shifted.y};
                if(isCrossGroup){
                  const compacted=sourceCompacted.find(sn=>sn.id===n.id);
                  if(compacted)return{...n,col:compacted.col,row:compacted.row,x:compacted.x,y:compacted.y};
                }
                return n;
              }));
            }
          }
          /* If no target group: drop on canvas as ungrouped node */
          if(!targetGid && ir.origGid){
            /* Place node at its current absolute position, ungrouped */
            const sourceG=groups.find(g=>g.id===ir.origGid);
            const dropX=absNX, dropY=absNY;
            /* Preserve the node's current color so it doesn't fall back to default blue */
            const nodeOverrideKey=tierMap['_node_'+nid];
            let preservedColor=null;
            if(nodeOverrideKey&&customThemesRef.current[nodeOverrideKey]){
              preservedColor=customThemesRef.current[nodeOverrideKey].accent;
            } else {
              const gTier=tierMap[ir.origGid]||'worker';
              const gTheme=customThemesRef.current[gTier]||customThemesRef.current[ir.origGid]||TIERS[gTier]||TIERS.worker;
              preservedColor=gTheme.accent;
            }
            if(preservedColor){
              const tid='dragout-'+Date.now()+'-'+nid;
              const nt=tintFromAccent(preservedColor);
              customThemesRef.current[tid]={nodeBg:nt.nodeBg,headerBg:nt.headerBg,accent:preservedColor,text:nt.text};
              tierMap[tid]=tid;
              tierMap['_node_'+nid]=tid;
            }
            /* Compact source group (node is leaving) */
            const sourceCompacted=nodes.filter(n=>n.gid===ir.origGid && n.id!==nid).map(n=>({...n}));
            sourceCompacted.forEach(n=>migrateNodeGrid(n,zoom));
            compactGrid(sourceCompacted,zoom);
            setNodes(ns=>ns.map(n=>{
              if(n.id===nid)return{...n,gid:null,col:null,row:null,x:dropX,y:dropY};
              const compacted=sourceCompacted.find(sn=>sn.id===n.id);
              if(compacted)return{...n,col:compacted.col,row:compacted.row,x:compacted.x,y:compacted.y};
              return n;
            }));
          }

          /* Clear all drag state */
          ir._lastSlot=null;ir._lockedDir=null;ir._lockedGid=null;ir._cachedSnap=null;

          /* ── Cable splice detection (preserved) ── */
          const c=nCtr(nd,groups);
          for(let wi=0;wi<wireData.length;wi++){
            const wd=wireData[wi];
            if(wd.src===nid||wd.tgt===nid)continue;
            if(pointNearBezier(c.x,c.y,wd.path,50)){
              setWires(ws=>{
                const oldW=ws[wd.i];
                const newW=ws.filter((_,i)=>i!==wd.i);
                const ndObj=nodes.find(n=>n.id===nid);
                if(ndObj&&ndObj.ports){
                  const srcSide=wd.sA?oppositeSide(wd.sA):'left';
                  const tgtSide=wd.sB?oppositeSide(wd.sB):'right';
                  const srcPorts=(ndObj.ports[srcSide]||[]);
                  const tgtPorts=(ndObj.ports[tgtSide]||[]);
                  const usedPorts=new Set();newW.forEach(w=>{usedPorts.add(w.srcPort);usedPorts.add(w.tgtPort)});
                  const freeIn=srcPorts.find(p=>!usedPorts.has(p.id));
                  const freeOut=tgtPorts.find(p=>!usedPorts.has(p.id));
                  if(freeIn&&freeOut&&oldW){
                    newW.push({src:oldW.src,srcPort:oldW.srcPort,tgt:nid,tgtPort:freeIn.id});
                    newW.push({src:nid,srcPort:freeOut.id,tgt:oldW.tgt,tgtPort:oldW.tgtPort});
                    if(autoExpandPorts(nodes,newW))setNodes([...nodes]);
                  }
                }
                return newW;
              });
              break;
            }
          }
        }
        break;
      }

      case 'wiring': /* already handled above */
      case 'dragging_group':
        /* Mark this group as manually positioned so cascade respects it */
        /* group positions now freely movable — no manual tracking needed */
        break;
      case 'panning':
        break;
      case 'resizing_group':{
        const gid=ir.id;
        /* Read latest group state via functional update — avoids stale closure.
           During resize, setGroups is called many times; the `groups` variable
           in this useCallback may be one frame behind. */
        setGroups(gs=>{
          const g=gs.find(g=>g.id===gid);
          if(g)manualGroupSizes.current[gid]={w:g.w,h:g.h};
          return gs; /* no mutation — just capturing the floor */
        });
        /* Snap nodes back to authoritative grid positions after resize ends.
           During resize, nodes get repositioned with dynamic spacing.
           On release, restore gridToPosInGroup so grid system stays consistent. */
        setNodes(ns=>{
          const gNodes=ns.filter(n=>n.gid===gid);
          return ns.map(n=>{
          if(n.gid!==gid)return n;
          if(n.col!=null&&n.row!=null){
            const pos=gridToPosInGroup(n.col,n.row,gNodes,zoom);
            return{...n,x:pos.x,y:pos.y};
          }
          return n;
        })});
        break;
      }
    }

    interRef.current=null;
    setDropTargetGroup(null);
    setSnapPreview(null);
  },[nodes,groups,wireData,wiringFrom,wiringMouse,toCanvas,portsByNode,snapPreview,zoom]);

  useEffect(()=>{
    window.addEventListener('pointermove',onMM);
    window.addEventListener('pointerup',onMU);
    return()=>{window.removeEventListener('pointermove',onMM);window.removeEventListener('pointerup',onMU)};
  },[onMM,onMU]);

  /* ── Escape key: cancel wiring / close sidebar / close modal ── */
  useEffect(()=>{
    const onKey=e=>{
      if(e.key==='Escape'){
        if(groupMenu){setGroupMenu(null)}
        else if(groupWizard){setGroupWizard(null)}
        else if(wiringFrom){setWiringFrom(null);setWiringMouse(null)}
        else if(wizard){setWizard(null)}
        else if(modal){setModal(null)}
        else if(groupEdit){if(groupDirtyRef.current){groupExitRef.current&&groupExitRef.current()}else{setGroupPreview(null);setGroupEdit(null)}}
        else if(panelNode){if(panelDirtyRef.current){panelExitRef.current&&panelExitRef.current()}else{setPanelNode(null);setSelected(null)}}
      }
      if(e.key==='d'||e.key==='D'){setDebugPorts(v=>!v)}
    };
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[wiringFrom,wizard,modal,groupEdit,panelNode]);

  /* ── resize starters ── */
  const startGResize=useCallback((e,gid,hnd)=>{
    e.stopPropagation();e.preventDefault();
    const g=groups.find(g=>g.id===gid);if(!g)return;
    const c=toCanvas(e.clientX,e.clientY);
    const origNodes=nodes.filter(n=>n.gid===gid).map(n=>({id:n.id,x:n.x,y:n.y,w:n.w,h:n.h,col:n.col,row:n.row}));
    /* Use authoritative col/row from grid system (not inferred from positions) */
    const nodeSlots={};
    origNodes.forEach(n=>{
      migrateNodeGrid(n,zoom); /* ensure col/row exist */
      nodeSlots[n.id]={row:n.row,col:n.col};
    });
    const usedRows=new Set(origNodes.map(n=>n.row));
    const usedCols=new Set(origNodes.map(n=>n.col));
    const rows=usedRows.size||1;
    const cols=usedCols.size||1;
    const nodeW=origNodes.length>0?Math.max(...origNodes.map(n=>n.w)):NW;
    const nodeH=origNodes.length>0?Math.max(...origNodes.map(n=>n.h)):NH;
    interRef.current={type:'resizing_group',id:gid,hnd,scx:c.x,scy:c.y,
      x:g.x,y:g.y,w:g.w,h:g.h,origNodes,rows,cols,nodeW,nodeH,nodeSlots};
  },[groups,nodes,toCanvas]);

  const startNResize=useCallback((e,nid,hnd)=>{
    e.stopPropagation();e.preventDefault();
    const nd=nodes.find(n=>n.id===nid);if(!nd)return;
    const c=toCanvas(e.clientX,e.clientY);
    const r={type:'node',id:nid,hnd,scx:c.x,scy:c.y,x:nd.x,y:nd.y,w:nd.w,h:nd.h};
    interRef.current={type:'resizing_node',id:nid};
    const mv=ev=>{
      const cc=toCanvas(ev.clientX,ev.clientY);
      const dx=cc.x-r.scx,dy=cc.y-r.scy;
      setNodes(ns=>ns.map(n=>{
        if(n.id!==r.id)return n;
        let{x,y,w,h}=r;
        if(hnd.includes('e'))w=Math.max(MIN_NW,r.w+dx);
        if(hnd.includes('s'))h=Math.max(MIN_NH,r.h+dy);
        if(hnd.includes('w')){const nw=Math.max(MIN_NW,r.w-dx);x=r.x+(r.w-nw);w=nw}
        if(hnd.includes('n')){const nh=Math.max(MIN_NH,r.h-dy);y=r.y+(r.h-nh);h=nh}
        return{...n,x,y,w,h};
      }));
    };
    const up=()=>{interRef.current=null;window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up)};
    window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
  },[nodes,toCanvas]);

  /* ── context menu: disconnect ── */
  const onCtx=useCallback(e=>{
    const portEl=e.target.closest('[data-port-id]');
    if(portEl){
      e.preventDefault();
      const pid=portEl.getAttribute('data-port-id');
      /* Find wire attached to this port */
      const wireIdx=wires.findIndex(w=>w.srcPort===pid||w.tgtPort===pid);
      if(wireIdx>=0){
        const ew=wires[wireIdx];
        delete sideAssignRef.current[ew.src+'\u2192'+ew.tgt];
        const wd=wireData.find(w=>w.i===wireIdx);
        if(wd)setDyingWires([{path:wd.path}]);
        setWires(ws=>{
          const nw=ws.filter((_,i)=>i!==wireIdx);
          if(autoShrinkPorts(nodes,nw))setNodes([...nodes]);
          return nw;
        });
      }
      return;
    }
    const wireEl=e.target.closest('[data-wire]');
    if(wireEl){
      e.preventDefault();
      const idx=parseInt(wireEl.getAttribute('data-wire'));
      const ew=wires[idx];
      if(ew)delete sideAssignRef.current[ew.src+'\u2192'+ew.tgt];
      const wd=wireData.find(w=>w.i===idx);
      if(wd)setDyingWires([{path:wd.path}]);
      setWires(ws=>{
        const nw=ws.filter((_,i)=>i!==idx);
        if(autoShrinkPorts(nodes,nw))setNodes([...nodes]);
        return nw;
      });
    }
  },[wires,wireData]);

  /* ── node mutations with confirmation ── */
  const updateNode=useCallback((id,patch)=>setNodes(ns=>ns.map(n=>n.id===id?{...n,...patch}:n)),[]);

  const requestDelete=useCallback(id=>{
    setModal({type:'delete',id,msg:'Are you sure you want to remove this node?',
      onConfirm:()=>{
        /* Animate connected wires dying */
        const dying=wireData.filter(wd=>wd.src===id||wd.tgt===id).map(wd=>({path:wd.path}));
        setDyingWires(dying);
        setNodes(ns=>ns.filter(n=>n.id!==id));
        setWires(ws=>ws.filter(w=>w.src!==id&&w.tgt!==id));
        if(selected===id)setSelected(null);
        if(panelNode===id)setPanelNode(null);
        setModal(null);
      }});
  },[wireData,selected,panelNode]);


  const addNode=useCallback(gid=>{
    setWizard({gid,step:0,name:'',tier:tierMap[gid]||'worker',model:'rules',prompt:'',constraints:''});
  },[]);

  const editGroup=useCallback(gid=>{
    const g=groups.find(g=>g.id===gid);if(!g)return;
    const theme=getTheme(g.tier);
    setPanelNode(null);setSelected(null);
    setGroupEdit({gid,label:g.label,customColor:theme.accent});
  },[groups]);

  const requestGroupDelete=useCallback(gid=>{
    const g=groups.find(g=>g.id===gid);if(!g)return;
    const theme=getTheme(g.tier);
    setPanelNode(null);setSelected(null);
    setGroupEdit({gid,label:g.label,customColor:theme.accent,_openDanger:true});
  },[groups]);

  /* ── Manual group reassignment — grid-based insertion into target group ── */
  const changeNodeGroup=useCallback((nid,newGid)=>{
    if(!newGid)return;
    const nd=nodes.find(n=>n.id===nid);
    if(!nd||nd.gid===newGid)return;
    const tg=groups.find(g=>g.id===newGid);
    if(!tg)return;
    const groupNodes=nodes.filter(n=>n.gid===newGid);
    groupNodes.forEach(n=>migrateNodeGrid(n,zoom));
    dedupeGrid(groupNodes,zoom);
    const cw=getDims(zoom).cw;
    const snap=findInsertionSlot('right',groupNodes,getDims(zoom).ep+groupNodes.length*(cw+getDims(zoom).ng),getDims(zoom).ep,zoom,nd);
    const expanded=expandGroupForPlacement(tg,snap.col,snap.row,groups,groupNodes,zoom,nd);
    /* Compact source group */
    const sourceNodes=nodes.filter(n=>n.gid===nd.gid && n.id!==nid);
    sourceNodes.forEach(n=>migrateNodeGrid(n,zoom));
    compactGrid(sourceNodes,zoom);
    setGroups(expanded.groups);
    setNodes(ns=>ns.map(n=>{
      if(n.id===nid)return{...n,gid:newGid,col:expanded.col,row:expanded.row,x:expanded.slotX,y:expanded.slotY};
      const shifted=expanded.nodes.find(en=>en.id===n.id);
      if(shifted)return{...n,col:shifted.col,row:shifted.row,x:shifted.x,y:shifted.y};
      const compacted=sourceNodes.find(sn=>sn.id===n.id);
      if(compacted)return{...n,col:compacted.col,row:compacted.row,x:compacted.x,y:compacted.y};
      return n;
    }));
  },[nodes,groups]);

  const addGroup=useCallback(tier=>{
    const id=tier+'-'+Date.now();
    const label=tier.charAt(0).toUpperCase()+tier.slice(1);
    const maxX=groups.reduce((mx,g)=>Math.max(mx,g.x+g.w),0);
    setGroups(gs=>pushGroups(id,[...gs,{id,label,tier,x:maxX+60,y:100,w:EP+NW+EP,h:GH+EP+NH+EP}]));
    tierMap[id]=tier;
  },[groups]);

  /* Multiplicative zoom: perceptually uniform at every zoom level */
  const zoomIn=useCallback(()=>setZoom(z=>clamp(z*1.1,0.1,2)),[]);
  const zoomOut=useCallback(()=>setZoom(z=>clamp(z/1.1,0.1,2)),[]);
  const zoomReset=useCallback(()=>{
    const vw=window.innerWidth,vh=window.innerHeight;
    const fit=findFitZoom(vw,vh,nodes,groups);
    setZoom(fit.z);
    const originX=groups.length?Math.min(...groups.map(g=>g.x)):0;
    const originY=groups.length?Math.min(...groups.map(g=>g.y)):0;
    setPan({x:(vw-fit.b.w*fit.z)/2-originX*fit.z,y:(vh-fit.b.h*fit.z)/2-originY*fit.z});
  },[nodes,groups]);
  const zoomCenter=useCallback(()=>{
    /* Re-center canvas without changing zoom level */
    const vw=window.innerWidth,vh=window.innerHeight;
    const minX=Math.min(...groups.map(g=>g.x));
    const minY=Math.min(...groups.map(g=>g.y));
    const maxX=Math.max(...groups.map(g=>g.x+g.w));
    const maxY=Math.max(...groups.map(g=>g.y+g.h));
    const gw=maxX-minX,gh=maxY-minY;
    setPan({x:(vw-gw*zoom)/2-minX*zoom,y:(vh-gh*zoom)/2-minY*zoom});
  },[groups,zoom]);

  /* ═══════════════════ RENDER ═══════════════════ */
  return(
    <div ref={cRef} style={{width:'100%',height:'100%',position:'relative',overflow:'hidden',
      cursor:interRef.current&&interRef.current.type!=='pending_node'&&interRef.current.type!=='pending_group'?'grabbing':'grab'}}
      onPointerDown={onMD} onContextMenu={onCtx}>

      {/* TOOLBAR */}
      <div style={{position:'absolute',top:0,left:0,right:0,height:56,zIndex:50,

        alignItems:'center',justifyContent:'space-between',padding:'12px 24px 0',pointerEvents:'none'}}>
        <div style={{pointerEvents:'auto'}}>
          <span style={{fontSize:17,fontWeight:700,color:'#e0e0e0',letterSpacing:1}}>DINERO v2</span>
          <span style={{fontSize:16,color:'#666',marginLeft:8}}>— Node Architect</span>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',pointerEvents:'auto'}}>
          <button onClick={()=>{

        {/* GROUPS */}
        {groups.map(g=>{

          /* ── Group selection logic ── */

          const gNodesInSel=selectedGroup?nodes.filter(n=>n.gid===selectedGroup):[];
          const gSelNodeIds=new Set(gNodesInSel.map(n=>n.id));
          /* Connected groups: any group containing a node wired to a node in the selected group */
          const connectedGroupIds=new Set();
          if(selectedGroup&&selectedGroup!==g.id){
            for(const w of wires){
              if(gSelNodeIds.has(w.src)){const tn=nodes.find(n=>n.id===w.tgt);if(tn&&tn.gid)connectedGroupIds.add(tn.gid);}

            }
          }
          const isGConn=connectedGroupIds.has(g.id);
          const gDimmed=selectedGroup!==null&&!isGSel&&!isGConn;
          const gBorder=isGSel?`2px solid ${t.accent}`:dropTargetGroup===g.id?`2px solid ${t.accent}`

          return(
            <div key={g.id} style={{position:'absolute',left:g.x,top:g.y,width:g.w,height:g.h,zIndex:isGSel?4:2,pointerEvents:'none',

                {(()=>{

                        opacity:0.85,transition:'opacity 0.15s, background 0.15s'}}

                      {showAddEdit&&<button onClick={e=>{e.stopPropagation();editGroup(g.id)}}

                      {showClose&&<button onClick={e=>{e.stopPropagation();setGroupMenu({gid:g.id})}}
                        onMouseDown={e=>e.stopPropagation()}
                        style={{background:t.accent+'22',border:`${P(2*gpd)}px solid ${t.accent}88`,color:t.text,
                          fontSize:btnFs,cursor:'pointer',padding:btnPadSm,lineHeight:1,
                          display:'flex',alignItems:'center',justifyContent:'center',borderRadius:btnBr,
                          fontWeight:700,opacity:0.85,transition:'opacity 0.15s, background 0.15s'}}
                        onMouseEnter={e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.background=t.accent+'44'}}
                        onMouseLeave={e=>{e.currentTarget.style.opacity='0.85';e.currentTarget.style.background=t.accent+'22'}}>✕</button>}
                    </div>
                  </div>;
                })()}
                {/* Drop zone highlight overlay with directional edge indicator + snap ghost */}
                {dropTargetGroup===g.id&&(()=>{
                  const sd=snapPreview&&snapPreview.gid===g.id?snapPreview.dir:null;
                  const edgeStyle=sd?{position:'absolute',background:`${t.accent}33`,borderRadius:3,
                    transition:'all 0.15s ease-out',
                    ...(sd==='right'?{right:0,top:0,width:6,height:'100%'}:
                       sd==='left'?{left:0,top:0,width:6,height:'100%'}:
                       sd==='bottom'?{bottom:0,left:0,height:6,width:'100%'}:
                       {top:0,left:0,height:6,width:'100%'})}:null;
                  return <div style={{position:'absolute',inset:0,top:getDims(zoom).gh,
                    background:`${t.accent}08`,borderTop:`2px dashed ${t.accent}66`,
                    pointerEvents:'none',animation:'dropZonePulse 1.2s ease-in-out infinite',overflow:'visible'}}>
                    {edgeStyle&&<div style={edgeStyle}/>}
                    {snapPreview&&snapPreview.gid===g.id?<div style={{
                      position:'absolute',left:snapPreview.x,top:snapPreview.y,
                      width:Math.min((interRef.current&&interRef.current.type==='dragging_node'&&nodes.find(n=>n.id===interRef.current.id)||{w:getDims(zoom).cw}).w,getDims(zoom).cw),
                      height:Math.min((interRef.current&&interRef.current.type==='dragging_node'&&nodes.find(n=>n.id===interRef.current.id)||{h:getDims(zoom).nh}).h,getDims(zoom).nh),borderRadius:10,
                      border:`2px dashed ${t.accent}88`,background:`${t.accent}11`,
                      transition:'left 0.15s ease-out, top 0.15s ease-out'}}/>:
                    <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',
                      color:t.accent,fontSize:14,fontWeight:700,letterSpacing:2,textTransform:'uppercase',
                      opacity:0.7,whiteSpace:'nowrap'}}>Drop to add</div>}
                  </div>;
                })()}
              </div>
              {/* Resize handles — outside overflow:hidden, higher z so they sit above nodes */}
              {resizeHandles(g.id,startGResize)}
            </div>
          );
        })}

        {/* NODES */}
        {nodes.map((nd,ni)=>{
          const g=nd.gid?groups.find(g=>g.id===nd.gid):null;
          const baseTier=nd.gid?(tierMap[nd.gid]||'worker'):'worker';
          const nodeOverrideTier=tierMap['_node_'+nd.id];
          const tier=nodeOverrideTier||baseTier;
          const gpNode=groupPreview&&groupPreview.gid===nd.gid?groupPreview:null;
          const nodePreviewColor=gpNode&&gpNode.perNodeColors&&gpNode.perNodeColors[nd.id]?gpNode.perNodeColors[nd.id]:null;
          const groupPreviewColor=gpNode&&!nodePreviewColor?gpNode.accent:null;
          const t=nodePreviewColor?{...getTheme(tier),...tintFromAccent(nodePreviewColor),accent:nodePreviewColor}
            :groupPreviewColor?{...getTheme(tier),...tintFromAccent(groupPreviewColor),accent:groupPreviewColor}
            :getTheme(tier);
          const abs=g?nAbs(nd,groups,zoom):{x:nd.x,y:nd.y};
          const _d=getDims(zoom);
          const fs=_d.fs||1, pd=_d.pd||1; /* font scale + padding scale */
          /* Ensure node is large enough to contain all counter-scaled ports */
          const _pm=portMinDims(nd,zoom,portsByNode);
          const lodW=Math.max(Math.min(nd.w,_d.cw),_pm.minW);
          const lodH=Math.max(Math.min(nd.h,_d.nh),_pm.minH);
          const isErr=nd.status==='error';
          const isSel=selected===nd.id;
          const connectedToHover=hoverNode!==null&&hoverNode!==nd.id&&wires.some(w=>(w.src===hoverNode&&w.tgt===nd.id)||(w.tgt===hoverNode&&w.src===nd.id));
          const connectedToSel=selected!==null&&selected!==nd.id&&wires.some(w=>(w.src===selected&&w.tgt===nd.id)||(w.tgt===selected&&w.src===nd.id));
          /* Group selection: node is in selected group, or wired to a node in selected group */
          const inSelGroup=selectedGroup!==null&&nd.gid===selectedGroup;
          const connectedToSelGroup=selectedGroup!==null&&!inSelGroup&&(()=>{
            const gNids=new Set(nodes.filter(n=>n.gid===selectedGroup).map(n=>n.id));
            return wires.some(w=>(gNids.has(w.src)&&w.tgt===nd.id)||(gNids.has(w.tgt)&&w.src===nd.id));
          })();
          const gSelDimmed=selectedGroup!==null&&!inSelGroup&&!connectedToSelGroup;
          const sb='sb-'+t.accent.replace('#','');
          const mdl=MODELS.find(m=>m.id===nd.model)||MODELS[0];
          const nodeDelay=ni*0.04; /* stagger each node by 40ms */

          /* ════════════════════════════════════════════════════════════
             LOD RENDER FUNCTIONS — 4 discrete components, no shared logic
             ════════════════════════════════════════════════════════════ */

          /* ── renderStrip: horizontal bar — NOT a card ── */
          const renderStrip=()=>{const P=Math.round;return<>
            <div data-nheader="1" style={{height:lodH,display:'flex',alignItems:'center',
              gap:P(10*pd),paddingLeft:P(18*pd),paddingRight:P(12*pd),flexShrink:0,

              <div style={{width:P(12*fs),height:P(12*fs),borderRadius:P(6*fs),flexShrink:0,

                boxShadow:`0 0 ${P(8*fs)}px ${isErr?'#cc333366':mdl.color+'55'}`}}/>
              <span style={{flex:1,color:isErr?'#ff6666':t.text,fontSize:P(28*fs),fontWeight:700,
                overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                letterSpacing:P(1*fs),opacity:0.9}}>{nd.label}</span>
              <span onClick={e=>{e.stopPropagation();updateNode(nd.id,{status:nd.status==='ok'?'error':'ok'})}}
                onMouseDown={e=>e.stopPropagation()}
                style={{color:isErr?'#cc3333':t.accent,fontSize:P(28*fs),cursor:'pointer',
                  opacity:0.5,padding:`0 ${P(4*pd)}px`,lineHeight:1}}>{isErr?'⚠':'✓'}</span>
              <span onClick={e=>{e.stopPropagation();requestDelete(nd.id)}}
                onMouseDown={e=>e.stopPropagation()}
                style={{color:t.text,fontSize:P(28*fs),cursor:'pointer',
                  opacity:0.4,padding:`0 ${P(4*pd)}px`,lineHeight:1}}>✕</span>
            </div>
          </>};

          /* ── renderMinimal: label card — title band + blank body ── */
          const renderMinimal=()=>{
            const P=Math.round, dotSz=P(10*pd);
            return <>
            <div data-nheader="1" style={{display:'flex',alignItems:'center',
              padding:`${P(20*pd)}px ${P(28*pd)}px`,gap:P(12*pd),flexShrink:0,

              <div style={{width:dotSz,height:dotSz,borderRadius:dotSz/2,flexShrink:0,
                background:isErr?'#cc3333':t.accent,opacity:0.7}}/>
              <span style={{flex:1,color:isErr?'#ff6666':t.text,fontSize:P(28*fs),fontWeight:600,
                overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{nd.label}</span>
              {nd.auth&&<span style={{fontSize:P(20*fs),fontWeight:700,background:'#d4a03022',
                color:'#d4a030',padding:`${P(4*pd)}px ${P(10*pd)}px`,borderRadius:P(4*pd),letterSpacing:0.8,

                onMouseLeave={()=>{window._tipTimer=setTimeout(()=>setBadgeTip(null),150)}}>
                <span style={{fontSize:P(20*fs),fontWeight:700,background:'#cc333322',
                  color:'#ff6666',padding:`${P(4*pd)}px ${P(10*pd)}px`,borderRadius:P(4*pd),letterSpacing:0.8}}>err</span>
              </span>}
              <span onClick={e=>{e.stopPropagation();updateNode(nd.id,{status:nd.status==='ok'?'error':'ok'})}}
                onMouseDown={e=>e.stopPropagation()}
                style={{color:isErr?'#cc3333':t.accent,fontSize:P(28*fs),cursor:'pointer',
                  opacity:0.5,lineHeight:1}}>{isErr?'⚠':'✓'}</span>
              <span onClick={e=>{e.stopPropagation();requestDelete(nd.id)}}
                onMouseDown={e=>e.stopPropagation()}

            return <>
            <div data-nheader="1" style={{height:hdrH,background:isErr?'#2a1414':t.headerBg,display:'flex',
              alignItems:'center',padding:`0 ${hdrPad}px`,gap:P(14*pd),

              <div style={{width:dotSz,height:dotSz,borderRadius:dotSz/2,flexShrink:0,
                background:isErr?'#cc3333':t.accent,

              <span style={{flex:1,color:isErr?'#ff6666':t.text,fontSize:P(28*fs),fontWeight:600,overflow:'hidden',

                <span style={{fontSize:P(20*fs),fontWeight:700,background:'#d4a03033',

                onMouseLeave={()=>{window._tipTimer=setTimeout(()=>setBadgeTip(null),150)}}>
                <span style={{fontSize:P(20*fs),fontWeight:700,background:'#cc333333',
                  color:'#ff6666',padding:`${P(6*pd)}px ${P(14*pd)}px`,borderRadius:P(5*pd),letterSpacing:1}}>ERROR</span>
              </span>}
              <button onClick={e=>{e.stopPropagation();updateNode(nd.id,{status:nd.status==='ok'?'error':'ok'})}}
                onMouseDown={e=>e.stopPropagation()}
                style={{background:t.accent+'15',border:`1px solid ${t.accent}44`,color:isErr?'#cc3333':t.accent,
                  fontSize:P(28*fs),cursor:'pointer',padding:0,lineHeight:1,width:btnSz,height:btnSz,
                  display:'flex',alignItems:'center',justifyContent:'center',borderRadius:P(8*pd),
                  opacity:0.7,transition:'opacity 0.15s, background 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.background=t.accent+'33'}}
                onMouseLeave={e=>{e.currentTarget.style.opacity='0.7';e.currentTarget.style.background=t.accent+'15'}}>{isErr?'⚠':'✓'}</button>
              <button onClick={e=>{e.stopPropagation();requestDelete(nd.id)}}
                onMouseDown={e=>e.stopPropagation()}
                style={{background:t.accent+'15',border:`1px solid ${t.accent}44`,color:t.text,
                  fontSize:P(28*fs),cursor:'pointer',padding:0,lineHeight:1,width:btnSz,height:btnSz,
                  display:'flex',alignItems:'center',justifyContent:'center',borderRadius:P(8*pd),
                  opacity:0.7,transition:'opacity 0.15s, background 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.background=t.accent+'33'}}
                onMouseLeave={e=>{e.currentTarget.style.opacity='0.7';e.currentTarget.style.background=t.accent+'15'}}>✕</button>
            </div>
            {nd.h>=THRESH_MODEL&&(
              <div style={{padding:`${P(16*pd)}px ${P(32*pd)}px`,borderBottom:`1px solid ${isErr?'#cc333322':t.accent+'15'}`,
