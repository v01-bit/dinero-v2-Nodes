<style>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

<script type="text/babel" data-type="module">
const {useState,useRef,useCallback,useEffect,useMemo}=React;

/* ═══════════════════ CONSTANTS ═══════════════════ */
const TIERS={
  orchestrator:{nodeBg:'#162a1e',headerBg:'#1a3028',accent:'#38d07a',text:'#70e8a8'},
  manager:{nodeBg:'#262010',headerBg:'#2a2418',accent:'#d4a030',text:'#e8c868'},
  worker:{nodeBg:'#101c28',headerBg:'#162430',accent:'#4098d8',text:'#78c0f0'},
  infra:{nodeBg:'#1c1224',headerBg:'#221830',accent:'#9860d8',text:'#b888f0'},
};
const MODELS=[
  {id:'rules',label:'Code / Rules',cost:'Free',color:'#888'},
  {id:'small',label:'Small LLM',cost:'$',color:'#4098d8'},
  {id:'medium',label:'Medium LLM',cost:'$$',color:'#d4a030'},
  {id:'premium',label:'Premium LLM',cost:'$$$',color:'#38d07a'},
  {id:'embeddings',label:'Embeddings',cost:'$',color:'#9860d8'},
  {id:'custom',label:'Custom',cost:'—',color:'#666'},
];
const GH=84, GAP=50, MIN_NW=400, MIN_NH=80;
/* LOD-aware minimum group sizes — scale with layout dimensions so groups
   don't stretch wider/taller than their content at lower zoom tiers. */
function minGW(ld){ return Math.max(ld.cw*0.5+ld.ep*2, 120); }
function minGH(ld){ return Math.max(ld.nh*0.5+ld.ep*2+ld.gh, 100); }
const tierMap={orchestrator:'orchestrator',managers:'manager',workers:'worker',infra:'infra'};

/* ═══════════════════ DEFAULT DATA ═══════════════════ */
/* Responsive layout: sizes and positions adapt to viewport */
const NW=820, NH=400, NS=40; /* default node width, height, spacing */
/* ── Progressive collapse thresholds (strict order) ── */
const THRESH_PROMPT_BODY=NH;      /* 1st: hide prompt textarea body */
const THRESH_PROMPT_LABEL=NH-80;  /* 2nd: hide "BEHAVIOUR PROMPT" label */
const THRESH_MODEL=NH-160;        /* 3rd: hide model dropdown row */
/* Below THRESH_MODEL: header only */
const THRESH_WIDTH_COMPACT=550;   /* width below which padding compresses */
/* ── Display zoom baseline: internal 0.34 = displayed 100% ── */
const ZOOM_BASELINE=0.408;
/* ── LOD (Level-of-Detail) system ── */
function getLOD(zoom){
  if(zoom>=0.34)return'full';
  if(zoom>=0.255)return'compact';
  if(zoom>=0.221)return'minimal';
  return'strip';
}
const COL_WIDTH={full:820,compact:520,minimal:320,strip:220};
const LOD_DIMS={
  full:   {nh:400,ep:40,ng:160,vg:160,gh:84,gap:50},
  compact:{nh:240,ep:30,ng:100,vg:80, gh:60,gap:30},
  minimal:{nh:140,ep:20,ng:50, vg:36, gh:40,gap:16},
  strip:  {nh:70, ep:12,ng:24, vg:16, gh:28,gap:8},
};
/* Smooth LOD interpolation — no hard jumps between tiers.
   Linearly interpolates all dimensions based on continuous zoom value.
   LOD tier string is only used for content visibility decisions. */
const _LOD_STOPS=[
  {z:0.34,  cw:820,nh:400,ep:40,ng:160,vg:160,gh:84,gap:50,fs:1.0,pd:1.0},
  {z:0.255, cw:520,nh:240,ep:30,ng:100,vg:80, gh:60,gap:30,fs:1.25,pd:0.7},
  {z:0.221, cw:320,nh:140,ep:20,ng:50, vg:36, gh:52,gap:16,fs:1.5,pd:0.5},
  {z:0.17,  cw:220,nh:70, ep:12,ng:24, vg:16, gh:64,gap:8, fs:2.0,pd:0.35},
];
function _lerpDims(zoom){
  const S=_LOD_STOPS;
  if(zoom>=S[0].z)return S[0];
  if(zoom<=S[S.length-1].z)return S[S.length-1];
  for(let i=0;i<S.length-1;i++){
    if(zoom>=S[i+1].z){
      const t=(zoom-S[i+1].z)/(S[i].z-S[i+1].z);
      const a=S[i],b=S[i+1];
      const L=(x,y)=>Math.round(y+(x-y)*t);
      const Lf=(x,y)=>+(y+(x-y)*t).toFixed(3);
      return{cw:L(a.cw,b.cw),nh:L(a.nh,b.nh),ep:L(a.ep,b.ep),ng:L(a.ng,b.ng),
        vg:L(a.vg,b.vg),gh:L(a.gh,b.gh),gap:L(a.gap,b.gap),fs:Lf(a.fs,b.fs),pd:Lf(a.pd,b.pd)};
    }
  }
  return S[S.length-1];
}
/* Cached interpolated dims — call with zoom, returns {cw,nh,ep,ng,vg,gh,gap} */
let _dimCache={z:-1,d:null};
function getDims(zoom){
  if(Math.abs(zoom-_dimCache.z)<0.0001)return _dimCache.d;
  const d=_lerpDims(zoom);
  /* Exact counter-scale: fs * zoom = constant (0.34) at all zoom levels.
     This keeps text at a stable screen-pixel size instead of interpolating
     fs between LOD stops which produces jumpy, inconsistent sizing. */
  d.fs=Math.max(1,0.34/Math.max(zoom,0.05));
  _dimCache={z:zoom,d:d};
  return d;
}
/* Resolve LOD param: accepts zoom number (interpolated) or tier string (fixed) */
function _ld(lod){return typeof lod==='number'?getDims(lod):Object.assign({cw:COL_WIDTH[lod||'full']},LOD_DIMS[lod||'full'])}
const EP=40; /* edge padding inside groups — room for wire lanes */
const NG=160; /* horizontal gap between nodes — routing clearance */
/* Estimate total content bounds for a given LOD tier (for fit-to-screen) */
function estimateTierBounds(tier,nodes,groups){
  const ld=LOD_DIMS[tier],cw=COL_WIDTH[tier];
  const gSizes=[];
  let maxW=0;
  groups.forEach(g=>{
    const gn=nodes.filter(n=>n.gid===g.id);
    if(!gn.length){gSizes.push({w:200,h:ld.gh+ld.ep*2});return}
    let mc=0,mr=0;
    gn.forEach(n=>{if(n.col!=null)mc=Math.max(mc,n.col);if(n.row!=null)mr=Math.max(mr,n.row)});
    const w=ld.ep*2+(mc+1)*cw+mc*ld.ng;
    const h=ld.gh+2+ld.ep*2+(mr+1)*ld.nh+mr*ld.vg;
    maxW=Math.max(maxW,w);
    gSizes.push({w,h});
  });
  const totalH=gSizes.reduce((s,g)=>s+g.h,0)+(gSizes.length-1)*ld.gap;
  return{w:maxW,h:totalH};
}
/* Find self-consistent fit zoom across LOD tiers.
   For each tier (largest first), compute content bounds and fit zoom.
   If the fit zoom doesn't land in the tier, clamp it to the tier's range
   and verify content still fits. Pick the first (largest) tier that works. */
const TIER_RANGE={full:[0.34,2],compact:[0.255,0.3399],minimal:[0.221,0.2549],strip:[0.15,0.2209]};
function findFitZoom(vw,vh,nodes,groups){
  const FPAD=60;
  const tiers=['full','compact','minimal','strip'];
  for(const tier of tiers){
    const b=estimateTierBounds(tier,nodes,groups);
    if(b.w<=0||b.h<=0)continue;
    let z=clamp(Math.min((vw-FPAD*2)/b.w,(vh-FPAD*2)/b.h),0.15,1.2);
    /* If fit zoom lands outside this tier, clamp to tier's range */
    if(getLOD(z)!==tier) z=clamp(z,TIER_RANGE[tier][0],TIER_RANGE[tier][1]);
    /* Verify content fits at clamped zoom */
    if(b.w*z>vw-FPAD*2||b.h*z>vh-FPAD*2)continue;
    return{z,tier,b};
  }
  /* Fallback: smallest tier at minimum zoom */
  const b=estimateTierBounds('strip',nodes,groups);
  return{z:0.15,tier:'strip',b};
}
/* ── Wire routing constants ── */
const VG=160; /* vertical gap between node rows — matches horizontal gap */
/* Computed positions for evenly-spaced column layout within groups */
const C0=EP, C1=EP+NW+NG, C2=EP+2*(NW+NG), C3=EP+3*(NW+NG); /* col x positions */
const R0=EP, R1=EP+NH+VG; /* row y positions */
const GW4=EP+4*NW+3*NG+EP; /* group width for 4 cols: 1720 */
const GW2=EP+2*NW+1*NG+EP; /* group width for 2 cols: 880 */
const GW1=EP+NW+EP; /* group width for 1 col: 460 */
const GH1=EP+NH+EP+GH; /* group height for 1 row + header: 284 */
const GH2=EP+2*NH+VG+EP+GH; /* group height for 2 rows + header: 494 */

/* ── Responsive fit-to-canvas layout ── */
function mkGroups(){
  const vw=window.innerWidth, vh=window.innerHeight;
  /* Canvas margin: percentage-based so it scales with screen */
  const MARGIN_X=Math.max(60,vw*0.04);
  const MARGIN_Y=Math.max(60,vh*0.05);
  /* Available canvas area (in canvas coords, at zoom=1) */
  const availW=vw-MARGIN_X*2;
  const availH=vh-MARGIN_Y*2;
  /* Tier vertical spacing: distribute 4 tiers across available height */
  const tierHeights=[GH1, GH1, GH2, GH1]; /* orchestrator, managers, workers, infra */
  const totalGroupH=tierHeights.reduce((s,h)=>s+h,0);
  const vertSlack=availH-totalGroupH;
  const TIER_GAP=Math.max(GAP, vertSlack/3); /* 3 gaps between 4 tiers */
  /* Compute y positions for each tier row */
  const y0=MARGIN_Y;
  const y1=y0+GH1+TIER_GAP;
  const y2=y1+GH1+TIER_GAP;
  const y3=y2+GH2+TIER_GAP;
  /* Horizontal positioning: left-align all groups so they stay visually
     consistent as widths change across LOD tiers on zoom in/out */
  const orchX=MARGIN_X;
  const mgrX=MARGIN_X;
  const wrkX=MARGIN_X;
  const infraX=MARGIN_X;
  return[
    {id:'orchestrator',label:'Orchestrator',tier:'orchestrator',x:orchX,y:y0,w:GW1,h:GH1},
    {id:'managers',label:'Managers',tier:'manager',x:mgrX,y:y1,w:GW4,h:GH1},
    {id:'workers',label:'Workers',tier:'worker',x:wrkX,y:y2,w:GW4,h:GH2},
    {id:'infra',label:'Infrastructure',tier:'infra',x:infraX,y:y3,w:GW2,h:GH1},
  ];
}
function mkNodes(){return[
  {id:'din-core',gid:'orchestrator',label:'DIN-CORE',col:0,row:0,x:C0,y:R0,w:NW,h:NH,model:'premium',status:'ok',auth:false,
   prompt:'You are DIN-CORE. Maintain the unified world model. Coordinate all managers. Resolve inter-domain conflicts. Set system posture from regime. Your decisions bind all downstream nodes.',
   ports:{bottom:[{id:'din-core:b0'},{id:'din-core:b1'},{id:'din-core:b2'},{id:'din-core:b3'},{id:'din-core:b4'},{id:'din-core:b5'},{id:'din-core:b6'}],top:[{id:'din-core:t0'}],right:[{id:'din-core:r0'}],left:[{id:'din-core:l0'}]}},
  {id:'regime-mgr',gid:'managers',label:'Regime manager',col:0,row:0,x:C0,y:R0,w:NW,h:NH,model:'medium',status:'ok',auth:true,
   authPerms:['Set system posture for all downstream nodes — regime classification propagates binding directives','Override aggression and max position size — controls risk exposure limits across the entire portfolio','Restrict allowed instruments by regime — filters tradeable assets based on current market classification','Bind signal thresholds across managers — enforces minimum confidence levels before action is permitted'],
   prompt:'Classify: CRISIS / RISK_OFF / NEUTRAL / RISK_ON / TRENDING_BULL / TRENDING_BEAR. Confidence 0-100. Posture: aggression 0-1, max size, allowed instruments, signal threshold. Binding on all downstream.',

/* ═══════════════════ GEOMETRY HELPERS ═══════════════════ */
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function nAbs(n,gs,lod){const g=gs.find(g=>g.id===n.gid);const gh=_ld(lod).gh;return g?{x:g.x+n.x,y:g.y+gh+2+n.y}:{x:n.x,y:n.y}}

/* ── Immutable port system ──
   Ports are defined once per node in mkNodes(). Their identity and order never change.
   Wires reference port IDs. No side inference exists. */
const PORT_SEP=36; /* spacing between stacked ports on same side */
const SIDES=['right','left','top','bottom'];
function oppositeSide(s){return{right:'left',left:'right',top:'bottom',bottom:'top'}[s]}
/* Minimum node dimensions to contain all counter-scaled ports.
   Uses portsByNode (dynamic side assignments) when available,
   falls back to nd.ports (static definitions). */
function portMinDims(nd,zoom,pbn){
  const d=getDims(zoom);
  const pfs=Math.min(d.fs||1,2.5);
  const pSep=Math.max(PORT_SEP,Math.round(20*pfs*1.8));
  const pOuter=Math.round(20*pfs);
  let maxV=0,maxH=0;
  if(pbn&&pbn[nd.id]){
    const np=pbn[nd.id];
    maxV=Math.max((np.right||[]).length,(np.left||[]).length);
    maxH=Math.max((np.top||[]).length,(np.bottom||[]).length);
  }else if(nd.ports){
    maxV=Math.max((nd.ports.right||[]).length,(nd.ports.left||[]).length);
    maxH=Math.max((nd.ports.top||[]).length,(nd.ports.bottom||[]).length);
  }
  return{
    minW:maxH>0?(maxH-1)*pSep+pOuter:0,
    minH:maxV>0?(maxV-1)*pSep+pOuter:0
  };
}

/* Get port position on a specific side at a given slot offset */
function portAt(abs,w,h,side,offset){
  if(side==='right') return{x:abs.x+w, y:abs.y+h/2+offset};
  if(side==='left')  return{x:abs.x,   y:abs.y+h/2+offset};
  if(side==='bottom')return{x:abs.x+w/2+offset, y:abs.y+h};
  return                    {x:abs.x+w/2+offset, y:abs.y};   /* top */
}

/* Extract side from a port ID (e.g. 'din-core:b0' → 'bottom') */
function portSide(portId){
  const ch=portId.split(':')[1][0];
  return{r:'right',l:'left',t:'top',b:'bottom'}[ch]||'right';
}

/* ── Pure position computation over immutable port definitions ──
   Reads node.ports — never creates, removes, or reorders them.
   Returns:
     portPositions — {portId: {x, y, side, nodeId}} flat lookup
     portsByNode   — {nodeId: {side: [{id, x, y, connected}]}} for rendering */
function computePortPositions(wires,nodes,groups,sideAssign,nodeSizes,lod){
  const portPositions={};
  const portsByNode={};
  nodeSizes=nodeSizes||{};
  /* Counter-scale port spacing so ports stay clickable at low zoom */
  const _dims=typeof lod==='number'?getDims(lod):null;
  const portFs=_dims?Math.min(_dims.fs,2.5):1;
  const portSep=Math.max(PORT_SEP,Math.round(20*portFs*1.8));

  /* Build connected set */
  const connectedPorts=new Set();
  wires.forEach(w=>{
    if(w.srcPort)connectedPorts.add(w.srcPort);
    if(w.tgtPort)connectedPorts.add(w.tgtPort);
  });

  /* Use measured sizes when available, fall back to nd.w/nd.h */
  const rw=(nd)=>(nodeSizes[nd.id]&&nodeSizes[nd.id].w)||nd.w;
  const rh=(nd)=>(nodeSizes[nd.id]&&nodeSizes[nd.id].h)||nd.h;

  /* Compute dynamic sides for connected ports based on wire endpoints */
  const nodeMap={};
  nodes.forEach(n=>nodeMap[n.id]=n);
  const portDynSide={}; /* portId → dynamicSide */

  wires.forEach(w=>{
    const sN=nodeMap[w.src],tN=nodeMap[w.tgt];
    if(!sN||!tN)return;
    const sAbs=nAbs(sN,groups,lod),tAbs=nAbs(tN,groups,lod);
    const key=w.src+'\u2192'+w.tgt;
    const prev=sideAssign[key]||{};
    const srcSide=prev.srcLocked?prev.srcSide:bestSide(sAbs,rw(sN),rh(sN),tAbs,rw(tN),rh(tN),prev.srcSide);
    const tgtSide=prev.tgtLocked?prev.tgtSide:bestSide(tAbs,rw(tN),rh(tN),sAbs,rw(sN),rh(sN),prev.tgtSide);
    sideAssign[key]={srcSide,tgtSide,srcLocked:!!prev.srcLocked,tgtLocked:!!prev.tgtLocked};
    if(w.srcPort)portDynSide[w.srcPort]=srcSide;
    if(w.tgtPort)portDynSide[w.tgtPort]=tgtSide;
  });

  /* Position ports — connected ports use dynamic side, spares stay static */
  nodes.forEach(nd=>{
    const abs=nAbs(nd,groups,lod);
    const nw=rw(nd),nh=rh(nd);
    portsByNode[nd.id]={};
    const sidePorts={right:[],left:[],top:[],bottom:[]};

    SIDES.forEach(staticSide=>{
      const defs=(nd.ports&&nd.ports[staticSide])||[];
      defs.forEach(def=>{
        const dynSide=portDynSide[def.id]||staticSide;
        sidePorts[dynSide].push({id:def.id,connected:connectedPorts.has(def.id)});
      });
    });

    SIDES.forEach(side=>{
      const portsOnSide=sidePorts[side];
      const count=portsOnSide.length;
      const slots=[];
      for(let i=0;i<count;i++){
        const offset=(i-(count-1)/2)*portSep;
        const pos=portAt(abs,nw,nh,side,offset);
        const pid=portsOnSide[i].id;
        portPositions[pid]={x:pos.x,y:pos.y,side,nodeId:nd.id};
        slots.push({id:pid,x:pos.x,y:pos.y,connected:portsOnSide[i].connected});
      }
      portsByNode[nd.id][side]=slots;
    });
  });

  return{portPositions,portsByNode};
}

/* ── Dynamic side selection with hysteresis ── */
function bestSide(fromAbs,fromW,fromH,toAbs,toW,toH,currentSide){
  const dx=(toAbs.x+toW/2)-(fromAbs.x+fromW/2);
  const dy=(toAbs.y+toH/2)-(fromAbs.y+fromH/2);
  const adx=Math.abs(dx),ady=Math.abs(dy);
  const THRESH=1.4;
  if(currentSide){
    const isH=(currentSide==='left'||currentSide==='right');
    if(isH&&adx>=ady)return currentSide;
    if(!isH&&ady>=adx)return currentSide;
    if(isH&&ady>adx*THRESH)return dy>0?'bottom':'top';
    if(!isH&&adx>ady*THRESH)return dx>0?'right':'left';
    return currentSide;
  }
  if(adx>ady)return dx>0?'right':'left';
  return dy>0?'bottom':'top';
}

/* ── Auto-expand: ensure 1 spare port per side after connection ── */
function autoExpandPorts(nodes,wires){
  const usedPorts=new Set();
  wires.forEach(w=>{if(w.srcPort)usedPorts.add(w.srcPort);if(w.tgtPort)usedPorts.add(w.tgtPort)});
  let changed=false;
  nodes.forEach(nd=>{
    if(!nd.ports)return;
    SIDES.forEach(side=>{
      const defs=nd.ports[side]||[];
      const hasFree=defs.some(d=>!usedPorts.has(d.id));
      if(!hasFree){
        const idx=defs.length;
        const letter=side[0];
        defs.push({id:nd.id+':'+letter+idx});
        changed=true;
      }
    });
  });
  return changed;
}

/* Remove excess spare ports — keep exactly 1 free per side */
function autoShrinkPorts(nodes,wires){
  const usedPorts=new Set();
  wires.forEach(w=>{if(w.srcPort)usedPorts.add(w.srcPort);if(w.tgtPort)usedPorts.add(w.tgtPort)});
  let changed=false;
  nodes.forEach(nd=>{
    if(!nd.ports)return;
    SIDES.forEach(side=>{
      const defs=nd.ports[side];
      if(!defs||defs.length<=1)return;
      /* Count free (unused) ports on this side */
      const freeIndices=[];
      defs.forEach((d,i)=>{if(!usedPorts.has(d.id))freeIndices.push(i)});
      /* Keep exactly 1 free — remove extras from the end */
      if(freeIndices.length>1){
        /* Remove all free ports except the first one */
        const toKeep=new Set([freeIndices[0]]);
        const toRemove=new Set(freeIndices.filter(i=>!toKeep.has(i)));
        nd.ports[side]=defs.filter((_,i)=>!toRemove.has(i));
        changed=true;
      }
    });
  });
  return changed;
}

/* ── Direct Bézier wire renderer ── */
function makeSimpleBezier(x1,y1,x2,y2,srcSide,tgtSide){
  const dist=Math.sqrt((x2-x1)**2+(y2-y1)**2);
  const cp=clamp(dist*0.4,50,300);
  let cx1=x1,cy1=y1,cx2=x2,cy2=y2;
  if(srcSide==='right')      cx1=x1+cp;
  else if(srcSide==='left')  cx1=x1-cp;
  else if(srcSide==='bottom')cy1=y1+cp;
  else if(srcSide==='top')   cy1=y1-cp;
  if(tgtSide==='left')       cx2=x2-cp;
  else if(tgtSide==='right') cx2=x2+cp;
  else if(tgtSide==='top')   cy2=y2-cp;
  else if(tgtSide==='bottom')cy2=y2+cp;
  return`M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`;
}


function rectsOverlap(a,b,gap){return a.x<b.x+b.w+gap&&a.x+a.w+gap>b.x&&a.y<b.y+b.h+gap&&a.y+a.h+gap>b.y}

/* ── Entry direction: proximity to nearest group edge ── */
function resolveEntryDirection(cursorAbsX,cursorAbsY,group){
  const distances={
    left:cursorAbsX-group.x,
    right:group.x+group.w-cursorAbsX,
    top:cursorAbsY-group.y,
    bottom:group.y+group.h-cursorAbsY
  };
  let minDir='right',minDist=Infinity;
  for(const[dir,dist]of Object.entries(distances)){
    if(dist<minDist){minDist=dist;minDir=dir;}
  }
  return minDir;
}

/* ── Grid system: col/row are authoritative, x/y are derived ── */
function gridToPos(col,row,lod){
  const d=_ld(lod);
  return{x:d.ep+col*(d.cw+d.ng),y:d.ep+row*(d.nh+d.vg)};
}
/* Build per-column widths and per-row heights from actual node dimensions.
   Returns {colX:{c:x}, rowY:{r:y}, colW:{c:w}, rowH:{r:h}, d} */
function buildGroupLayout(groupNodes,lod){
  const d=_ld(lod);
  const colW={},rowH={};
  groupNodes.forEach(n=>{
    const w=Math.min(n.w||d.cw,d.cw);
    const h=Math.min(n.h||d.nh,d.nh);
    const c=n.col??0, r=n.row??0;
    colW[c]=Math.max(colW[c]||0,w);
    rowH[r]=Math.max(rowH[r]||0,h);
  });
  const cols=Object.keys(colW).map(Number).sort((a,b)=>a-b);
  const rows=Object.keys(rowH).map(Number).sort((a,b)=>a-b);
  const colX={},rowY={};
  let cx=d.ep;
  for(const c of cols){colX[c]=cx;cx+=colW[c]+d.ng;}
  let cy=d.ep;
  for(const r of rows){rowY[r]=cy;cy+=rowH[r]+d.vg;}
  return{colX,rowY,colW,rowH,cols,rows,d,nextCX:cx,nextCY:cy};
}
/* Group-aware gridToPos: uses actual node widths/heights for positioning.
   For columns/rows beyond known range, extends from the last known offset. */
function gridToPosInGroup(col,row,groupNodes,lod){
  if(!groupNodes||!groupNodes.length)return gridToPos(col,row,lod);
  const L=buildGroupLayout(groupNodes,lod);
  let x,y;
  if(L.colX[col]!=null){x=L.colX[col]}
  else if(L.cols.length){
    const maxC=L.cols[L.cols.length-1];
    const minC=L.cols[0];
    if(col>maxC)x=L.nextCX+(col-maxC-1)*(L.d.cw+L.d.ng);
    else if(col<minC)x=L.colX[minC]-(minC-col)*(L.d.cw+L.d.ng);
    else x=L.d.ep+col*(L.d.cw+L.d.ng); /* interior gap — fallback */
  }else{x=L.d.ep+col*(L.d.cw+L.d.ng)}
  if(L.rowY[row]!=null){y=L.rowY[row]}
  else if(L.rows.length){
    const maxR=L.rows[L.rows.length-1];
    const minR=L.rows[0];
    if(row>maxR)y=L.nextCY+(row-maxR-1)*(L.d.nh+L.d.vg);
    else if(row<minR)y=L.rowY[minR]-(minR-row)*(L.d.nh+L.d.vg);
    else y=L.d.ep+row*(L.d.nh+L.d.vg);
  }else{y=L.d.ep+row*(L.d.nh+L.d.vg)}
  return{x,y};
}
function migrateNodeGrid(n,lod){
  if(n.col==null||n.row==null){
    const d=_ld(lod);
    n.col=Math.round((n.x-d.ep)/(d.cw+d.ng));
    n.row=Math.round((n.y-d.ep)/(d.nh+d.vg));
  }
}

/* ── Deduplicate col/row: resolve collisions after migration ── */
function dedupeGrid(groupNodes,lod){
  const seen=new Set();
  groupNodes.forEach(n=>{
    const key=n.col+','+n.row;
    if(seen.has(key)){
      /* Collision — find nearest free cell by expanding outward */
      for(let d=1;d<20;d++){
        for(const[dc,dr]of[[d,0],[-d,0],[0,d],[0,-d],[d,d],[-d,d],[d,-d],[-d,-d]]){
          const nc=n.col+dc,nr=n.row+dr;
          const nk=nc+','+nr;
          if(!seen.has(nk)){n.col=nc;n.row=nr;seen.add(nk);
            const pos=gridToPosInGroup(nc,nr,groupNodes,lod);n.x=pos.x;n.y=pos.y;return;}
        }
      }
    }else{seen.add(key);}
  });
}

/* ── Placement: cursor-proximity-driven slot selection ── */
function findInsertionSlot(entryDir,groupNodes,cursorRelX,cursorRelY,lod,incomingNode){
  const d=_ld(lod);
  const cw=d.cw;
  const nh=d.nh;
  /* Width/height of the node being placed — use its actual size if available */
  const inW=incomingNode?Math.min(incomingNode.w||cw,cw):cw;
  const inH=incomingNode?Math.min(incomingNode.h||nh,nh):nh;
  if(!groupNodes.length)return{col:0,row:0,...gridToPos(0,0,lod)};

  /* Single node: 4 adjacent candidates, pick closest to cursor */
  if(groupNodes.length===1){
    const n=groupNodes[0];
    const cands=[
      {col:n.col-1,row:n.row},{col:n.col+1,row:n.row},
      {col:n.col,row:n.row-1},{col:n.col,row:n.row+1}
    ];
    let best=cands[0],bestD=Infinity;
    for(const c of cands){
      const p=gridToPosInGroup(c.col,c.row,groupNodes,lod);
      const dd=Math.hypot(cursorRelX-(p.x+inW/2),cursorRelY-(p.y+inH/2));
      if(dd<bestD){bestD=dd;best=c;}
    }
    const bp=gridToPosInGroup(best.col,best.row,groupNodes,lod);
    return{col:best.col,row:best.row,...bp};
  }

  const cols=groupNodes.map(n=>n.col);
  const rows=groupNodes.map(n=>n.row);
  const minCol=Math.min(...cols),maxCol=Math.max(...cols);
  const minRow=Math.min(...rows),maxRow=Math.max(...rows);
  const occupied=new Set(groupNodes.map(n=>n.col+','+n.row));

  /* Build ALL candidate slots: vacant interior + edge expansion on all 4 sides */
  const cands=[];
  /* Vacant interior cells */
  for(let c=minCol;c<=maxCol;c++)
    for(let r=minRow;r<=maxRow;r++)
      if(!occupied.has(c+','+r))cands.push({col:c,row:r});
  /* Edge: new column left */
  for(let r=minRow;r<=maxRow;r++)cands.push({col:minCol-1,row:r});
  /* Edge: new column right */
  for(let r=minRow;r<=maxRow;r++)cands.push({col:maxCol+1,row:r});
  /* Edge: new row top */
  for(let c=minCol;c<=maxCol;c++)cands.push({col:c,row:minRow-1});
  /* Edge: new row bottom */
  for(let c=minCol;c<=maxCol;c++)cands.push({col:c,row:maxRow+1});

  /* HARD RULE: filter out any occupied position */
  const safeCands=cands.filter(c=>!occupied.has(c.col+','+c.row));
  if(!safeCands.length)safeCands.push({col:maxCol+1,row:minRow});

  /* Score all by distance to cursor, pick closest */
  let best=safeCands[0],bestD=Infinity;
  for(const c of safeCands){
    const p=gridToPosInGroup(c.col,c.row,groupNodes,lod);
    const dd=Math.hypot(cursorRelX-(p.x+inW/2),cursorRelY-(p.y+inH/2));
    if(dd<bestD){bestD=dd;best=c;}
  }
  const bp=gridToPosInGroup(best.col,best.row,groupNodes,lod);
  return{col:best.col,row:best.row,...bp};
}

/* findReorderSlot REMOVED — unified model: same-group uses findInsertionSlot + expandGroupForPlacement */

/* ── Grid compaction: remove gaps after node leaves group ── */
function compactGrid(groupNodes,lod){
  if(!groupNodes.length)return;
  const usedCols=[...new Set(groupNodes.map(n=>n.col))].sort((a,b)=>a-b);
  const usedRows=[...new Set(groupNodes.map(n=>n.row))].sort((a,b)=>a-b);
  const colMap={};usedCols.forEach((c,i)=>colMap[c]=i);
  const rowMap={};usedRows.forEach((r,i)=>rowMap[r]=i);
  /* Remap col/row first, then compute positions from new layout */
  groupNodes.forEach(n=>{n.col=colMap[n.col];n.row=rowMap[n.row]});
  groupNodes.forEach(n=>{
    const pos=gridToPosInGroup(n.col,n.row,groupNodes,lod);
    n.x=pos.x;n.y=pos.y;
  });
}

/* ── Expansion: shift for left/top, grow for right/bottom ── */
function expandGroupForPlacement(group,slotCol,slotRow,allGroups,groupNodes,lod,incomingNode){
  const d=_ld(lod);
  let g={...group};
  let shifted=groupNodes.map(n=>({...n}));
  let finalCol=slotCol,finalRow=slotRow;
  if(slotCol<0){
    const shiftCols=-slotCol;
    shifted.forEach(n=>n.col+=shiftCols);
    finalCol=0;
    /* Compute shift amount from layout BEFORE shift — use the width the new col 0 would need */
    const inW=incomingNode?Math.min(incomingNode.w||d.cw,d.cw):d.cw;
    g.x-=(inW+d.ng)*shiftCols;
  }
  if(slotRow<0){
    const shiftRows=-slotRow;
    shifted.forEach(n=>n.row+=shiftRows);
    finalRow=0;
    const inH=incomingNode?Math.min(incomingNode.h||d.nh,d.nh):d.nh;
    g.y-=(inH+d.vg)*shiftRows;
  }
  /* Reposition all shifted nodes using variable-width layout */
  shifted.forEach(n=>{
    const pos=gridToPosInGroup(n.col,n.row,shifted,lod);
    n.x=pos.x;n.y=pos.y;
  });
  const finalPos=gridToPosInGroup(finalCol,finalRow,shifted,lod);
  /* Compute tight-fit size using actual node widths/heights */
  const inW2=incomingNode?Math.min(incomingNode.w||d.cw,d.cw):d.cw;
  const inH2=incomingNode?Math.min(incomingNode.h||d.nh,d.nh):d.nh;
  let maxR=finalPos.x+inW2+d.ep, maxB=finalPos.y+inH2+d.ep;
  shifted.forEach(n=>{
    const nw=Math.min(n.w||d.cw,d.cw);
    const nh=Math.min(n.h||d.nh,d.nh);
    maxR=Math.max(maxR,n.x+nw+d.ep);
    maxB=Math.max(maxB,n.y+nh+d.ep);
  });
  g.w=maxR;
  g.h=maxB+d.gh;
  const updatedGroups=allGroups.map(og=>og.id===g.id?g:og);
  return{groups:pushGroups(g.id,updatedGroups),nodes:shifted,
    col:finalCol,row:finalRow,slotX:finalPos.x,slotY:finalPos.y};
}

/* ── Ghost preview position (no state mutation) ── */
function previewExpandedSlot(col,row,groupNodes,lod){
  return gridToPosInGroup(col<0?0:col,row<0?0:row,groupNodes||[],lod);
}

/* ── Post-expansion collision check: absolute no-overlap guarantee ── */
function validateNoCollision(finalCol,finalRow,shiftedNodes){
  const occupied=new Set(shiftedNodes.map(n=>n.col+','+n.row));
  if(!occupied.has(finalCol+','+finalRow))return{col:finalCol,row:finalRow};
  /* Collision — search expanding ring for nearest empty slot */
  let bestCol=finalCol,bestRow=finalRow,bestDist=Infinity;
  for(let radius=1;radius<=5;radius++){
    for(let dc=-radius;dc<=radius;dc++){
      for(let dr=-radius;dr<=radius;dr++){
        if(Math.abs(dc)!==radius&&Math.abs(dr)!==radius)continue;
        const c=finalCol+dc,r=finalRow+dr;
        if(!occupied.has(c+','+r)){
          const d=Math.abs(dc)+Math.abs(dr);
          if(d<bestDist){bestDist=d;bestCol=c;bestRow=r;}
        }
      }
    }
    if(bestDist<Infinity)break;
  }
  return{col:bestCol,row:bestRow};
}

function pushGroups(cid,gs,gap){
  const g0=gap!=null?gap:GAP;
  let a=gs.map(g=>({...g}));
  for(let it=0;it<30;it++){let p=false;
    for(let i=0;i<a.length;i++)for(let j=i+1;j<a.length;j++){
      if(!rectsOverlap(a[i],a[j],g0))continue;p=true;
      const oR=(a[i].x+a[i].w+g0)-a[j].x,oL=(a[j].x+a[j].w+g0)-a[i].x;
      const oD=(a[i].y+a[i].h+g0)-a[j].y,oU=(a[j].y+a[j].h+g0)-a[i].y;
      const mn=Math.min(oR,oL,oD,oU);
      const iIsDragged=a[i].id===cid,jIsDragged=a[j].id===cid;
      if(iIsDragged){
        /* Dragged group stays, push the other */
        if(mn===oR)a[j].x+=oR;else if(mn===oL)a[j].x-=oL;
        else if(mn===oD)a[j].y+=oD;else a[j].y-=oU;
      }else if(jIsDragged){
        if(mn===oR)a[i].x-=oR;else if(mn===oL)a[i].x+=oL;
        else if(mn===oD)a[i].y-=oD;else a[i].y+=oU;
      }else{
        /* Neither is dragged — split 50/50 */
        const half=mn/2;
        if(mn===oR){a[i].x-=half;a[j].x+=half}else if(mn===oL){a[i].x+=half;a[j].x-=half}
        else if(mn===oD){a[i].y-=half;a[j].y+=half}else{a[i].y+=half;a[j].y-=half}
      }
    }if(!p)break;}return a;
}

/* Check if point is near a bezier path (for cable splice detection) */
function pointNearBezier(px,py,pathStr,threshold){
  try{
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',pathStr);svg.appendChild(p);document.body.appendChild(svg);
    const len=p.getTotalLength();
    let minD=Infinity;
    for(let t=0;t<=1;t+=0.05){
      const pt=p.getPointAtLength(t*len);
      const d=Math.sqrt((pt.x-px)**2+(pt.y-py)**2);
      if(d<minD)minD=d;
    }
    document.body.removeChild(svg);
    return minD<threshold;
  }catch(e){return false}
}

    outputs:[`Analogues → Fusion (${rint(2,8)} patterns)`,`Scores → DIN-CORE (calibration)`,`Storage report → system log`],

/* ═══════════════════ CUSTOM MODEL DROPDOWN (portal-based) ═══════════════════ */
function ModelDropdown({value,onChange,models,nodeBg,accent,color,zoom=1,fontSize:_fs,dotSize:_dot}){
  const[open,setOpen]=useState(false);
  const[closing,setClosing]=useState(false);
  const ref=useRef(null);
  const[pos,setPos]=useState(null);
  const cur=models.find(m=>m.id===value)||models[0];
  const visible=open||closing; /* keep portal mounted during close animation */

  const animateClose=useCallback(()=>{
    if(!open)return;
    setClosing(true);
    setOpen(false);
    setTimeout(()=>setClosing(false),120);
  },[open]);

  /* Close on outside click */
  useEffect(()=>{
    if(!open)return;
    const close=e=>{
      if(ref.current&&ref.current.contains(e.target))return;
      const dd=document.getElementById('node-model-dd');
      if(dd&&dd.contains(e.target))return;
      animateClose();
    };
    document.addEventListener('pointerdown',close,true);
    return()=>document.removeEventListener('pointerdown',close,true);
  },[open,animateClose]);

  /* Close dropdown when zoom changes — prevents wobble/desync with canvas */
  const zoomRef=useRef(zoom);
  useEffect(()=>{
    if(zoomRef.current!==zoom&&open){setClosing(false);setOpen(false)}
    zoomRef.current=zoom;
  },[zoom,open]);

  /* Continuously reposition popup to track trigger (handles zoom/pan/scroll) */
  useEffect(()=>{
    if(!visible||!ref.current)return;
    let raf;
    const track=()=>{
      if(!ref.current){return}
      const r=ref.current.getBoundingClientRect();
      const menuH=300, menuW=r.width;
      const flipUp=r.bottom+menuH+4>window.innerHeight;
      const flipLeft=r.left+menuW>window.innerWidth;
      setPos({
        top:flipUp?r.top-menuH-4:r.bottom+2,
        left:flipLeft?r.right-menuW:r.left,
        width:r.width
      });
      raf=requestAnimationFrame(track);
    };
    raf=requestAnimationFrame(track);
    return()=>cancelAnimationFrame(raf);
  },[visible]);

  const doOpen=()=>{
    if(open){animateClose();return}
    setOpen(true);
  };

  return(
    <div ref={ref} style={{flex:1,position:'relative',minWidth:0}}
      onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()} onPointerDown={e=>e.stopPropagation()}>
      <div onClick={doOpen}
        style={{color:color,fontSize:_fs||26,padding:`${Math.round((_fs||26)*0.38)}px ${Math.round((_fs||26)*0.54)}px`,
          borderRadius:Math.round((_fs||26)*0.23),minWidth:0,overflow:'hidden',
          background:nodeBg,cursor:'pointer',display:'flex',alignItems:'center',
          justifyContent:'space-between',
          border:`1px solid ${accent}22`,userSelect:'none',transition:'background 0.15s'}}
        onMouseEnter={e=>e.currentTarget.style.background=accent+'12'}
        onMouseLeave={e=>e.currentTarget.style.background=nodeBg}>
        <span style={{color:cur.color,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:0,flex:1}}>{cur.label} ({cur.cost})</span>
        <span style={{fontSize:Math.round((_fs||26)*1.6),color:accent,marginLeft:Math.round((_fs||26)*0.3),lineHeight:0.5,flexShrink:0,opacity:0.7}}>{open?'▴':'▾'}</span>
      </div>
      {visible&&pos&&(()=>{
        /* Scale menu to match trigger's on-screen size (trigger is inside canvas transform) */
        const sc=ref.current?ref.current.getBoundingClientRect().height/ref.current.offsetHeight:zoom;
        const fs=Math.round(26*sc);
        const pad=Math.round(12*sc);
        const costFs=Math.round(20*sc);
        const dot=Math.round(10*sc);
        const gap=Math.round(10*sc);
        return ReactDOM.createPortal(
        <div id="node-model-dd" style={{position:'fixed',top:pos.top,left:pos.left,width:pos.width,
          background:'#1e1e1e',border:`1px solid ${accent}33`,borderRadius:Math.round(5*sc),
          boxShadow:'0 8px 32px rgba(0,0,0,0.6)',zIndex:9999,overflow:'hidden',
          maxHeight:Math.round(400*sc),overflowY:'auto',
          transformOrigin:'top center',
          animation:closing?'ddClose 0.12s ease-in forwards':'ddOpen 0.15s ease-out'}}>
          {models.map(m=>{
            const isSel=m.id===value;
            return <div key={m.id}
              onClick={()=>{onChange(m.id);animateClose()}}
              style={{padding:`${pad}px ${Math.round(pad*1.4)}px`,fontSize:fs,cursor:'pointer',
                color:m.color,background:isSel?accent+'15':'transparent',
                borderBottom:'1px solid #ffffff08',display:'flex',alignItems:'center',
                gap,transition:'background 0.1s'}}
              onMouseEnter={e=>e.target.style.background=accent+'22'}
              onMouseLeave={e=>e.target.style.background=isSel?accent+'15':'transparent'}>
              <span style={{width:dot,height:dot,borderRadius:dot/2,background:isSel?m.color:'transparent',flexShrink:0}}/>
              <span>{m.label}</span>
              <span style={{color:'#555',fontSize:costFs,marginLeft:'auto'}}>{m.cost}</span>
            </div>;
          })}
        </div>,
        document.body
      );})()}
    </div>
  );
}

/* ═══════════════════ GROUP PANEL COMPONENT ═══════════════════ */
function GroupPanel({gid,group,groupNodes,accent:initAccent,initPerNodeColors,openDanger,onClose,onSave,onDeleteGroup,onDeleteGroupOnly,onDeleteNode,
  dirtyRef,exitRef,exitPromptRef,onPreview,panelW,setPanelW,
  customThemesRef,tierMap,nAbsFn,hsvToHex,hexToHsv,hueToHex,tintFromAccent}){
  const panelRef=useRef(null);
  const dragRef=useRef(null);
  const[label,setLabel]=useState(group.label);
  const[accent,setAccent]=useState(initAccent);
  const[hexDraft,setHexDraft]=useState(null);
  const[perNodeColors,setPerNodeColors]=useState(()=>initPerNodeColors||{}); /* nodeId -> hex */
  const[showNodes,setShowNodes]=useState(true);
  const[showDanger,setShowDanger]=useState(true);
  const[confirmDelete,setConfirmDelete]=useState(null); /* 'all'|'groupOnly'|null */
  const[confirmNodeDelete,setConfirmNodeDelete]=useState(null); /* nodeId or null */
  const[nodePickerOpen,setNodePickerOpen]=useState(null); /* nodeId or null — which node has custom picker open */
  const[saved,setSaved]=useState(false);
  const[showExitPrompt,_setShowExitPrompt]=useState(false);
  const setShowExitPrompt=v=>{_setShowExitPrompt(v);if(exitPromptRef)exitPromptRef.current=v};

  const COLORS=['#ffffff','#b0b0b0','#666666','#e05050','#e88030','#d0a040','#38d07a','#50b868','#40b8d8','#6080e0','#9860d8','#c060d8','#e07098','#70d0c0','#a0d050'];

  /* Drag-to-resize */
  useEffect(()=>{
    const onMove=e=>{if(!dragRef.current)return;setPanelW(Math.max(340,Math.min(window.innerWidth-e.clientX,window.innerWidth*0.6)))};
    const onUp=()=>{dragRef.current=null;document.body.style.cursor='';document.body.style.userSelect='';
      const pill=document.querySelector('.grh-pill');if(pill){pill.style.background='#444';pill.style.borderColor='#555';pill.style.height='36px';pill.style.width='5px'}
      const line=document.querySelector('.grh-line');if(line){line.style.background='#333'}};
    window.addEventListener('pointermove',onMove);window.addEventListener('pointerup',onUp);
    return()=>{window.removeEventListener('pointermove',onMove);window.removeEventListener('pointerup',onUp)};
  },[]);

  /* Prevent wheel events from reaching canvas */
  useEffect(()=>{
    const el=panelRef.current;if(!el)return;
    const stopWheel=e=>e.stopPropagation();
    el.addEventListener('wheel',stopWheel,{passive:false});
    return()=>el.removeEventListener('wheel',stopWheel);
  },[]);

  const savedBaseRef=useRef({label:group.label,accent:initAccent,perNodeColors:initPerNodeColors||{}});
  const isDirty=label!==savedBaseRef.current.label||accent!==savedBaseRef.current.accent
    ||JSON.stringify(perNodeColors)!==JSON.stringify(savedBaseRef.current.perNodeColors);

  /* Sync dirty state to parent ref */
  useEffect(()=>{if(dirtyRef)dirtyRef.current=isDirty},[isDirty]);
  useEffect(()=>{if(exitRef)exitRef.current=()=>setShowExitPrompt(true);return()=>{if(exitRef)exitRef.current=null}},[]);

  const doSave=()=>{
    if(!label.trim())return;
    onSave({label:label.trim(),accent,perNodeColors});
    savedBaseRef.current={label:label.trim(),accent,perNodeColors:{...perNodeColors}};
    setSaved(true);setTimeout(()=>setSaved(false),1500);
  };
  const doCancel=()=>{setLabel(savedBaseRef.current.label);setAccent(savedBaseRef.current.accent);setPerNodeColors({...savedBaseRef.current.perNodeColors})};

  /* Push live preview to canvas */
  useEffect(()=>{
    if(onPreview) onPreview({gid,accent,label,perNodeColors});
  },[accent,label,perNodeColors]);
  /* Clear preview on unmount */
  useEffect(()=>()=>{if(onPreview) onPreview(null)},[]);

  const hsv=hexToHsv(accent);
  const pureHue=hueToHex(hsv.h);
  const panelH=80;
  const handleSVDrag=(e,rect)=>{
    if(!rect)return;
    const x=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
    const y=Math.max(0,Math.min(1,(e.clientY-rect.top)/rect.height));
    setAccent(hsvToHex(hsv.h,x,1-y));
  };
  const startSVDrag=e=>{
    const rect=e.currentTarget.getBoundingClientRect();handleSVDrag(e,rect);
    const move=ev=>handleSVDrag(ev,rect);
    const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up)};
    window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
  };

  return(
    <div ref={panelRef} className="panel-enter" onMouseDown={e=>e.stopPropagation()}
      style={{position:'fixed',top:0,right:0,bottom:0,width:panelW,zIndex:100}}>
      {/* Resize handle */}
      <div onPointerDown={e=>{e.preventDefault();e.stopPropagation();dragRef.current=true;document.body.style.cursor='col-resize';document.body.style.userSelect='none';
          const p=e.currentTarget.querySelector('.grh-pill');p.style.background=accent+'cc';p.style.borderColor=accent;p.style.height='42px';p.style.width='6px';
          e.currentTarget.querySelector('.grh-line').style.background=accent}}
        style={{position:'absolute',left:-8,top:0,bottom:0,width:16,cursor:'col-resize',zIndex:102,
          display:'flex',alignItems:'center',justifyContent:'center'}}
        onMouseEnter={e=>{if(!dragRef.current){const p=e.currentTarget.querySelector('.grh-pill');p.style.background=accent+'cc';p.style.borderColor=accent;p.style.height='42px';p.style.width='6px';
          e.currentTarget.querySelector('.grh-line').style.background=accent}}}
        onMouseLeave={e=>{if(!dragRef.current){const p=e.currentTarget.querySelector('.grh-pill');p.style.background='#444';p.style.borderColor='#555';p.style.height='36px';p.style.width='5px';
          e.currentTarget.querySelector('.grh-line').style.background='#333'}}}>
        <div className="grh-line" style={{position:'absolute',left:'50%',top:0,bottom:0,width:1,transform:'translateX(-50%)',background:'#333',transition:'background 0.15s',pointerEvents:'none'}} />
        <div className="grh-pill" style={{width:5,height:36,borderRadius:4,background:'#444',border:'1px solid #555',transition:'background 0.15s, height 0.15s, width 0.15s, border-color 0.15s',pointerEvents:'none',position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)'}} />
      </div>
      {/* Panel content */}
      <div style={{position:'absolute',top:0,right:0,bottom:0,left:0,
        background:'#1a1a1afa',display:'flex',flexDirection:'column',overflow:'hidden',overscrollBehavior:'contain'}}>

        {/* ── HEADER ── */}
        <div style={{padding:'18px 20px',background:tintFromAccent(accent).headerBg,
          borderBottom:`1px solid ${accent}22`,flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
            <div style={{width:10,height:10,borderRadius:5,background:accent,
              boxShadow:`0 0 10px ${accent}88`}}/>
            <div style={{flex:1}}>
              <input value={label} onChange={e=>setLabel(e.target.value)}
                style={{fontSize:16,fontWeight:700,color:tintFromAccent(accent).text,
                  background:'transparent',border:'none',borderBottom:`1px solid ${isDirty?accent+'66':'transparent'}`,
                  width:'100%',padding:'2px 0',outline:'none',fontFamily:'inherit',
                  transition:'border-color 0.15s'}}
                onFocus={e=>{e.target.style.borderBottomColor=accent+'66'}}
                onBlur={e=>{if(!isDirty)e.target.style.borderBottomColor='transparent'}}
                placeholder="Group name..." spellCheck="false"/>
              <div style={{fontSize:9,color:'#aaa',marginTop:6,textTransform:'uppercase',letterSpacing:1}}>
                Group · {groupNodes.length} node{groupNodes.length!==1?'s':''}
              </div>
            </div>
            <button onClick={()=>{if(isDirty){setShowExitPrompt(true)}else{onClose()}}}
              style={{background:'transparent',border:'none',
              color:'#666',fontSize:18,cursor:'pointer',lineHeight:1,
              transition:'color 0.15s'}}
              onMouseEnter={e=>{e.currentTarget.style.color='#ccc'}}
              onMouseLeave={e=>{e.currentTarget.style.color='#666'}}>✕</button>
          </div>
        </div>

        {saved&&<div style={{padding:'6px 16px',background:'#28a74520',borderBottom:'1px solid #28a74533',
          fontSize:11,color:'#28a745',fontWeight:600,flexShrink:0,textAlign:'center'}}>Changes saved</div>}

        {/* ── SCROLLABLE BODY ── */}
        <div style={{flex:1,overflow:'auto',padding:'16px 18px',overscrollBehavior:'contain'}}>

          {/* SECTION: GROUP COLOUR */}

              <span>Delete / Remove</span>
              <span style={{fontSize:8,color:'#aaa',display:'inline-block',transform:'scaleY(0.6)'}}>{showDanger?'▼':'▶'}</span>
            </div>
            <div style={{overflow:'hidden',transition:'max-height 0.35s ease, opacity 0.3s ease',
              maxHeight:showDanger?'9999px':'0px',opacity:showDanger?1:0}}>
              <div className="sp-section-body">
                {!confirmDelete&&<>
                  <div style={{marginBottom:10}}>
                    <button onClick={()=>setConfirmDelete(groupNodes.length>0?'all':'empty')}
                      style={{width:'100%',padding:'8px 14px',borderRadius:8,border:'1px solid #333',
                        background:'#252525',color:'#ccc',fontSize:11,fontWeight:600,cursor:'pointer',
                        transition:'all 0.15s',textAlign:'left'}}
                      onMouseEnter={e=>{e.currentTarget.style.background='#2a2a2a';e.currentTarget.style.borderColor='#555'}}
                      onMouseLeave={e=>{e.currentTarget.style.background='#252525';e.currentTarget.style.borderColor='#333'}}>
                      {groupNodes.length>0?'Delete All':'Delete Group'}
                      <div style={{fontSize:9,color:'#888',fontWeight:400,marginTop:2}}>
                        {groupNodes.length>0
                          ?`Permanently delete "${group.label}" and all ${groupNodes.length} node${groupNodes.length>1?'s':''}`
                          :`Permanently delete the empty group "${group.label}"`}</div>
                    </button>
                  </div>
                  {groupNodes.length>0&&<div style={{marginBottom:10}}>
                    <button onClick={()=>setConfirmDelete('groupOnly')}
                      style={{width:'100%',padding:'8px 14px',borderRadius:8,border:'1px solid #333',
                        background:'#252525',color:'#ccc',fontSize:11,fontWeight:600,cursor:'pointer',
                        transition:'all 0.15s',textAlign:'left'}}
                      onMouseEnter={e=>{e.currentTarget.style.background='#2a2a2a';e.currentTarget.style.borderColor='#555'}}
                      onMouseLeave={e=>{e.currentTarget.style.background='#252525';e.currentTarget.style.borderColor='#333'}}>
                      Remove Group Only
                      <div style={{fontSize:9,color:'#888',fontWeight:400,marginTop:2}}>
                        Dissolve group — nodes remain on canvas ungrouped</div>
                    </button>
                  </div>}
                </>}
                {confirmDelete&&<div style={{padding:12,background:'#25252580',borderRadius:8,border:'1px solid #444',marginBottom:10}}>
                  <div style={{fontSize:12,fontWeight:600,color:'#ddd',marginBottom:4}}>
                    {confirmDelete==='groupOnly'?'Remove group only?':'Are you sure?'}</div>
                  <p style={{fontSize:10,color:'#999',marginBottom:12,lineHeight:1.5}}>
                    {confirmDelete==='groupOnly'
                      ?`This will dissolve "${group.label}" and release ${groupNodes.length} node${groupNodes.length>1?'s':''} as ungrouped. Node colours will follow your settings below.`
                      :confirmDelete==='all'
                        ?`This will permanently delete "${group.label}" and all ${groupNodes.length} node${groupNodes.length>1?'s':''} inside it, along with their connections.`
                        :`This will permanently delete the empty group "${group.label}".`}
                  </p>
                  <div style={{display:'flex',gap:8}}>
                    <button onClick={()=>setConfirmDelete(null)}
                      style={{flex:1,padding:'7px 12px',borderRadius:6,border:'1px solid #555',
                        background:'#333',color:'#ccc',fontSize:11,fontWeight:600,cursor:'pointer'}}>
                      Cancel</button>
                    <button onClick={()=>{
                      if(confirmDelete==='groupOnly') onDeleteGroupOnly({perNodeColors,globalColor:accent});
                      else if(confirmDelete==='all') onDeleteGroup();
                      else onDeleteGroup();
                    }}
                      style={{flex:1,padding:'7px 12px',borderRadius:6,border:'1px solid #555',
                        background:'#333',color:'#ccc',fontSize:11,fontWeight:600,cursor:'pointer',
                        transition:'background 0.15s'}}
                      onMouseEnter={e=>{e.currentTarget.style.background='#3a3a3a';e.currentTarget.style.borderColor='#666'}}
                      onMouseLeave={e=>{e.currentTarget.style.background='#333';e.currentTarget.style.borderColor='#555'}}>
                      {confirmDelete==='groupOnly'?'Remove Group Only':'Delete'}</button>
                  </div>
                </div>}
              </div>
            </div>
          </div>

          {/* SECTION: NODE COLOURS */}
          {groupNodes.length>0&&<div className="sp-section">
            <div className="sp-section-hdr" onClick={()=>setShowNodes(s=>!s)} style={{cursor:'pointer'}}>
              <span>Node Colours</span>
              <span style={{fontSize:8,color:'#aaa',display:'inline-block',transform:'scaleY(0.6)'}}>{showNodes?'▼':'▶'}</span>
            </div>
            <div style={{overflow:'hidden',transition:'max-height 0.4s ease, opacity 0.3s ease',
              maxHeight:showNodes?'9999px':'0px',opacity:showNodes?1:0}}>
              <div className="sp-section-body" style={{paddingTop:4}}>
                <p style={{fontSize:10,color:'#666',marginBottom:10}}>
                  Override colours for individual nodes. Unset nodes inherit the group colour.
                </p>
                {groupNodes.map(nd=>{
                  const nc=perNodeColors[nd.id]||null;
                  const nodeAccent=nc||accent;
                  const nt=tintFromAccent(nodeAccent);
                  const nHsv=hexToHsv(nodeAccent);
                  const nPureHue=hueToHex(nHsv.h);
                  const pickerOpen=nodePickerOpen===nd.id;
                  const handleNodeSVDrag=(e,rect)=>{
                    if(!rect)return;
                    const x=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
                    const y=Math.max(0,Math.min(1,(e.clientY-rect.top)/rect.height));
                    setPerNodeColors(p=>({...p,[nd.id]:hsvToHex(nHsv.h,x,1-y)}));
                  };
                  return <div key={nd.id} style={{marginBottom:18,paddingBottom:16,borderBottom:'1px solid #ffffff08'}}>
                    {/* Node header bar */}
                    <div style={{display:'flex',alignItems:'center',gap:8,
                      background:nt.headerBg,
                      padding:'6px 10px',borderRadius:6,marginBottom:6,transition:'background 0.2s'}}>
                      <div style={{width:8,height:8,borderRadius:4,background:nodeAccent,
                        boxShadow:`0 0 6px ${nodeAccent}88`,flexShrink:0,transition:'background 0.2s, box-shadow 0.2s'}}/>
                      <span style={{fontSize:12,fontWeight:600,color:nt.text,
                        overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,
                        transition:'color 0.2s'}}>{nd.label}</span>
                      {confirmNodeDelete===nd.id
                        ?<div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
                          <span style={{fontSize:9,fontWeight:600,color:'#fff'}}>Delete</span>
                          <span style={{color:'#fff',fontSize:9,fontWeight:600}}>—</span>
                          <button onClick={()=>setConfirmNodeDelete(null)}
                            style={{padding:'3px 10px',borderRadius:4,border:`1px solid ${nodeAccent}44`,
                              background:nodeAccent+'15',color:nt.text,fontSize:9,fontWeight:600,cursor:'pointer'}}>No</button>
                          <button onClick={()=>{onDeleteNode(nd.id);setConfirmNodeDelete(null)}}
                            style={{padding:'3px 10px',borderRadius:4,border:`1px solid ${nodeAccent}`,
                              background:nodeAccent+'33',color:nt.text,fontSize:9,fontWeight:600,cursor:'pointer',
                              transition:'background 0.15s'}}
                            onMouseEnter={e=>{e.currentTarget.style.background=nodeAccent+'55'}}
                            onMouseLeave={e=>{e.currentTarget.style.background=nodeAccent+'33'}}>Yes</button>
                        </div>
                        :<button onClick={()=>setConfirmNodeDelete(nd.id)}
                          style={{background:'transparent',border:'none',color:nodeAccent+'88',
                            fontSize:14,cursor:'pointer',padding:'0 4px',lineHeight:1,flexShrink:0,
                            transition:'color 0.15s'}}
                          onMouseEnter={e=>{e.currentTarget.style.color=nodeAccent}}
                          onMouseLeave={e=>{e.currentTarget.style.color=nodeAccent+'88'}}>✕</button>
                      }
                    </div>
                    {/* Colour swatches + dropdown toggle */}
                    <div style={{display:'flex',gap:10,marginBottom:4,alignItems:'center'}}>
                      <div style={{display:'flex',gap:3,flex:1,minWidth:0}}>
                        {COLORS.map(c=>(
                          <div key={c}
                            onClick={()=>{setPerNodeColors(p=>({...p,[nd.id]:c}));setNodePickerOpen(null)}}
                            style={{flex:1,height:20,minWidth:0,borderRadius:3,background:c,cursor:'pointer',
                              border:nc===c&&!pickerOpen?'2px solid #fff':'2px solid transparent',
                              transition:'border 0.15s'}}/>
                        ))}
                      </div>
                      <div onClick={()=>setNodePickerOpen(pickerOpen?null:nd.id)}
                        style={{cursor:'pointer',width:24,height:24,display:'flex',alignItems:'center',justifyContent:'center',
                          borderRadius:'50%',border:'1px solid #333',background:'#252525',flexShrink:0,
                          transition:'border-color 0.15s,background 0.15s'}}
                        onMouseEnter={e=>{e.currentTarget.style.borderColor='#555';e.currentTarget.style.background='#2a2a2a'}}
                        onMouseLeave={e=>{e.currentTarget.style.borderColor='#333';e.currentTarget.style.background='#252525'}}>
                        <span style={{fontSize:8,color:'#aaa',transition:'transform 0.2s',display:'inline-block',
                          transform:(pickerOpen?'rotate(180deg)':'rotate(0deg)')+' scaleY(0.6)'}}>▼</span></div>
                    </div>
                    {/* Custom colour picker */}
                    <div style={{overflow:'hidden',transition:'max-height 0.3s ease, opacity 0.25s ease',
                      maxHeight:pickerOpen?'200px':'0px',opacity:pickerOpen?1:0}}>
                      <div style={{paddingTop:4}}>
                        {/* SV panel */}
                        <div onMouseDown={e=>{
                          const rect=e.currentTarget.getBoundingClientRect();handleNodeSVDrag(e,rect);
                          const move=ev=>handleNodeSVDrag(ev,rect);
                          const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up)};
                          window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
                        }} style={{position:'relative',width:'100%',height:60,borderRadius:6,overflow:'hidden',cursor:'crosshair',background:nPureHue}}>
                          <div style={{position:'absolute',inset:0,background:'linear-gradient(to right,#ffffff,transparent)'}}/>
                          <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,transparent,#000000)'}}/>
                          <div style={{position:'absolute',left:`${nHsv.s*100}%`,top:`${(1-nHsv.v)*100}%`,
                            width:12,height:12,borderRadius:'50%',border:'2px solid #fff',
                            boxShadow:'0 0 0 1px rgba(0,0,0,0.3),0 2px 4px rgba(0,0,0,0.4)',
                            transform:'translate(-50%,-50%)',pointerEvents:'none'}}/>
                        </div>
                        {/* Hue bar */}
                        <div className="hue-bar" style={{marginTop:8}} onMouseDown={e=>{
                          const bar=e.currentTarget,rect=bar.getBoundingClientRect();
                          const setH=ev=>{const x=Math.max(0,Math.min(1,(ev.clientX-rect.left)/rect.width));
                            setPerNodeColors(p=>({...p,[nd.id]:hsvToHex(Math.round(x*360),nHsv.s,nHsv.v)}))};
                          setH(e);
                          const move=ev=>setH(ev);
                          const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up)};
                          window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
                        }}>
                          <div className="hue-thumb" style={{left:`${nHsv.h/360*100}%`}}/>
                        </div>
                        {/* Hex input */}
                        <div style={{marginTop:8,display:'flex',alignItems:'center',gap:8}}>
                          <span style={{fontSize:8,fontWeight:700,letterSpacing:1,textTransform:'uppercase',color:'#666'}}>HEX</span>
                          <input value={nodeAccent}
                            onChange={e=>{
                              const raw=e.target.value;const v=raw.startsWith('#')?raw:'#'+raw;
                              if(/^#[0-9a-fA-F]{6}$/.test(v))setPerNodeColors(p=>({...p,[nd.id]:v.toLowerCase()}));
                            }}
                            style={{width:80,background:'#1e1e1e',border:`1px solid ${nodeAccent}44`,borderRadius:4,
                              color:'#ccc',fontSize:11,padding:'3px 6px',fontFamily:'monospace'}}/>
                          <div style={{width:18,height:18,borderRadius:3,background:nodeAccent,border:'1px solid #555'}}/>
                        </div>
                      </div>
                    </div>
                  </div>;
                })}
              </div>
            </div>
          </div>}


        </div>

        {/* ── FOOTER ── */}
        {isDirty&&<div style={{padding:'12px 18px',borderTop:'1px solid #333',flexShrink:0,
          display:'flex',gap:8,justifyContent:'flex-end',background:'#1a1a1afa'}}>
          <button onClick={()=>{doCancel()}}
            style={{padding:'7px 18px',borderRadius:8,border:'1px solid #333',background:'#252525',
              color:'#aaa',fontSize:11,fontWeight:600,cursor:'pointer',
              transition:'all 0.15s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='#555';e.currentTarget.style.background='#2a2a2a';e.currentTarget.style.color='#ddd'}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#333';e.currentTarget.style.background='#252525';e.currentTarget.style.color='#aaa'}}>Cancel</button>
          <button onClick={doSave} disabled={!label.trim()}
            style={{padding:'7px 18px',borderRadius:8,border:'1px solid #333',
              background:label.trim()?'#252525':'#1e1e1e',
              color:label.trim()?'#ccc':'#555',fontSize:11,fontWeight:600,cursor:'pointer',
              transition:'all 0.15s'}}
            onMouseEnter={e=>{if(label.trim()){e.currentTarget.style.borderColor='#555';e.currentTarget.style.background='#2a2a2a';e.currentTarget.style.color='#ddd'}}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#333';e.currentTarget.style.background='#252525';e.currentTarget.style.color='#ccc'}}>Save Changes</button>
        </div>}

      {/* ── EXIT PROMPT when closing with unsaved changes ── */}
      {showExitPrompt&&<div style={{position:'absolute',inset:0,zIndex:110,background:'rgba(0,0,0,0.6)',
        display:'flex',alignItems:'center',justifyContent:'center',padding:24}}
        onClick={e=>e.stopPropagation()}>
        <div style={{background:'#252525',border:'1px solid #444',borderRadius:12,padding:'24px 28px',
          maxWidth:320,boxShadow:'0 8px 40px rgba(0,0,0,0.5)'}}>
          <div style={{fontSize:14,fontWeight:700,color:'#e0e0e0',marginBottom:8}}>Unsaved Changes</div>
          <div style={{fontSize:12,color:'#999',lineHeight:1.5,marginBottom:18}}>
            You have unsaved changes to <strong style={{color:accent}}>{label}</strong>. What would you like to do?
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
            <button onClick={()=>{setShowExitPrompt(false);doCancel();onClose()}} style={{padding:'6px 16px',borderRadius:6,
              border:'1px solid #555',background:'#333',color:'#ccc',fontSize:12,cursor:'pointer',fontWeight:600}}>Discard</button>
            <button onClick={()=>{setShowExitPrompt(false);doSave();setTimeout(onClose,100)}} style={{padding:'6px 16px',borderRadius:6,
              border:`1px solid ${accent}66`,background:accent+'22',color:tintFromAccent(accent).text,fontSize:12,cursor:'pointer',fontWeight:600}}>Save</button>
          </div>
        </div>
      </div>}
      </div>{/* end panel content */}
    </div>
  );
}

/* ═══════════════════ LIVE PANEL COMPONENT ═══════════════════ */
function LivePanel({nd,tier,t,isErr,wires,nodes,groups,onClose,updateNode,onChangeGroup,dirtyRef,exitRef,exitPromptRef,
  customThemesRef,tierMap,hsvToHex,hexToHsv,hueToHex,tintFromAccent,onColorChange,panelW,setPanelW}){
  const panelRef=useRef(null);
  const dragRef=useRef(null);

  /* Drag-to-resize left edge */
  useEffect(()=>{
    const onMove=e=>{
      if(!dragRef.current)return;
      const newW=window.innerWidth-e.clientX;
      setPanelW(Math.max(280,Math.min(newW,window.innerWidth*0.6)));
    };
    const onUp=()=>{dragRef.current=null;document.body.style.cursor='';document.body.style.userSelect='';
      const pill=document.querySelector('.rh-pill');if(pill){pill.style.background='#444';pill.style.borderColor='#555';pill.style.height='36px';pill.style.width='5px'}
      const line=document.querySelector('.rh-line');if(line){line.style.background='#333'}
    };
    window.addEventListener('pointermove',onMove);
    window.addEventListener('pointerup',onUp);
    return()=>{window.removeEventListener('pointermove',onMove);window.removeEventListener('pointerup',onUp)};
  },[]);

  /* Prevent wheel events from reaching the canvas */
  useEffect(()=>{
    const el=panelRef.current;if(!el)return;
    const stopWheel=e=>e.stopPropagation();
    el.addEventListener('wheel',stopWheel,{passive:false});
    return()=>el.removeEventListener('wheel',stopWheel);
  },[]);
  const[tick,setTick]=useState(0);
  const logFn=logGen[tier]||logGen.worker;
  const actFn=activityGen[tier]||activityGen.worker;
  const[logs,setLogs]=useState(()=>Array.from({length:12},()=>({ts:ts(),msg:pick(logFn())})));
  const[activity,setActivity]=useState(()=>actFn());
  const[collapsed,setCollapsed]=useState({});
  const accent=isErr?'#cc3333':(t&&t.accent||'#38d07a');
  const sb='sb-'+(t&&t.accent||'38d07a').replace('#','');

  /* ── Dirty tracking for save flow ── */
  const[draft,setDraft]=useState({label:nd.label,model:nd.model,prompt:nd.prompt});
  const[saved,setSaved]=useState(false);
  const[showExitPrompt,_setShowExitPrompt]=useState(false);
  const setShowExitPrompt=v=>{_setShowExitPrompt(v);if(exitPromptRef)exitPromptRef.current=v};
  const draftRef=useRef(draft);
  draftRef.current=draft;
  const prevNidRef=useRef(nd.id);
  const prevNodeRef=useRef({label:nd.label,model:nd.model,prompt:nd.prompt});
  /* Warn before switching nodes if dirty */
  useEffect(()=>{
    if(prevNidRef.current!==nd.id){
      const p=prevNodeRef.current, d=draftRef.current;
      if(d.label!==p.label||d.model!==p.model||d.prompt!==p.prompt){
        /* Previous node had unsaved changes — auto-save with notification */
        updateNode(prevNidRef.current,d);
      }
      prevNidRef.current=nd.id;
    }
    prevNodeRef.current={label:nd.label,model:nd.model,prompt:nd.prompt};
    setDraft({label:nd.label,model:nd.model,prompt:nd.prompt});
    setSaved(false);
  },[nd.id]);
  const isDirty=draft.label!==nd.label||draft.model!==nd.model||draft.prompt!==nd.prompt;
  useEffect(()=>{if(dirtyRef)dirtyRef.current=isDirty},[isDirty]);
  useEffect(()=>{if(exitRef)exitRef.current=()=>setShowExitPrompt(true);return()=>{if(exitRef)exitRef.current=null}},[]);
  const doSave=()=>{updateNode(nd.id,draft);setSaved(true);setTimeout(()=>setSaved(false),1500)};
  const doCancel=()=>setDraft({label:nd.label,model:nd.model,prompt:nd.prompt});

  /* Live simulation tick */
  useEffect(()=>{
    const iv=setInterval(()=>{
      setTick(t=>t+1);
      /* Add new log entry */
      setLogs(ls=>[{ts:ts(),msg:pick((logGen[tier]||logGen.worker)()),isNew:true},...ls.slice(0,49)]);
    },2800);
    const iv2=setInterval(()=>{
      setActivity((activityGen[tier]||activityGen.worker)());
    },6000);
    return()=>{clearInterval(iv);clearInterval(iv2)};
  },[tier]);

  /* After tick, clear isNew flag */
  useEffect(()=>{
    if(tick===0)return;
    const t2=setTimeout(()=>setLogs(ls=>ls.map(l=>({...l,isNew:false}))),400);
    return()=>clearTimeout(t2);
  },[tick]);

  const toggle=k=>setCollapsed(c=>({...c,[k]:!c[k]}));
  const model=MODELS.find(m=>m.id===nd.model)||MODELS[0];
  const metrics=useMemo(()=>metricsFor(tier,isErr),[tick,tier,isErr]);
  const processing=useMemo(()=>processingFor(tier,nd,isErr),[tick,tier,nd,isErr]);

  /* Dependencies from wires */
  const upstream=wires.filter(w=>w.tgt===nd.id).map(w=>nodes.find(n=>n.id===w.src)).filter(Boolean);
  const downstream=wires.filter(w=>w.src===nd.id).map(w=>nodes.find(n=>n.id===w.tgt)).filter(Boolean);

  const health=isErr?{label:'DEGRADED',color:'#cc3333',pct:rint(15,35)}:{
    label:'OPERATIONAL',color:accent,pct:rint(92,100)
  };

  /* ── Node colour override ── */
  const NODE_COLORS=['#ffffff','#b0b0b0','#666666','#e05050','#e88030','#d0a040','#38d07a','#50b868','#40b8d8','#6080e0','#9860d8','#c060d8','#e07098','#70d0c0','#a0d050'];
  const nodeThemeKey='_node_'+nd.id;
  const groupTier=tierMap[nd.gid]||'worker';
  const groupTheme=customThemesRef.current[groupTier]||customThemesRef.current[nd.gid]||TIERS[groupTier]||TIERS.worker;
  const nodeOverrideKey=tierMap[nodeThemeKey];
  const hasNodeColor=!!nodeOverrideKey;
  const nodeAccent=hasNodeColor&&customThemesRef.current[nodeOverrideKey]?customThemesRef.current[nodeOverrideKey].accent:(groupTheme&&groupTheme.accent||accent);
  const[nodeColor,setNodeColor]=useState(nodeAccent);
  const[nodeHexDraft,setNodeHexDraft]=useState(null);
  const[showColorPicker,setShowColorPicker]=useState(false);
  const[nodeColorTick,setNodeColorTick]=useState(0);
  const applyNodeColor=(color)=>{
    setNodeColor(color);
    const nt=tintFromAccent(color);
    const tid=nodeThemeKey+'_c';
    customThemesRef.current[tid]={nodeBg:nt.nodeBg,headerBg:nt.headerBg,accent:color,text:nt.text};
    tierMap[nodeThemeKey]=tid;
    setNodeColorTick(t=>t+1);
    if(onColorChange)onColorChange();
  };
  const resetNodeColor=()=>{
    const oldTid=tierMap[nodeThemeKey];
    if(oldTid)delete customThemesRef.current[oldTid];
    delete tierMap[nodeThemeKey];
    setNodeColor(groupTheme&&groupTheme.accent||accent);
    setNodeColorTick(t=>t+1);
    if(onColorChange)onColorChange();
  };
  const nodeHsv=hexToHsv(nodeColor);
  const nodePureHue=hueToHex(nodeHsv.h);
  const handleNodeSVDrag=(e,rect)=>{
    if(!rect)return;
    const x=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
    const y=Math.max(0,Math.min(1,(e.clientY-rect.top)/rect.height));
    applyNodeColor(hsvToHex(nodeHsv.h,x,1-y));
  };
  const startNodeSVDrag=e=>{
    const rect=e.currentTarget.getBoundingClientRect();handleNodeSVDrag(e,rect);
    const move=ev=>handleNodeSVDrag(ev,rect);
    const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up)};
    window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
  };

  return(
    <div ref={panelRef} className="panel-enter" onMouseDown={e=>e.stopPropagation()}
      style={{position:'fixed',top:0,right:0,bottom:0,width:panelW,
      zIndex:100}}>
      {/* Resize drag handle — outside overflow container so pill doesn't clip */}
      <div onPointerDown={e=>{e.preventDefault();e.stopPropagation();dragRef.current=true;document.body.style.cursor='col-resize';document.body.style.userSelect='none';
          const p=e.currentTarget.querySelector('.rh-pill');p.style.background=accent+'cc';p.style.borderColor=accent;p.style.height='42px';p.style.width='6px';
          e.currentTarget.querySelector('.rh-line').style.background=accent}}
        style={{position:'absolute',left:-8,top:0,bottom:0,width:16,cursor:'col-resize',zIndex:102,
          display:'flex',alignItems:'center',justifyContent:'center'}}
        onMouseEnter={e=>{if(!dragRef.current){const p=e.currentTarget.querySelector('.rh-pill');p.style.background=accent+'cc';p.style.borderColor=accent;p.style.height='42px';p.style.width='6px';

/* ═══════════════════ MAIN APP ═══════════════════ */
function App(){
  const[groups,setGroups]=useState(mkGroups);
  const[nodes,setNodes]=useState(mkNodes);
  const[wires,setWires]=useState(mkWires);
  const[pan,setPan]=useState(()=>{
    const vw=window.innerWidth,vh=window.innerHeight;
    const gs=mkGroups(),ns=mkNodes();
    const fit=findFitZoom(vw,vh,ns,gs);
    window.__initZoom=fit.z;
    const originX=gs.length?Math.min(...gs.map(g=>g.x)):0;
    const originY=gs.length?Math.min(...gs.map(g=>g.y)):0;
    return{x:(vw-fit.b.w*fit.z)/2-originX*fit.z,y:(vh-fit.b.h*fit.z)/2-originY*fit.z};
  });
  const[zoom,setZoom]=useState(()=>window.__initZoom||0.5);
  const lod=getLOD(zoom);
  const[selected,setSelected]=useState(null);
  const[selectedGroup,setSelectedGroup]=useState(null); /* group id or null */
  const[wiringFrom,setWiringFrom]=useState(null); /* {nid,side} or null */
  const[wiringMouse,setWiringMouse]=useState(null);
  const[wizard,setWizard]=useState(null); /* {gid} or null */
  const[dyingWires,setDyingWires]=useState([]);
  const[modal,setModal]=useState(null); /* {type,id,msg,onConfirm} */
  const[panelNode,setPanelNode]=useState(null);
  const[panelW,setPanelW]=useState(568); /* side panel width — lifted so canvas can shift */
  const[colorTick,setColorTick]=useState(0); /* bump to force re-render when node color changes */
  const[badgeTip,setBadgeTip]=useState(null); /* {type:'auth'|'error', x, y, data} */
  const panelDirtyRef=useRef(false);
  const panelExitRef=useRef(null);
  const panelExitPromptRef=useRef(false);
  const groupDirtyRef=useRef(false);
  const groupExitRef=useRef(null);
  const groupExitPromptRef=useRef(false);
  const[hoverNode,setHoverNode]=useState(null);
  const[hoverWire,setHoverWire]=useState(null); /* wireIdx or null */
  const[debugPorts,setDebugPorts]=useState(false); /* toggle with D key */
  const[dropTargetGroup,setDropTargetGroup]=useState(null); /* group id highlighted as drop target during node drag */
  const[snapPreview,setSnapPreview]=useState(null); /* {gid,x,y} — ghost slot preview during drag */
  const[groupEdit,setGroupEdit]=useState(null); /* {gid,label,customColor,_hexDraft} or null — group edit wizard */
  const[groupPreview,setGroupPreview]=useState(null); /* {gid,accent,label,perNodeColors} — live preview of group panel edits */
  const[groupMenu,setGroupMenu]=useState(null); /* {gid} — centered popover for group actions */
  const[groupWizard,setGroupWizard]=useState(null); /* {name,color} — new group creation wizard */

  /* ── Migrate legacy nodes: ensure col/row exist ── */
  useEffect(()=>{setNodes(ns=>{ns.forEach(n=>migrateNodeGrid(n));return[...ns];});},[]);

  /* ── Page load animation: groups→nodes→wires ── */
  const[loadPhase,setLoadPhase]=useState(0);
  useEffect(()=>{
    const t1=setTimeout(()=>setLoadPhase(1),50);   /* groups appear */
    const t2=setTimeout(()=>setLoadPhase(2),400);   /* nodes cascade */
    const t3=setTimeout(()=>setLoadPhase(3),1100);  /* wires fade */
    const t4=setTimeout(()=>setLoadPhase(4),1800);  /* done — remove animation overhead */
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);clearTimeout(t4)};
  },[]);

  /* Unified interaction ref — replaces dragRef, panRef, resRef */
  const interRef=useRef(null);
  const cRef=useRef(null);
  const sideAssignRef=useRef({}); /* { 'src→tgt': {srcSide,tgtSide,srcLocked?,tgtLocked?} } */
  const [nodeSizes,setNodeSizes]=useState({}); /* {nodeId:{w,h}} measured from DOM */
  const manualGroupSizes=useRef({}); /* {groupId:{w,h}} — floor set by manual resize */
  /* zoomCascadeFrameRef removed — vertical-only overlap resolution eliminates horizontal drift */
  const lastCascadeZoomRef=useRef(null); /* zoom level at last full cascade — detects zoom changes */
  const customThemesRef=useRef({}); /* {groupId:{nodeBg,headerBg,accent,text}} — custom group themes */
  /* HSV ↔ Hex helpers for color picker */
  function hsvToHex(h,s,v){
    const c=v*s, x=c*(1-Math.abs((h/60)%2-1)), m=v-c;
    let r=0,g=0,b=0;
    if(h<60){r=c;g=x}else if(h<120){r=x;g=c}else if(h<180){g=c;b=x}
    else if(h<240){g=x;b=c}else if(h<300){r=x;b=c}else{r=c;b=x}
    return '#'+[r+m,g+m,b+m].map(v=>Math.round(v*255).toString(16).padStart(2,'0')).join('');
  }
  function hexToHsv(hex){
    const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
    const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;
    let h=0;
    if(d!==0){
      if(max===r)h=((g-b)/d+6)%6*60;
      else if(max===g)h=((b-r)/d+2)*60;
      else h=((r-g)/d+4)*60;
    }
    const s=max===0?0:d/max;
    return {h:Math.round(h),s,v:max};
  }
  function hueToHex(h){return hsvToHex(h,1,1)}
  function hexToHue(hex){return hexToHsv(hex).h}

  /* Generate tinted dark backgrounds from an accent color */
  function tintFromAccent(hex){
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    const mix=(c,t,a)=>Math.round(c*a+t*(1-a));
    const nodeBg='#'+[r,g,b].map(c=>mix(c,16,0.12).toString(16).padStart(2,'0')).join('');
    const headerBg='#'+[r,g,b].map(c=>mix(c,22,0.15).toString(16).padStart(2,'0')).join('');
    const text='#'+[r,g,b].map(c=>Math.min(255,Math.round(c*0.6+120)).toString(16).padStart(2,'0')).join('');
    return {nodeBg,headerBg,text};
  }
  const getTheme=k=>customThemesRef.current[k]||TIERS[k]||TIERS.worker;
  const initialFitRef=useRef(0); /* counts auto-fit passes; stabilizes after a few */

  const toCanvas=useCallback((cx,cy)=>({x:(cx-pan.x)/zoom,y:(cy-pan.y)/zoom}),[pan,zoom]);
  const worldToScreen=useCallback((wx,wy)=>({x:wx*zoom+pan.x,y:wy*zoom+pan.y}),[pan,zoom]);

  /* ── Shift canvas when side panel opens/closes ── */
  const canvasShift=useMemo(()=>{
    if(!panelNode&&!groupEdit)return 0;
    const buffer=40;
    const vw=window.innerWidth;
    const panelLeft=vw-panelW;
    let maxScreenX=0;
    groups.forEach(g=>{const r=worldToScreen(g.x+g.w,0).x;if(r>maxScreenX)maxScreenX=r;});
    nodes.forEach(n=>{if(n.gid)return;const r=worldToScreen(n.x+n.w,0).x;if(r>maxScreenX)maxScreenX=r;});
    const overlap=maxScreenX-(panelLeft-buffer);
    if(overlap<=0)return 0;
    return -overlap;
  },[panelNode,groupEdit,panelW,groups,nodes,zoom,pan,worldToScreen]);

  /* ── zoom toward cursor ── */
  useEffect(()=>{
    const el=cRef.current;if(!el)return;
    const h=e=>{
      /* If wheel is inside a modal/wizard overlay, let it scroll naturally */
      if(e.target.closest('.wiz-overlay')||e.target.closest('.modal-overlay'))return;
      /* If wheel is inside a scrollable node prompt area, let it scroll instead of zoom */
      const scrollable=e.target.closest('[data-node-scroll]');
      if(scrollable){
        /* Only hijack for zoom if the content isn't scrollable */
        const canScroll=scrollable.scrollHeight>scrollable.clientHeight;
        if(canScroll){
          /* Let the browser scroll the element naturally */
          return;
        }
      }
      e.preventDefault();
      const factor=e.deltaY>0?1/1.05:1.05; /* 5% multiplicative per tick */
      setZoom(prevZ=>{
        const newZ=clamp(prevZ*factor,0.1,2);
        const cx=e.clientX, cy=e.clientY;
        setPan(p=>({x:cx-(cx-p.x)*(newZ/prevZ), y:cy-(cy-p.y)*(newZ/prevZ)}));
        return newZ;
      });
    };
    el.addEventListener('wheel',h,{passive:false});
    return()=>el.removeEventListener('wheel',h);
  },[]);

  /* ── responsive: re-center pan on resize (no auto-zoom — keeps text legible) ── */
  useEffect(()=>{
    let prevW=window.innerWidth, prevH=window.innerHeight;
    const onResize=()=>{
      const vw=window.innerWidth,vh=window.innerHeight;
      /* Shift pan by half the viewport delta to keep content centred */
      const dx=(vw-prevW)/2, dy=(vh-prevH)/2;
      setPan(p=>({x:p.x+dx,y:p.y+dy}));
      prevW=vw; prevH=vh;
    };
