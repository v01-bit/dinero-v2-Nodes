  const accent=isErr?'#cc3333':t.accent;
  const sb='sb-'+t.accent.replace('#','');

  /* ── Dirty tracking for save flow ── */
  const[draft,setDraft]=useState({label:nd.label,model:nd.model,prompt:nd.prompt});
  const[saved,setSaved]=useState(false);
  const[confirmSave,setConfirmSave]=useState(false);
  const draftRef=useRef(draft);
  draftRef.current=draft;
  const prevNidRef=useRef(nd.id);
  const prevNodeRef=useRef({label:nd.label,model:nd.model,prompt:nd.prompt});
  /* Warn before switching nodes if dirty */
  useEffect(()=>{
    if(prevNidRef.current!==nd.id){
      const p=prevNodeRef.current, d=draftRef.current;
      if(d.label!==p.label||d.model!==p.model||d.prompt!==p.prompt){
        /* Previous node had unsaved changes — auto-save with notification */
        updateNode(prevNidRef.current,d);
      }
      prevNidRef.current=nd.id;
    }
    prevNodeRef.current={label:nd.label,model:nd.model,prompt:nd.prompt};
    setDraft({label:nd.label,model:nd.model,prompt:nd.prompt});
    setSaved(false);setConfirmSave(false);
  },[nd.id]);
  const isDirty=draft.label!==nd.label||draft.model!==nd.model||draft.prompt!==nd.prompt;
  const doSave=()=>{setConfirmSave(true)};
  const doConfirmSave=()=>{updateNode(nd.id,draft);setSaved(true);setConfirmSave(false);setTimeout(()=>setSaved(false),1500)};
  const doCancel=()=>setDraft({label:nd.label,model:nd.model,prompt:nd.prompt});

  /* Live simulation tick */
  useEffect(()=>{
    const iv=setInterval(()=>{
      setTick(t=>t+1);
      /* Add new log entry */
      setLogs(ls=>[{ts:ts(),msg:pick(logGen[tier]()),isNew:true},...ls.slice(0,49)]);
    },2800);
    const iv2=setInterval(()=>{
      setActivity(activityGen[tier]());
    },6000);
    return()=>{clearInterval(iv);clearInterval(iv2)};
  },[tier]);

  /* After tick, clear isNew flag */
  useEffect(()=>{
    if(tick===0)return;
    const t2=setTimeout(()=>setLogs(ls=>ls.map(l=>({...l,isNew:false}))),400);
    return()=>clearTimeout(t2);
  },[tick]);

  const toggle=k=>setCollapsed(c=>({...c,[k]:!c[k]}));
  const model=MODELS.find(m=>m.id===nd.model)||MODELS[0];
  const metrics=useMemo(()=>metricsFor(tier,isErr),[tick,tier,isErr]);
  const processing=useMemo(()=>processingFor(tier,nd,isErr),[tick,tier,nd,isErr]);

  /* Dependencies from wires */
  const upstream=wires.filter(w=>w.tgt===nd.id).map(w=>nodes.find(n=>n.id===w.src)).filter(Boolean);
  const downstream=wires.filter(w=>w.src===nd.id).map(w=>nodes.find(n=>n.id===w.tgt)).filter(Boolean);

  const health=isErr?{label:'DEGRADED',color:'#cc3333',pct:rint(15,35)}:{
    label:'OPERATIONAL',color:accent,pct:rint(92,100)
  };

  return(
    <div ref={panelRef} className="panel-enter" onMouseDown={e=>e.stopPropagation()}
      style={{position:'absolute',top:0,right:0,bottom:0,width:380,
      zIndex:100,background:'#1a1a1afa',borderLeft:`2px solid ${accent}44`,
      display:'flex',flexDirection:'column',overflow:'hidden',overscrollBehavior:'contain'}}>

      {/* ── HEADER ── */}
      <div style={{padding:'14px 16px',background:isErr?'#2a1414':t.headerBg,
        borderBottom:`1px solid ${accent}22`,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
          <div style={{width:10,height:10,borderRadius:5,background:accent,
            boxShadow:`0 0 10px ${accent}88`}}/>
          <div style={{flex:1}}>
            <input value={draft.label} onChange={e=>setDraft(d=>({...d,label:e.target.value}))}
              style={{fontSize:16,fontWeight:700,color:isErr?'#ff6666':t.text,
                background:'transparent',border:'none',borderBottom:`1px solid ${isDirty?accent+'66':'transparent'}`,
                width:'100%',padding:'2px 0',outline:'none',fontFamily:'inherit',
                transition:'border-color 0.15s'}}
              onFocus={e=>{e.target.style.borderBottomColor=accent+'66'}}
              onBlur={e=>{if(!isDirty)e.target.style.borderBottomColor='transparent'}}/>
            <div style={{fontSize:9,color:'#777',marginTop:2,textTransform:'uppercase',letterSpacing:1}}>
              {tier} · {model.label} · <span style={{color:health.color}}>{health.label}</span>
            </div>
          </div>
          <button onClick={()=>{if(isDirty){if(window.confirm('You have unsaved changes. Close anyway?'))onClose()}else onClose()}}
            style={{background:'transparent',border:'none',
            color:'#666',fontSize:18,cursor:'pointer',lineHeight:1}}>✕</button>
        </div>
        {/* Health bar */}
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:8,color:'#666',letterSpacing:1}}>HEALTH</span>
          <div style={{flex:1,height:3,background:'#ffffff0a',borderRadius:2,overflow:'hidden'}}>
            <div style={{width:`${health.pct}%`,height:'100%',background:accent,borderRadius:2,
              transition:'width 0.8s ease'}}/>
          </div>
          <span style={{fontSize:9,color:accent,fontWeight:600,fontVariantNumeric:'tabular-nums'}}>{health.pct}%</span>
        </div>
      </div>

      {/* ── SAVE BAR (sticky when dirty) ── */}
      {isDirty&&<div style={{padding:'8px 16px',background:accent+'18',borderBottom:`1px solid ${accent}33`,
        display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
        <span style={{flex:1,fontSize:11,color:accent,fontWeight:600}}>Unsaved changes</span>
        <button onClick={doCancel} style={{fontSize:11,padding:'4px 12px',borderRadius:5,
          border:'1px solid #55555566',background:'transparent',color:'#999',cursor:'pointer'}}>Cancel</button>
        <button onClick={doSave} style={{fontSize:11,padding:'4px 14px',borderRadius:5,
          border:`1px solid ${accent}66`,background:accent+'22',color:t.text,cursor:'pointer',fontWeight:600}}>Save</button>
      </div>}
      {saved&&<div style={{padding:'6px 16px',background:'#28a74520',borderBottom:'1px solid #28a74533',
        fontSize:11,color:'#28a745',fontWeight:600,flexShrink:0,textAlign:'center'}}>Changes saved</div>}

      {/* ── SAVE CONFIRMATION OVERLAY ── */}
      {confirmSave&&<div style={{position:'absolute',inset:0,zIndex:110,background:'rgba(0,0,0,0.6)',
        display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
        <div style={{background:'#252525',border:'1px solid #444',borderRadius:12,padding:'24px 28px',
          maxWidth:320,boxShadow:'0 8px 40px rgba(0,0,0,0.5)'}}>
          <div style={{fontSize:14,fontWeight:700,color:'#e0e0e0',marginBottom:8}}>Save Changes?</div>
          <div style={{fontSize:12,color:'#999',lineHeight:1.5,marginBottom:18}}>
            Are you sure you want to save these changes to <strong style={{color:accent}}>{draft.label}</strong>?
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
            <button onClick={()=>setConfirmSave(false)} style={{padding:'6px 16px',borderRadius:6,
              border:'1px solid #555',background:'#333',color:'#ccc',fontSize:12,cursor:'pointer',fontWeight:600}}>Cancel</button>
            <button onClick={doConfirmSave} style={{padding:'6px 16px',borderRadius:6,
              border:`1px solid ${accent}66`,background:accent+'22',color:t.text,fontSize:12,cursor:'pointer',fontWeight:600}}>Save</button>
          </div>
        </div>
      </div>}

      {/* ── SCROLLABLE BODY ── */}
      <div style={{flex:1,overflow:'auto',padding:'12px 14px',overscrollBehavior:'contain'}} className={sb}>

        {/* SECTION 1: CONFIGURATION & RULES (top priority) */}
        <div className="sp-section">
          <div className="sp-section-hdr" onClick={()=>toggle('config')}>
            <span>Configuration & Rules</span>
            <span style={{fontSize:11,color:'#555'}}>{collapsed.config?'▸':'▾'}</span>
          </div>
          {!collapsed.config&&<div className="sp-section-body">
            <div style={{fontSize:9,color:'#666',letterSpacing:1,marginBottom:6,fontWeight:700}}>MODEL</div>
            <div className="sp-row">
              <span className="sp-label">Engine</span>
              <select value={draft.model} onChange={e=>setDraft(d=>({...d,model:e.target.value}))}
                style={{background:'#252525',color:model.color,fontSize:11,fontWeight:600,
                  padding:'4px 8px',borderRadius:4,border:`1px solid ${accent}22`,cursor:'pointer',
                  fontFamily:'inherit'}}>
                {MODELS.map(m=><option key={m.id} value={m.id}>{m.label} ({m.cost})</option>)}
              </select>
            </div>
            <div className="sp-row">
              <span className="sp-label">Cost tier</span>
              <span className="sp-val">{model.cost}</span>
            </div>
            <div className="sp-row">
              <span className="sp-label">Status</span>
              <span className="sp-val" style={{color:isErr?'#cc3333':accent}}>{isErr?'ERROR':'Active'}</span>
            </div>
            <div style={{fontSize:9,color:'#666',letterSpacing:1,margin:'12px 0 6px',fontWeight:700}}>BEHAVIOUR PROMPT</div>
            <textarea className={sb} value={draft.prompt}
              onChange={e=>setDraft(d=>({...d,prompt:e.target.value}))}
              style={{width:'100%',minHeight:110,fontSize:11,lineHeight:1.6,padding:'10px 12px',
                borderRadius:6,border:`1px solid ${isDirty?accent+'44':'#ffffff0a'}`,background:'#ffffff04',
                color:isErr?'#cc9999':'#bbb',resize:'vertical',fontFamily:'inherit',
                outline:'none',overscrollBehavior:'contain',transition:'border-color 0.15s'}}/>
          </div>}
        </div>

        {/* SECTION 2: LIVE ACTIVITY SUMMARY */}
        <div className="sp-activity" style={{background:isErr?'#cc333308':`${accent}08`,
          borderColor:accent,color:isErr?'#cc9999':'#bbb',fontSize:11,lineHeight:1.6}}>
          <div style={{position:'absolute',top:10,left:-6,width:8,height:8,borderRadius:4,background:accent}}/>
          {activity}
        </div>

        {/* SECTION 3: REAL-TIME PROCESSING */}
        <div className="sp-section">
          <div className="sp-section-hdr" onClick={()=>toggle('proc')}>
            <span>Real-time Processing</span>
            <span style={{fontSize:11,color:'#555'}}>{collapsed.proc?'▸':'▾'}</span>
          </div>
          {!collapsed.proc&&<div className="sp-section-body">
            <div style={{fontSize:9,color:'#666',letterSpacing:1,marginBottom:4,fontWeight:700}}>ACTIVE INPUTS</div>
            {processing.inputs.map((inp,i)=>(
              <div key={i} className="sp-row">
                <span className="sp-label">{inp.src}</span>
                <span className="sp-val" style={{fontSize:10,maxWidth:'55%',textAlign:'right'}}>{inp.val}</span>
              </div>
            ))}
            <div style={{fontSize:9,color:'#666',letterSpacing:1,margin:'8px 0 4px',fontWeight:700}}>DECISIONS IN PROGRESS</div>
            {processing.decisions.map((d,i)=>(
              <div key={i} style={{fontSize:11,color:d.startsWith('ERROR')?'#cc3333':'#aaa',padding:'3px 0',
                borderLeft:`2px solid ${d.startsWith('ERROR')?'#cc3333':accent}33`,paddingLeft:8,marginBottom:2,lineHeight:1.5}}>{d}</div>
            ))}
            <div style={{fontSize:9,color:'#666',letterSpacing:1,margin:'8px 0 4px',fontWeight:700}}>INTERMEDIATE OUTPUTS</div>
            {processing.outputs.map((o,i)=>(
              <div key={i} style={{fontSize:11,color:'#999',padding:'2px 0',lineHeight:1.5}}>→ {o}</div>
            ))}
          </div>}
        </div>

        {/* SECTION 4: DEPENDENCIES & CONNECTIONS */}
        <div className="sp-section">
          <div className="sp-section-hdr" onClick={()=>toggle('deps')}>
            <span>Dependencies & Connections</span>
            <span style={{fontSize:11,color:'#555'}}>{collapsed.deps?'▸':'▾'}</span>
          </div>
          {!collapsed.deps&&<div className="sp-section-body">
            {upstream.length>0&&<>
              <div style={{fontSize:9,color:'#666',letterSpacing:1,marginBottom:4,fontWeight:700}}>UPSTREAM (INPUTS FROM)</div>
              {upstream.map((u,i)=>{
                const ut=tierMap[u.gid]||'worker';
                const uc=TIERS[ut].accent;
                return(<div key={i} className="sp-dep">
                  <div style={{width:6,height:6,borderRadius:3,background:uc,boxShadow:`0 0 4px ${uc}66`}}/>
                  <span style={{color:'#bbb',fontSize:11}}>{u.label}</span>
                  <span className="sp-dep-arrow">→</span>
                  <span style={{color:accent,fontSize:11,fontWeight:600}}>{nd.label}</span>
                </div>);
              })}
            </>}
            {downstream.length>0&&<>
              <div style={{fontSize:9,color:'#666',letterSpacing:1,margin:'8px 0 4px',fontWeight:700}}>DOWNSTREAM (OUTPUTS TO)</div>
              {downstream.map((d,i)=>{
                const dt=tierMap[d.gid]||'worker';
                const dc=TIERS[dt].accent;
                return(<div key={i} className="sp-dep">
                  <span style={{color:accent,fontSize:11,fontWeight:600}}>{nd.label}</span>
                  <span className="sp-dep-arrow">→</span>
                  <div style={{width:6,height:6,borderRadius:3,background:dc,boxShadow:`0 0 4px ${dc}66`}}/>
                  <span style={{color:'#bbb',fontSize:11}}>{d.label}</span>
                </div>);
              })}
            </>}
            {upstream.length===0&&downstream.length===0&&
              <div style={{fontSize:11,color:'#555',padding:8}}>No active connections</div>}
          </div>}
        </div>

        {/* SECTION 5: LOGS & EXECUTION HISTORY */}
        <div className="sp-section">
          <div className="sp-section-hdr" onClick={()=>toggle('logs')}>
            <span>Logs & Execution History</span>
            <span style={{fontSize:10,color:'#555'}}>{logs.length} entries {collapsed.logs?'▸':'▾'}</span>
          </div>
          {!collapsed.logs&&<div className={`sp-section-body ${sb}`} style={{maxHeight:220,overflow:'auto',overscrollBehavior:'contain'}}>
            {logs.map((l,i)=>(
              <div key={i} className={`sp-log ${l.isNew?'sp-log-new':''}`}>
                <span className="sp-log-ts">{l.ts}</span>
                <span className="sp-log-msg" style={{color:l.msg.includes('ERROR')||l.msg.includes('violation')?'#cc3333':'#aaa'}}>{l.msg}</span>
              </div>
            ))}
          </div>}
        </div>

        {/* SECTION 6: PERFORMANCE METRICS */}
        <div className="sp-section">
          <div className="sp-section-hdr" onClick={()=>toggle('metrics')}>
            <span>Performance Metrics</span>
            <span style={{fontSize:11,color:'#555'}}>{collapsed.metrics?'▸':'▾'}</span>
          </div>
          {!collapsed.metrics&&<div className="sp-section-body">
            {metrics.map((m,i)=>(
              <div key={i} className="sp-metric">
                <div className="sp-metric-top">
                  <span className="sp-label">{m.label}</span>
                  <span className="sp-val" style={{color:m.color}}>{m.value}</span>
                </div>
                <div className="sp-bar-track">
                  <div className="sp-bar-fill" style={{width:`${clamp(m.bar,0,100)}%`,background:m.color}}/>
                </div>
              </div>
            ))}
          </div>}
        </div>

        {/* Bottom spacer */}
        <div style={{height:20}}/>
      </div>
    </div>
  );
}

/* ═══════════════════ MAIN APP ═══════════════════ */
function App(){
  const[groups,setGroups]=useState(mkGroups);
  const[nodes,setNodes]=useState(mkNodes);
  const[wires,setWires]=useState(mkWires);
  const[pan,setPan]=useState(()=>{
    /* Fit-to-canvas: compute zoom and pan from actual graph bounds */
    const vw=window.innerWidth,vh=window.innerHeight;
    const gs=mkGroups();
    const minX=Math.min(...gs.map(g=>g.x));
    const minY=Math.min(...gs.map(g=>g.y));
    const maxX=Math.max(...gs.map(g=>g.x+g.w));
    const maxY=Math.max(...gs.map(g=>g.y+g.h));
    const gw=maxX-minX, gh=maxY-minY;
    const PAD=40; /* screen-space padding */
    const zx=(vw-PAD*2)/gw, zy=(vh-PAD*2)/gh;
    const z=clamp(Math.min(zx,zy),0.15,1.2);
    window.__initZoom=z;
    return{x:(vw-gw*z)/2-minX*z, y:(vh-gh*z)/2-minY*z};
  });
  const[zoom,setZoom]=useState(()=>window.__initZoom||0.5);
  const[selected,setSelected]=useState(null);
  const[wiringFrom,setWiringFrom]=useState(null); /* {nid,side} or null */
  const[wiringMouse,setWiringMouse]=useState(null);
  const[wizard,setWizard]=useState(null); /* {gid} or null */
  const[dyingWires,setDyingWires]=useState([]);
  const[modal,setModal]=useState(null); /* {type,id,msg,onConfirm} */
  const[panelNode,setPanelNode]=useState(null);
  const[hoverNode,setHoverNode]=useState(null);
  const[hoverWire,setHoverWire]=useState(null); /* wireIdx or null */
  const[debugPorts,setDebugPorts]=useState(false); /* toggle with D key */

  /* ── Page load animation: groups→nodes→wires ── */
  const[loadPhase,setLoadPhase]=useState(0);
  useEffect(()=>{
    const t1=setTimeout(()=>setLoadPhase(1),50);   /* groups appear */
    const t2=setTimeout(()=>setLoadPhase(2),400);   /* nodes cascade */
    const t3=setTimeout(()=>setLoadPhase(3),1100);  /* wires fade */
    const t4=setTimeout(()=>setLoadPhase(4),1800);  /* done — remove animation overhead */
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);clearTimeout(t4)};
  },[]);

  /* Unified interaction ref — replaces dragRef, panRef, resRef */
  const interRef=useRef(null);
  const cRef=useRef(null);
  const sideAssignRef=useRef({}); /* { 'src→tgt': {srcSide,tgtSide} } — stable side assignments */

  const toCanvas=useCallback((cx,cy)=>({x:(cx-pan.x)/zoom,y:(cy-pan.y)/zoom}),[pan,zoom]);

  /* ── zoom toward cursor ── */
  useEffect(()=>{
    const el=cRef.current;if(!el)return;
    const h=e=>{
      e.preventDefault();
      const delta=e.deltaY>0?-0.06:0.06;
      setZoom(prevZ=>{
        const newZ=clamp(prevZ+delta,0.1,2);
        const cx=e.clientX, cy=e.clientY;
        setPan(p=>({x:cx-(cx-p.x)*(newZ/prevZ), y:cy-(cy-p.y)*(newZ/prevZ)}));
        return newZ;
      });
    };
    el.addEventListener('wheel',h,{passive:false});
    return()=>el.removeEventListener('wheel',h);
  },[]);

  /* ── responsive: refit graph on window resize ── */
  useEffect(()=>{
    const onResize=()=>{
      const vw=window.innerWidth,vh=window.innerHeight;
      const gs=groups;
      if(!gs.length)return;
      const minX=Math.min(...gs.map(g=>g.x));
      const minY=Math.min(...gs.map(g=>g.y));
      const maxX=Math.max(...gs.map(g=>g.x+g.w));
      const maxY=Math.max(...gs.map(g=>g.y+g.h));
      const gw=maxX-minX,gh=maxY-minY;
      if(gw<=0||gh<=0)return;
      const PAD=40;
      const z=clamp(Math.min((vw-PAD*2)/gw,(vh-PAD*2)/gh),0.15,1.2);
      setZoom(z);
      setPan({x:(vw-gw*z)/2-minX*z, y:(vh-gh*z)/2-minY*z});
    };
    window.addEventListener('resize',onResize);
    return()=>window.removeEventListener('resize',onResize);
  },[groups]);

  /* ── cleanup dying wires ── */
  useEffect(()=>{
    if(!dyingWires.length)return;
    const t=setTimeout(()=>setDyingWires([]),600);
    return()=>clearTimeout(t);
  },[dyingWires]);

  /* ── connected set ── */
  const connSet=useMemo(()=>{const s=new Set();wires.forEach(w=>{s.add(w.src);s.add(w.tgt)});return s},[wires]);

  /* ── port positions from immutable port definitions ── */
  const{portPositions,portsByNode}=useMemo(()=>{
    return computePortPositions(wires,nodes,groups,sideAssignRef.current);
  },[wires,nodes,groups]);

  const wireData=useMemo(()=>{
    return wires.map((w,i)=>{
      const sN=nodes.find(n=>n.id===w.src),tN=nodes.find(n=>n.id===w.tgt);
      if(!sN||!tN)return null;
      const pA=portPositions[w.srcPort],pB=portPositions[w.tgtPort];
      if(!pA||!pB)return null;
      const sA=pA.side, sB=pB.side;
      const isErr=sN.status==='error';
      const srcTier=tierMap[sN.gid]||'worker';
      const accent=TIERS[srcTier].accent;
      const path=makeSimpleBezier(pA.x,pA.y,pB.x,pB.y,sA,sB);
      return{i,src:w.src,tgt:w.tgt,srcPort:w.srcPort,tgtPort:w.tgtPort,pA,pB,sA,sB,isErr,accent,path};
    }).filter(Boolean);
  },[wires,nodes,groups,portPositions]);

  /* ── adaptive zoom: simplified view below 0.4 ── */
  const simplified=zoom<0.4;

  /* ── MOUSE DOWN ── */
  const DRAG_THRESHOLD=5;
  const onMD=useCallback(e=>{
    if(e.button!==0||modal||wizard)return;
    const tag=e.target.tagName;
    /* Buttons/options handle their own actions — let them through */
    if(tag==='BUTTON'||tag==='OPTION')return;

    /* PORT DRAG — all connection actions use drag lifecycle (mousedown→mousemove→mouseup) */
    const portEl=e.target.closest('[data-port-id]');
    if(portEl){
      e.preventDefault();
      e.stopPropagation();
      if(cRef.current&&e.pointerId!==undefined)cRef.current.setPointerCapture(e.pointerId);

      /* Read exact port identity from DOM — no searching, no guessing */
      const pid=portEl.getAttribute('data-port-id');
      const nid=portEl.getAttribute('data-nid');
      const side=portEl.getAttribute('data-port');
      const pp=portPositions[pid];
      const portPos=pp?{x:pp.x,y:pp.y}:null;

      interRef.current={type:'wiring'};

      /* Check if this port has a wire attached */
      const wireIdx=wires.findIndex(w=>w.srcPort===pid||w.tgtPort===pid);
      if(wireIdx>=0){
        /* Connected port → detach wire, enter reconnect drag from the OTHER end */
        const ew=wires[wireIdx];
        const isSource=ew.srcPort===pid;
        const otherPortId=isSource?ew.tgtPort:ew.srcPort;
        const otherNid=isSource?ew.tgt:ew.src;
        const otherPP=portPositions[otherPortId];
        const otherSide=otherPP?otherPP.side:'right';
        const otherPos=otherPP?{x:otherPP.x,y:otherPP.y}:null;
        const wd=wireData.find(w=>w.i===wireIdx);
        if(wd)setDyingWires([{path:wd.path}]);
        setWires(ws=>ws.filter((_,i)=>i!==wireIdx));
        setWiringFrom({nid:otherNid,portId:otherPortId,side:otherSide,portPos:otherPos,isDragDisconnect:true});
        setWiringMouse(toCanvas(e.clientX,e.clientY));
      }else{
        /* Unconnected port → start new connection drag */
        setWiringFrom({nid,portId:pid,side,portPos,isDragDisconnect:false});
        setWiringMouse(toCanvas(e.clientX,e.clientY));
      }
      return;
    }

    /* NODE CLICK — entire node uses pending→drag threshold */
    const nodeEl=e.target.closest('[data-node]');
    if(nodeEl){
      const nid=nodeEl.getAttribute('data-node');
      const nd=nodes.find(n=>n.id===nid);if(!nd)return;
      const g=groups.find(g=>g.id===nd.gid);if(!g)return;
      if(wiringFrom){setWiringFrom(null);setWiringMouse(null)}
      const absX=g.x+nd.x,absY=g.y+GH+2+nd.y;
      const c=toCanvas(e.clientX,e.clientY);
      const isFormEl=tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT';
      setSelected(nid);
      interRef.current={type:'pending_node',id:nid,
        startX:e.clientX,startY:e.clientY,
        ox:c.x-absX,oy:c.y-absY,isFormEl};
      e.stopPropagation();return;
    }

    /* GROUP HEADER DRAG — also uses pending threshold */
    const ghEl=e.target.closest('[data-gh]');
    if(ghEl){
      const gid=ghEl.getAttribute('data-gh');
      const g=groups.find(g=>g.id===gid);if(!g)return;
      const c=toCanvas(e.clientX,e.clientY);
      interRef.current={type:'pending_group',id:gid,
        startX:e.clientX,startY:e.clientY,
        ox:c.x-g.x,oy:c.y-g.y};
      e.stopPropagation();return;
    }

    /* Cancel wiring on empty canvas click */
    if(wiringFrom){setWiringFrom(null);setWiringMouse(null);return}

    /* PAN — clear selection and sidebar */
    interRef.current={type:'panning',sx:e.clientX-pan.x,sy:e.clientY-pan.y};
    setSelected(null);
    setPanelNode(null);
  },[nodes,groups,pan,zoom,wiringFrom,wires,modal,wizard,toCanvas,portPositions,portsByNode,wireData]);

  /* ── MOUSE MOVE ── */
  const onMM=useCallback(e=>{
    /* Wiring mouse tracking — follows cursor from port */
    if(wiringFrom){
      const c=toCanvas(e.clientX,e.clientY);
      /* ── Magnetic snap: pull toward nearest real port anchor ── */
      const SNAP_DIST=30;
      let snapTarget=null, bestD=SNAP_DIST;
      nodes.forEach(nd=>{
        if(nd.id===wiringFrom.nid)return;
        const np=portsByNode[nd.id];if(!np)return;
        SIDES.forEach(side=>{
          (np[side]||[]).forEach(slot=>{
            const d=Math.sqrt((c.x-slot.x)**2+(c.y-slot.y)**2);
            if(d<bestD){bestD=d;snapTarget={x:slot.x,y:slot.y,nid:nd.id,portId:slot.id,side}}
          });
        });
      });
      setWiringMouse(snapTarget||c);
      if(!interRef.current)return;
    }

    const ir=interRef.current;
    if(!ir)return;

    switch(ir.type){
      case 'wiring': return; /* locked for port drag — block canvas pan */
      case 'panning':
        setPan({x:e.clientX-ir.sx,y:e.clientY-ir.sy});
        break;

      case 'pending_node':{
        const dx=e.clientX-ir.startX,dy=e.clientY-ir.startY;
        if(!ir.isFormEl&&Math.sqrt(dx*dx+dy*dy)>DRAG_THRESHOLD){
          ir.type='dragging_node';
          /* Fall through to dragging_node */
        }else break;
      }
      /* falls through */
      case 'dragging_node':{
        const c=toCanvas(e.clientX,e.clientY);
        const{id,ox,oy}=ir;
        setNodes(ns=>{
          const dragged=ns.find(n=>n.id===id);if(!dragged)return ns;
          const g=groups.find(g=>g.id===dragged.gid);if(!g)return ns;
          let nx=c.x-ox-g.x, ny=c.y-oy-g.y-GH-2;
          /* ── Soft snap alignment ── */
          const SNAP=15; /* snap threshold in canvas px */
          const siblings=ns.filter(n=>n.id!==id&&n.gid===dragged.gid);
          let snapX=null,snapY=null,bestDx=SNAP,bestDy=SNAP;
          siblings.forEach(sib=>{
            /* Horizontal alignment: snap x to match sibling x (column alignment) */
            const dx=Math.abs(nx-sib.x);
            if(dx<bestDx){bestDx=dx;snapX=sib.x}
            /* Also snap to same x+w/2 centre alignment */
            const cxD=Math.abs((nx+dragged.w/2)-(sib.x+sib.w/2));
            if(cxD<bestDx){bestDx=cxD;snapX=sib.x+sib.w/2-dragged.w/2}
            /* Vertical alignment: snap y to match sibling y (row alignment) */
            const dy=Math.abs(ny-sib.y);
            if(dy<bestDy){bestDy=dy;snapY=sib.y}
            /* Centre-y alignment */
            const cyD=Math.abs((ny+dragged.h/2)-(sib.y+sib.h/2));
            if(cyD<bestDy){bestDy=cyD;snapY=sib.y+sib.h/2-dragged.h/2}
          });
          if(snapX!==null)nx=snapX;
          if(snapY!==null)ny=snapY;
          return ns.map(n=>n.id===id?{...n,x:nx,y:ny}:n);
        });
        break;
      }

      case 'pending_group':{
        const dx=e.clientX-ir.startX,dy=e.clientY-ir.startY;
        if(Math.sqrt(dx*dx+dy*dy)>DRAG_THRESHOLD){
          ir.type='dragging_group';
          setSelected(null);setPanelNode(null);
        }else break;
      }
      /* falls through */
      case 'dragging_group':{
        const c=toCanvas(e.clientX,e.clientY);
        const{id,ox,oy}=ir;
        setGroups(gs=>pushGroups(id,gs.map(g=>g.id===id?{...g,x:c.x-ox,y:c.y-oy}:g)));
        break;
      }

      case 'resizing_group':{
        const c=toCanvas(e.clientX,e.clientY);
        const r=ir,dx=c.x-r.scx,dy=c.y-r.scy;
        /* Content-aware minimum width: prevent nodes from overlapping.
           Uses EP for edge padding, MIN_SPACING=20 for minimum inter-node gap. */
        const MIN_SPACING=40; /* minimum inter-node gap during resize — matches routing clearance */
        const contentMinW=2*EP+r.cols*r.nodeW+(r.cols>1?(r.cols-1)*MIN_SPACING:0);
        const contentMinH=2*EP+r.rows*r.nodeH+(r.rows>1?(r.rows-1)*MIN_SPACING:0)+GH;
        const minW=Math.max(MIN_GW,contentMinW);
        const minH=Math.max(MIN_GH,contentMinH);
        let newX=r.x,newY=r.y,newW=r.w,newH=r.h;
        if(r.hnd.includes('e'))newW=Math.max(minW,r.w+dx);
        if(r.hnd.includes('s'))newH=Math.max(minH,r.h+dy);
        if(r.hnd.includes('w')){newW=Math.max(minW,r.w-dx);newX=r.x+(r.w-newW)}
        if(r.hnd.includes('n')){newH=Math.max(minH,r.h-dy);newY=r.y+(r.h-newH)}
        setGroups(gs=>pushGroups(r.id,gs.map(g=>g.id===r.id?{...g,x:newX,y:newY,w:newW,h:newH}:g)));
        if(r.origNodes&&r.origNodes.length>0&&r.rows>0&&r.cols>0){
          /* Even redistribution: distribute nodes evenly across available space.
             Symmetric by design — result depends only on target dimensions, not drag side. */
          const innerW=newW-EP*2, innerH=newH-GH-EP*2;
          if(innerW>0&&innerH>0){
            /* Compute even spacing for each row/column */
            const colSpace=r.cols>1?(innerW-r.cols*r.nodeW)/(r.cols-1):Math.max(0,(innerW-r.nodeW)/2);
            const rowSpace=r.rows>1?(innerH-r.rows*r.nodeH)/(r.rows-1):Math.max(0,(innerH-r.nodeH)/2);
            setNodes(ns=>ns.map(n=>{
              if(n.gid!==r.id)return n;
              const slot=r.nodeSlots[n.id];
              if(!slot)return n;
              const newNodeX=r.cols>1?EP+slot.col*(r.nodeW+colSpace):EP+colSpace;
              const newNodeY=r.rows>1?EP+slot.row*(r.nodeH+rowSpace):EP+rowSpace;
              return{...n,
                x:Math.max(10,Math.round(newNodeX)),
                y:Math.max(10,Math.round(newNodeY))
              };
            }));
          }
        }
        break;
      }
    }
  },[toCanvas,groups,nodes,wiringFrom,portsByNode]);

  /* ── MOUSE UP ── */
  const onMU=useCallback(e=>{
    /* ── Wiring drag release: resolve connection on mouseup ── */
    if(wiringFrom){
      /* ── Port detection on release — accept exact port, no guessing ── */
      let tgtNid=null, tgtPortId=null, tgtSide=null;
      const elUnder=document.elementFromPoint(e.clientX,e.clientY);
      const portEl=elUnder?.closest('[data-port-id]');
      if(portEl){
        /* Direct hit on a port element */
        tgtNid=portEl.getAttribute('data-nid');
        tgtPortId=portEl.getAttribute('data-port-id');
        tgtSide=portEl.getAttribute('data-port');
      }else if(wiringMouse&&wiringMouse.portId){
        /* Fallback: use snap target from mousemove */
        tgtNid=wiringMouse.nid;
        tgtPortId=wiringMouse.portId;
        tgtSide=wiringMouse.side;
      }
      if(tgtNid&&tgtNid!==wiringFrom.nid&&tgtPortId){
        /* Valid target → create port-to-port connection (skip if duplicate) */
        const srcPortId=wiringFrom.portId;
        setWires(w=>{
          const dup=w.some(e=>
            (e.srcPort===srcPortId&&e.tgtPort===tgtPortId)||
            (e.srcPort===tgtPortId&&e.tgtPort===srcPortId));
          if(dup)return w;
          const nw=[...w,{src:wiringFrom.nid,srcPort:srcPortId,tgt:tgtNid,tgtPort:tgtPortId}];
          /* Auto-expand: ensure 1 spare port per side */
          if(autoExpandPorts(nodes,nw))setNodes([...nodes]);
          return nw;
        });
      }
      setWiringFrom(null);setWiringMouse(null);
      interRef.current=null;
      if(cRef.current&&e.pointerId!==undefined){try{cRef.current.releasePointerCapture(e.pointerId)}catch(_){}}
    }

    const ir=interRef.current;
    if(!ir){return}

    switch(ir.type){
      case 'pending_node':
        /* Mouse released without moving past threshold = CLICK → open sidebar */
        setSelected(ir.id);
        setPanelNode(prev=>prev===ir.id?null:ir.id);
        break;

      case 'pending_group':
        /* Click on group header without dragging — no action needed */
        break;

      case 'dragging_node':{
        /* Node drag completion — check for cable splice */
        const nid=ir.id;
        const nd=nodes.find(n=>n.id===nid);
        if(nd){
          const c=nCtr(nd,groups);
          for(let wi=0;wi<wireData.length;wi++){
            const wd=wireData[wi];
            if(wd.src===nid||wd.tgt===nid)continue;
            if(pointNearBezier(c.x,c.y,wd.path,50)){
              setWires(ws=>{
                const oldW=ws[wd.i];
                const newW=ws.filter((_,i)=>i!==wd.i);
                /* Splice: pick first available port on the dropped node for each half.
                   Source side → find an unconnected port facing the source node.
                   Target side → find an unconnected port facing the target node. */
                const ndObj=nodes.find(n=>n.id===nid);
                if(ndObj&&ndObj.ports){
                  const srcSide=wd.sA?oppositeSide(wd.sA):'left';
                  const tgtSide=wd.sB?oppositeSide(wd.sB):'right';
                  const srcPorts=(ndObj.ports[srcSide]||[]);
                  const tgtPorts=(ndObj.ports[tgtSide]||[]);
                  const usedPorts=new Set();newW.forEach(w=>{usedPorts.add(w.srcPort);usedPorts.add(w.tgtPort)});
                  const freeIn=srcPorts.find(p=>!usedPorts.has(p.id));
                  const freeOut=tgtPorts.find(p=>!usedPorts.has(p.id));
                  if(freeIn&&freeOut&&oldW){
                    newW.push({src:oldW.src,srcPort:oldW.srcPort,tgt:nid,tgtPort:freeIn.id});
                    newW.push({src:nid,srcPort:freeOut.id,tgt:oldW.tgt,tgtPort:oldW.tgtPort});
                    if(autoExpandPorts(nodes,newW))setNodes([...nodes]);
                  }
                }
                return newW;
              });
              break;
            }
          }
        }
        break;
      }

      case 'wiring': /* already handled above */
      case 'dragging_group':
      case 'resizing_group':
      case 'panning':
        break;
    }

    interRef.current=null;
  },[nodes,groups,wireData,wiringFrom,wiringMouse,toCanvas,portsByNode]);

  useEffect(()=>{
    window.addEventListener('pointermove',onMM);
    window.addEventListener('pointerup',onMU);
    return()=>{window.removeEventListener('pointermove',onMM);window.removeEventListener('pointerup',onMU)};
  },[onMM,onMU]);

  /* ── Escape key: cancel wiring / close sidebar / close modal ── */
  useEffect(()=>{
    const onKey=e=>{
      if(e.key==='Escape'){
        if(wiringFrom){setWiringFrom(null);setWiringMouse(null)}
        else if(wizard){setWizard(null)}
        else if(modal){setModal(null)}
        else if(panelNode){setPanelNode(null);setSelected(null)}
      }
      if(e.key==='d'||e.key==='D'){setDebugPorts(v=>!v)}
    };
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[wiringFrom,wizard,modal,panelNode]);

  /* ── resize starters ── */
  const startGResize=useCallback((e,gid,hnd)=>{
    e.stopPropagation();e.preventDefault();
    const g=groups.find(g=>g.id===gid);if(!g)return;
    const c=toCanvas(e.clientX,e.clientY);
    const origNodes=nodes.filter(n=>n.gid===gid).map(n=>({id:n.id,x:n.x,y:n.y,w:n.w,h:n.h}));
    /* Detect grid: group nodes into rows by similar y, then columns by x order */
    const rowThresh=30;
    const yBuckets=[];
    origNodes.forEach(n=>{
      const bucket=yBuckets.find(b=>Math.abs(b.y-n.y)<rowThresh);
      if(bucket)bucket.nodes.push(n);
      else yBuckets.push({y:n.y,nodes:[n]});
    });
    yBuckets.sort((a,b)=>a.y-b.y);
    yBuckets.forEach(b=>b.nodes.sort((a,b)=>a.x-b.x));
    const rows=yBuckets.length;
    const cols=Math.max(...yBuckets.map(b=>b.nodes.length),1);
    const nodeW=origNodes.length>0?Math.max(...origNodes.map(n=>n.w)):NW;
    const nodeH=origNodes.length>0?Math.max(...origNodes.map(n=>n.h)):NH;
    /* Assign grid slot to each node */
    const nodeSlots={};
    yBuckets.forEach((bucket,row)=>{
      bucket.nodes.forEach((n,col)=>{
        nodeSlots[n.id]={row,col};
      });
    });
    interRef.current={type:'resizing_group',id:gid,hnd,scx:c.x,scy:c.y,
      x:g.x,y:g.y,w:g.w,h:g.h,origNodes,rows,cols,nodeW,nodeH,nodeSlots};
  },[groups,nodes,toCanvas]);

  const startNResize=useCallback((e,nid,hnd)=>{
    e.stopPropagation();e.preventDefault();
    const nd=nodes.find(n=>n.id===nid);if(!nd)return;
    const c=toCanvas(e.clientX,e.clientY);
    const r={type:'node',id:nid,hnd,scx:c.x,scy:c.y,x:nd.x,y:nd.y,w:nd.w,h:nd.h};
    const mv=ev=>{
      const cc=toCanvas(ev.clientX,ev.clientY);
      const dx=cc.x-r.scx,dy=cc.y-r.scy;
      setNodes(ns=>ns.map(n=>{
        if(n.id!==r.id)return n;
        let{x,y,w,h}=r;
        if(hnd.includes('e'))w=Math.max(MIN_NW,r.w+dx);
        if(hnd.includes('s'))h=Math.max(MIN_NH,r.h+dy);
        if(hnd.includes('w')){const nw=Math.max(MIN_NW,r.w-dx);x=r.x+(r.w-nw);w=nw}
        if(hnd.includes('n')){const nh=Math.max(MIN_NH,r.h-dy);y=r.y+(r.h-nh);h=nh}
        return{...n,x,y,w,h};
      }));
    };
    const up=()=>{window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up)};
    window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
  },[nodes,toCanvas]);

  /* ── context menu: disconnect ── */
  const onCtx=useCallback(e=>{
    const portEl=e.target.closest('[data-port-id]');
    if(portEl){
      e.preventDefault();
      const pid=portEl.getAttribute('data-port-id');
      /* Find wire attached to this port */
      const wireIdx=wires.findIndex(w=>w.srcPort===pid||w.tgtPort===pid);
      if(wireIdx>=0){
        const wd=wireData.find(w=>w.i===wireIdx);
        if(wd)setDyingWires([{path:wd.path}]);
        setWires(ws=>ws.filter((_,i)=>i!==wireIdx));
      }
      return;
    }
    const wireEl=e.target.closest('[data-wire]');
    if(wireEl){
      e.preventDefault();
      const idx=parseInt(wireEl.getAttribute('data-wire'));
      const wd=wireData.find(w=>w.i===idx);
      if(wd)setDyingWires([{path:wd.path}]);
      setWires(ws=>ws.filter((_,i)=>i!==idx));
    }
  },[wires,wireData]);

  /* ── node mutations with confirmation ── */
  const updateNode=useCallback((id,patch)=>setNodes(ns=>ns.map(n=>n.id===id?{...n,...patch}:n)),[]);

  const requestDelete=useCallback(id=>{
    setModal({type:'delete',id,msg:'Are you sure you want to remove this node?',
      onConfirm:()=>{
        /* Animate connected wires dying */
        const dying=wireData.filter(wd=>wd.src===id||wd.tgt===id).map(wd=>({path:wd.path}));
        setDyingWires(dying);
        setNodes(ns=>ns.filter(n=>n.id!==id));
        setWires(ws=>ws.filter(w=>w.src!==id&&w.tgt!==id));
        if(selected===id)setSelected(null);
        if(panelNode===id)setPanelNode(null);
        setModal(null);
      }});
  },[wireData,selected,panelNode]);


  const addNode=useCallback(gid=>{
    setWizard({gid,step:0,name:'',tier:tierMap[gid]||'worker',model:'rules',prompt:'',constraints:''});
  },[]);

  const addGroup=useCallback(tier=>{
    const id=tier+'-'+Date.now();
    const label=tier.charAt(0).toUpperCase()+tier.slice(1);
    const maxX=groups.reduce((mx,g)=>Math.max(mx,g.x+g.w),0);
    setGroups(gs=>pushGroups(id,[...gs,{id,label,tier,x:maxX+60,y:100,w:420,h:320}]));
    tierMap[id]=tier;
  },[groups]);

  const zoomIn=useCallback(()=>setZoom(z=>clamp(z+0.1,0.1,2)),[]);
  const zoomOut=useCallback(()=>setZoom(z=>clamp(z-0.1,0.1,2)),[]);
  const zoomReset=useCallback(()=>{
    /* Fit-to-canvas reset */
    const vw=window.innerWidth,vh=window.innerHeight;
    const minX=Math.min(...groups.map(g=>g.x));
    const minY=Math.min(...groups.map(g=>g.y));
    const maxX=Math.max(...groups.map(g=>g.x+g.w));
    const maxY=Math.max(...groups.map(g=>g.y+g.h));
    const gw=maxX-minX,gh=maxY-minY;
    const PAD=40;
    const z=clamp(Math.min((vw-PAD*2)/gw,(vh-PAD*2)/gh),0.15,1.2);
    setZoom(z);
    setPan({x:(vw-gw*z)/2-minX*z,y:(vh-gh*z)/2-minY*z});
  },[groups]);

  /* ═══════════════════ RENDER ═══════════════════ */
  return(
    <div ref={cRef} style={{width:'100%',height:'100%',position:'relative',overflow:'hidden',
      cursor:interRef.current&&interRef.current.type!=='pending_node'&&interRef.current.type!=='pending_group'?'grabbing':'grab'}}
      onPointerDown={onMD} onContextMenu={onCtx}>

      {/* TOOLBAR */}
      <div style={{position:'absolute',top:0,left:0,right:0,height:56,zIndex:50,
        background:'linear-gradient(to bottom,#1a1a1aee 60%,#1a1a1a00)',display:'flex',
        alignItems:'center',justifyContent:'space-between',padding:'0 24px',pointerEvents:'none'}}>
        <div style={{pointerEvents:'auto'}}>
          <span style={{fontSize:17,fontWeight:700,color:'#e0e0e0',letterSpacing:1}}>DINERO v2</span>
          <span style={{fontSize:16,color:'#666',marginLeft:8}}>— Node Architect</span>
          <div style={{fontSize:11,color:'#555',marginTop:2}}>
            Click node for details · Drag to move · Click port to wire · Right-click to disconnect · Esc to cancel
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',pointerEvents:'auto'}}>
          {['orchestrator','manager','worker','infra'].map(t=>(
            <button key={t} onClick={()=>addGroup(t)} style={{
              background:TIERS[t].headerBg,border:`1px solid ${TIERS[t].accent}44`,borderRadius:6,
              color:TIERS[t].text,fontSize:11,padding:'6px 12px',cursor:'pointer',fontWeight:600,letterSpacing:0.5
            }}>+ {t.charAt(0).toUpperCase()+t.slice(1)}</button>
          ))}
          <button onClick={()=>{
            /* Pick group: selected node's group, or default to 'workers' */
            const gid=selected&&nodes.find(n=>n.id===selected)?.gid||'workers';
            addNode(gid);
          }} style={{
            background:'linear-gradient(135deg,#38d07a22,#4098d822)',
            border:'1.5px solid #38d07a66',borderRadius:8,
            color:'#e0e0e0',fontSize:13,padding:'8px 20px',cursor:'pointer',
            fontWeight:700,letterSpacing:0.5,marginLeft:8,
            boxShadow:'0 0 20px #38d07a22, 0 2px 8px rgba(0,0,0,0.3)',
            transition:'all 0.15s ease',
          }}
          onMouseEnter={e=>{e.target.style.boxShadow='0 0 30px #38d07a44, 0 2px 12px rgba(0,0,0,0.4)';e.target.style.borderColor='#38d07a99'}}
          onMouseLeave={e=>{e.target.style.boxShadow='0 0 20px #38d07a22, 0 2px 8px rgba(0,0,0,0.3)';e.target.style.borderColor='#38d07a66'}}
          >+ Add Node</button>
        </div>
      </div>

      {/* DOT GRID */}
      <div style={{position:'absolute',inset:0,
        backgroundImage:'radial-gradient(circle,#292929 1px,transparent 1px)',
        backgroundSize:`${30*zoom}px ${30*zoom}px`,
        backgroundPosition:`${pan.x%(30*zoom)}px ${pan.y%(30*zoom)}px`,
        pointerEvents:'none',zIndex:0}}/>

      {/* TRANSFORM CONTAINER */}
      <div style={{position:'absolute',top:0,left:0,transformOrigin:'0 0',
        transform:`translate(${pan.x}px,${pan.y}px) scale(${zoom})`,pointerEvents:'none'}}>

        {/* GROUPS */}
        {groups.map(g=>{
          const t=TIERS[g.tier]||TIERS.worker;
          return(
            <div key={g.id} style={{position:'absolute',left:g.x,top:g.y,width:g.w,height:g.h,zIndex:2,pointerEvents:'none',
              opacity:loadPhase>=1?1:0,
              animation:loadPhase>=1&&loadPhase<4?'groupFadeIn 0.4s ease-out forwards':'none'}}>
              {/* Group body with clipped content */}
              <div style={{position:'absolute',inset:0,background:'#1e1e1e',border:'1px solid #282828',
                borderRadius:12,overflow:'hidden',pointerEvents:'auto'}}>
                <div data-gh={g.id} style={{height:GH,background:t.headerBg,display:'flex',
                  alignItems:'center',padding:'0 14px',cursor:'grab',userSelect:'none',borderRadius:'12px 12px 0 0'}}>
                  <div style={{width:12,height:12,borderRadius:6,background:t.accent,
                    boxShadow:`0 0 8px ${t.accent}88`,marginRight:10,flexShrink:0}}/>
                  <span style={{fontSize:13,fontWeight:700,letterSpacing:2,color:t.text,textTransform:'uppercase',flex:1}}>
                    {g.label}</span>
                  <button onClick={e=>{e.stopPropagation();addNode(g.id)}} style={{
                    background:'transparent',border:`1px solid ${t.accent}22`,borderRadius:4,
                    color:t.text,fontSize:9,padding:'2px 6px',cursor:'pointer',fontWeight:500,
                    opacity:0.4,transition:'opacity 0.15s'}}
                    onMouseEnter={e=>e.target.style.opacity='0.8'}
                    onMouseLeave={e=>e.target.style.opacity='0.4'}>+ Node</button>
                </div>
              </div>
              {/* Resize handles — outside overflow:hidden, higher z so they sit above nodes */}
              {resizeHandles(g.id,startGResize)}
            </div>
          );
        })}

        {/* NODES */}
        {nodes.map((nd,ni)=>{
          const g=groups.find(g=>g.id===nd.gid);if(!g)return null;
          const tier=tierMap[nd.gid]||'worker';
          const t=TIERS[tier];
          const abs=nAbs(nd,groups);
          const isErr=nd.status==='error';
          const isSel=selected===nd.id;
          const sb='sb-'+t.accent.replace('#','');
          const mdl=MODELS.find(m=>m.id===nd.model)||MODELS[0];
          const nodeDelay=ni*0.04; /* stagger each node by 40ms */
          return(
            <div key={nd.id} data-node={nd.id}
              onMouseEnter={()=>setHoverNode(nd.id)}
              onMouseLeave={()=>setHoverNode(h=>h===nd.id?null:h)}
              style={{
              position:'absolute',left:abs.x,top:abs.y,width:nd.w,height:nd.h,
              background:isErr?'#1a1212':t.nodeBg,
              border:isErr?'2.5px solid #cc3333':isSel?`2.5px solid ${t.accent}`:`1px solid ${hoverNode===nd.id?t.accent+'55':t.accent+'33'}`,
              borderRadius:8,zIndex:isSel?18:12,pointerEvents:'auto',
              display:'flex',flexDirection:'column',cursor:'pointer',
              boxShadow:isErr?'0 0 30px #cc333344, inset 0 0 15px #cc333311':isSel?`0 0 30px ${t.accent}55, 0 0 8px ${t.accent}88`:hoverNode===nd.id?`0 0 12px ${t.accent}22`:'none',
              animation:loadPhase<4?(loadPhase>=2?`nodeFadeIn 0.35s ease-out ${nodeDelay}s both`:'none'):isErr?'errorPulse 3s ease infinite':'none',
              opacity:loadPhase<2?0:undefined,
              userSelect:'none',overflow:'visible',
              transition:'border 0.15s, box-shadow 0.15s',
            }}>

              {/* INNER CONTENT (clipped for border radius) */}
              <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',borderRadius:7}}>
                {/* HEADER — drag handle for moving */}
                <div data-nheader="1" style={{height:42,background:isErr?'#2a1414':t.headerBg,display:'flex',
                  alignItems:'center',padding:'0 10px',gap:6,
                  borderBottom:`1px solid ${isErr?'#cc333344':t.accent+'22'}`,flexShrink:0}}>
                  <div style={{width:9,height:9,borderRadius:5,flexShrink:0,
                    background:isErr?'#cc3333':t.accent,
                    boxShadow:`0 0 8px ${isErr?'#cc333388':t.accent+'88'}`}}/>
                  <span style={{flex:1,color:isErr?'#ff6666':t.text,fontSize:13,fontWeight:600,overflow:'hidden',
                    textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{nd.label}</span>
                  {nd.auth&&<span style={{fontSize:8,fontWeight:700,background:'#d4a03033',
                    color:'#d4a030',padding:'2px 5px',borderRadius:3,letterSpacing:1}}>AUTH</span>}
                  {isErr&&<span style={{fontSize:8,fontWeight:700,background:'#cc333333',
                    color:'#ff6666',padding:'2px 5px',borderRadius:3,letterSpacing:1}}>ERROR</span>}
                  <button onClick={e=>{e.stopPropagation();updateNode(nd.id,{status:nd.status==='ok'?'error':'ok'})}}
                    onMouseDown={e=>e.stopPropagation()}
                    style={{background:'transparent',border:'none',color:isErr?'#cc3333':t.accent,
                      fontSize:13,cursor:'pointer',padding:'0 2px',lineHeight:1}}>{isErr?'⚠':'✓'}</button>
                  <button onClick={e=>{e.stopPropagation();requestDelete(nd.id)}}
                    onMouseDown={e=>e.stopPropagation()}
                    style={{background:'transparent',border:'none',color:'#666',
                      fontSize:13,cursor:'pointer',padding:'0 2px',lineHeight:1}}>✕</button>
                </div>

                {/* Body — click opens inspection panel */}
                {!simplified&&<>
                  {/* MODEL ROW */}
                  <div style={{padding:'6px 10px',borderBottom:`1px solid ${isErr?'#cc333322':t.accent+'15'}`,
                    display:'flex',alignItems:'center',gap:8,flexShrink:0,cursor:'pointer'}}>
                    <span style={{fontSize:9,fontWeight:700,color:'#666',letterSpacing:1.5,textTransform:'uppercase'}}>MODEL</span>
                    <select value={nd.model} onChange={e=>{e.stopPropagation();updateNode(nd.id,{model:e.target.value})}}
                      onClick={e=>e.stopPropagation()}
                      style={{flex:1,background:t.nodeBg,color:mdl.color,fontSize:12,
                        padding:'3px 6px',borderRadius:4,border:`1px solid ${t.accent}22`,cursor:'pointer'}}>
                      {MODELS.map(m=><option key={m.id} value={m.id}>{m.label} ({m.cost})</option>)}
                    </select>
                  </div>
                  {/* BEHAVIOUR PROMPT — read-only display */}
                  <div className={sb} style={{flex:1,padding:'6px 10px 8px',minHeight:0,overflow:'auto',
                    overscrollBehavior:'contain'}}>
                    <span style={{fontSize:9,fontWeight:700,color:'#666',letterSpacing:1.5,marginBottom:4,
                      textTransform:'uppercase',display:'block',flexShrink:0}}>BEHAVIOUR PROMPT</span>
                    <div style={{fontSize:11,lineHeight:1.5,color:isErr?'#cc9999':t.text+'cc',
                      whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{nd.prompt}</div>
                  </div>
                </>}
              </div>

              {/* PORTS — positioned from immutable port definitions */}
              {(()=>{
                const isW=wiringFrom!==null;
                const isTarget=isW&&wiringFrom.nid!==nd.id;
                const glow=isErr?'#cc3333':t.accent;
                const HIT=30;
                const nodePortData=portsByNode[nd.id]||{};
                const ports=[];
                SIDES.forEach(side=>{
                  const slots=nodePortData[side]||[];
                  slots.forEach((slot,si)=>{
                    const isConn=slot.connected;
                    const localX=slot.x-abs.x;
                    const localY=slot.y-abs.y;
                    const col=isConn?(isErr?'#cc3333':t.accent):(isW?t.accent:'#555');
                    ports.push(
                      <div key={slot.id} data-port-id={slot.id} data-port={side} data-nid={nd.id}
                        draggable={false}
                        onDragStart={e=>e.preventDefault()}
                        style={{position:'absolute',left:localX-HIT/2,top:localY-HIT/2,
                          width:HIT,height:HIT,borderRadius:HIT/2,
                          cursor:'crosshair',zIndex:35,display:'flex',alignItems:'center',
                          justifyContent:'center',pointerEvents:'auto'}}>
                        <div style={{width:10,height:10,borderRadius:5,
                          border:`1.5px solid ${col}`,
                          background:isConn?col+'22':(isW?col+'33':'transparent'),
                          display:'flex',alignItems:'center',justifyContent:'center',
                          boxShadow:isConn?`0 0 5px ${glow}44`:'none',
                          animation:(!isConn&&isTarget)?'portPulse 1s ease infinite':'none',
                          pointerEvents:'none',
                        }}>
                          <div style={{width:4,height:4,borderRadius:2,background:col,
                            pointerEvents:'none'}}/>
                        </div>
                      </div>
                    );
                  });
                });
                return ports;
              })()}
              {nodeResizeHandles(nd.id,nd.w,nd.h,startNResize)}
            </div>
          );
        })}

        {/* SVG WIRE LAYER */}
        <svg style={{position:'absolute',left:0,top:0,width:1,height:1,
          zIndex:5,pointerEvents:'none',overflow:'visible',
          opacity:loadPhase>=3?1:0,
          animation:loadPhase>=3&&loadPhase<4?'wireFadeIn 0.6s ease-out forwards':'none'}}>
          <defs>
            <marker id="arr" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
              <path d="M0,0 L6,2.5 L0,5" fill="#666" stroke="none"/></marker>
            <marker id="arr-e" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
              <path d="M0,0 L6,2.5 L0,5" fill="#cc3333" stroke="none"/></marker>
            <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>

          {/* DYING WIRES (retract animation) */}
          {dyingWires.map((dw,i)=>(
            <path key={'die-'+i} d={dw.path} fill="none" stroke="#cc3333" strokeWidth="2.5"
              className="wire-dying" strokeLinecap="round" strokeDasharray="1000"/>
          ))}

          {/* ACTIVE WIRES — smooth bezier curves with hover highlight */}
          {wireData.map(wd=>{
            const isHov=hoverWire===wd.i;
            /* When any wire is hovered, dim all others */
            const anyHov=hoverWire!==null;
            /* Also highlight if hovered node is connected */
            const nodeHov=hoverNode!==null&&(wd.src===hoverNode||wd.tgt===hoverNode);
            const lit=isHov||nodeHov;
            const dim=anyHov&&!lit||(hoverNode!==null&&!nodeHov);
            const mainOpacity=wd.isErr?0.7:lit?0.9:dim?0.15:0.55;
            const mainWidth=wd.isErr?2:lit?2.8:1.6;
            const flowOpacity=lit?1:dim?0.2:0.8;
            return(
            <g key={wd.i}
              onMouseEnter={()=>setHoverWire(wd.i)}
              onMouseLeave={()=>setHoverWire(h=>h===wd.i?null:h)}>
              {/* subtle shadow — brighter on hover */}
              <path d={wd.path} fill="none" stroke={wd.isErr?'#cc3333':wd.accent}
                strokeWidth={lit?6:4} opacity={lit?0.12:dim?0.02:0.06}
                pointerEvents="none" strokeLinecap="round"/>
              {/* wide invisible hit area for hover detection */}
              <path d={wd.path} fill="none" stroke="transparent" strokeWidth="14"
                style={{pointerEvents:'stroke',cursor:'pointer'}}
                data-wire={wd.i}/>
              {/* main cable */}
              <path d={wd.path} fill="none" stroke={wd.isErr?'#cc3333':wd.accent}
                strokeWidth={mainWidth}
                strokeDasharray={wd.isErr?'6 4':'none'} opacity={mainOpacity}
                markerEnd={wd.isErr?'url(#arr-e)':'url(#arr)'}
                pointerEvents="none" strokeLinecap="round"
                style={{transition:'opacity 0.15s, stroke-width 0.15s'}}/>
              {/* flow particles */}
              {!wd.isErr&&(
                <path d={wd.path} fill="none" stroke={wd.accent} className="wire-flow"
                  strokeWidth={lit?3:2.2} strokeDasharray="4 18" opacity={flowOpacity}
                  strokeLinecap="round" pointerEvents="none"
                  style={{transition:'opacity 0.15s'}}/>
              )}
            </g>);
          })}

          {/* TEMPORARY WIRE — uses wiringFrom.portPos (captured at mousedown) */}
          {wiringFrom&&wiringMouse&&wiringFrom.portPos&&(()=>{
            const srcN=nodes.find(n=>n.id===wiringFrom.nid);
            if(!srcN)return null;
            const pp=wiringFrom.portPos;
            const srcTier=tierMap[srcN.gid]||'worker';
            const accent=wiringFrom.isDragDisconnect?'#cc3333':TIERS[srcTier].accent;
            const mx=wiringMouse.x,my=wiringMouse.y;
            /* Use snap target's side if snapped, otherwise opposite of source */
            const tgtSide=wiringMouse.side||oppositeSide(wiringFrom.side);
            /* Direct Bézier preview wire */
            const path=makeSimpleBezier(pp.x,pp.y,mx,my,wiringFrom.side,tgtSide);
            return(
              <g>
                <circle cx={pp.x} cy={pp.y} r="5" fill={accent} opacity="0.9"/>
                <path d={path} fill="none" stroke={accent} strokeWidth="2" opacity="0.7"
                  strokeLinecap="round"
                  strokeDasharray={wiringFrom.isDragDisconnect?'6 4':'none'}/>
                <circle cx={mx} cy={my} r="4" fill={accent} opacity="0.6"
                  stroke={accent} strokeWidth="1" strokeOpacity="0.3"/>
              </g>
            );
          })()}

          {/* DEBUG OVERLAY — press D to toggle. Shows all anchor sources. */}
          {debugPorts&&(()=>{
            const marks=[];
            /* Cyan rings: visible marker centres from portsByNode */
            nodes.forEach(nd=>{
              const np=portsByNode[nd.id];if(!np)return;
              ['right','left','top','bottom'].forEach(side=>{
                (np[side]||[]).forEach((slot,i)=>{
                  marks.push(<circle key={`mc-${nd.id}-${side}-${i}`}
                    cx={slot.x} cy={slot.y} r="6" fill="none" stroke="cyan" strokeWidth="1" opacity="0.9"/>);
                });
              });
            });
            /* Red dots: wire anchors from portMap (src + tgt endpoints) */
            wireData.forEach(wd=>{
              marks.push(<circle key={`ws-${wd.i}`} cx={wd.pA.x} cy={wd.pA.y} r="3" fill="red" opacity="0.8"/>);
              marks.push(<circle key={`wt-${wd.i}`} cx={wd.pB.x} cy={wd.pB.y} r="3" fill="red" opacity="0.8"/>);
            });
            /* Yellow diamond: preview wire anchor from wiringFrom.portPos */
            if(wiringFrom&&wiringFrom.portPos){
              const p=wiringFrom.portPos;
              marks.push(<rect key="prev" x={p.x-4} y={p.y-4} width={8} height={8}
                fill="yellow" opacity="0.9" transform={`rotate(45 ${p.x} ${p.y})`}/>);
            }
            /* Magenta cross: snap target (wiringMouse when snapped to a port) */
            if(wiringFrom&&wiringMouse&&wiringMouse.nid){
              marks.push(<line key="sx" x1={wiringMouse.x-5} y1={wiringMouse.y} x2={wiringMouse.x+5} y2={wiringMouse.y} stroke="magenta" strokeWidth="2" opacity="0.9"/>);
              marks.push(<line key="sy" x1={wiringMouse.x} y1={wiringMouse.y-5} x2={wiringMouse.x} y2={wiringMouse.y+5} stroke="magenta" strokeWidth="2" opacity="0.9"/>);
            }
            return marks;
          })()}
        </svg>
      </div>

      {/* ZOOM CONTROLS */}
      <div style={{position:'absolute',bottom:20,left:20,display:'flex',flexDirection:'column',
        gap:4,zIndex:50,pointerEvents:'auto'}}>
        {[{l:'+',f:zoomIn},{l:`${Math.round(zoom*100)}%`,f:null},{l:'−',f:zoomOut},{l:'⟳',f:zoomReset}].map((b,i)=>(
          <button key={i} onClick={b.f} style={{
            width:40,height:b.l.length>2?28:32,background:'#252525',border:'1px solid #333',
            borderRadius:6,color:'#aaa',fontSize:b.l.length>2?10:16,cursor:b.f?'pointer':'default',
            display:'flex',alignItems:'center',justifyContent:'center',fontWeight:600
          }}>{b.l}</button>
        ))}
      </div>

      {/* WIRING STATUS BAR */}
      {wiringFrom&&(()=>{
        const nd=nodes.find(n=>n.id===wiringFrom.nid);
        return(
          <div style={{position:'absolute',bottom:0,left:0,right:0,height:36,zIndex:50,
            background:'#252525ee',display:'flex',alignItems:'center',justifyContent:'center',
            borderTop:'1px solid #333',fontSize:12,color:'#78c0f0'}}>
            Wiring from <strong style={{margin:'0 5px'}}>{nd?.label||wiringFrom.nid}</strong> — click a target port to connect
          </div>
        );
      })()}

      {/* SIDE PANEL — Live inspection layer */}
      {panelNode&&(()=>{
        const nd=nodes.find(n=>n.id===panelNode);
        if(!nd)return null;
        const tier=tierMap[nd.gid]||'worker';
        const t=TIERS[tier];
        const isErr=nd.status==='error';
        return <LivePanel nd={nd} tier={tier} t={t} isErr={isErr}
          wires={wires} nodes={nodes} groups={groups} updateNode={updateNode}
          onClose={()=>{setPanelNode(null);setSelected(null)}}/>;
      })()}

      {/* DELETE CONFIRMATION MODAL */}
      {modal&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <h3>Confirm Deletion</h3>
            <p>{modal.msg}</p>
            <div className="btn-row">
              <button onClick={()=>setModal(null)}>Cancel</button>
              <button className="danger" onClick={modal.onConfirm}>Remove Node</button>
            </div>
          </div>
        </div>
      )}

      {/* NODE CREATION WIZARD */}
      {wizard&&(()=>{
        const w=wizard;
        const tier=w.tier||'worker';
        const t=TIERS[tier];
        const canCreate=w.name.trim()&&w.prompt.trim();
        const TIER_DESC={orchestrator:'Top-level coordinator',manager:'Domain manager',worker:'Task executor',infra:'Infrastructure service'};
        const wizUpdate=patch=>setWizard(wz=>({...wz,...patch}));
        const doCreate=()=>{
          if(!canCreate)return;
          const id=newId();
          const gid=w.gid;
          /* If tier changed from group's tier, find/create matching group */
          let targetGid=gid;
          const gTier=tierMap[gid];
          if(gTier!==tier){
            const existing=groups.find(g=>tierMap[g.id]===tier);
            if(existing)targetGid=existing.id;
            else{
              targetGid=tier+'-'+Date.now();
              const maxX=groups.reduce((mx,g)=>Math.max(mx,g.x+g.w),0);
              setGroups(gs=>pushGroups(targetGid,[...gs,{id:targetGid,label:tier.charAt(0).toUpperCase()+tier.slice(1),tier,x:maxX+60,y:100,w:420,h:320}]));
              tierMap[targetGid]=tier;
            }
          }
          const prompt=w.constraints?w.prompt.trim()+'\n\nConstraints: '+w.constraints.trim():w.prompt.trim();
          setNodes(ns=>[...ns,{id,gid:targetGid,label:w.name.trim(),x:30,y:30,w:NW,h:NH,model:w.model,status:'ok',auth:false,prompt}]);
          setWizard(null);
          setSelected(id);
          setPanelNode(id);
        };
        return(
          <div className="wiz-overlay" onClick={()=>setWizard(null)}>
            <div className="wiz-box" onClick={e=>e.stopPropagation()}>
              <div className="wiz-hdr">
                <div style={{width:10,height:10,borderRadius:5,background:t.accent,boxShadow:`0 0 8px ${t.accent}66`}}/>
                <h3>Create New Node</h3>
                <button onClick={()=>setWizard(null)} style={{background:'none',border:'none',color:'#666',fontSize:16,cursor:'pointer',padding:0}}>✕</button>
              </div>
              <div className="wiz-body">
                {/* NAME */}
                <div className="wiz-field">
                  <label>Node Name</label>
                  <input autoFocus value={w.name} onChange={e=>wizUpdate({name:e.target.value})}
                    placeholder="e.g. Sentiment analyzer" spellCheck="false"/>
                </div>

                {/* ROLE / TIER */}
                <div className="wiz-field">
                  <label>Role</label>
                  <div className="wiz-tier-grid">
                    {Object.keys(TIERS).map(tk=>{
                      const tt=TIERS[tk];
                      const sel=tier===tk;
                      return(
                        <div key={tk} className="wiz-tier-btn" onClick={()=>wizUpdate({tier:tk})}
                          style={{background:tt.nodeBg,borderColor:sel?tt.accent:'transparent'}}>
                          <span className="wiz-tier-name" style={{color:tt.text}}>{tk.charAt(0).toUpperCase()+tk.slice(1)}</span>
                          <span className="wiz-tier-desc" style={{color:tt.text}}>{TIER_DESC[tk]}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* MODEL */}
                <div className="wiz-field">
                  <label>Model</label>
                  <div className="wiz-model-grid">
                    {MODELS.map(m=>{
                      const sel=w.model===m.id;
                      return(
                        <div key={m.id} className="wiz-model-btn" onClick={()=>wizUpdate({model:m.id})}
                          style={{borderColor:sel?m.color:'transparent'}}>
                          <span className="wiz-m-name" style={{color:sel?m.color:'#aaa'}}>{m.label}</span>
                          <span className="wiz-m-cost">{m.cost}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* BEHAVIOUR PROMPT */}
                <div className="wiz-field">
                  <label>Behaviour Prompt</label>
                  <textarea value={w.prompt} onChange={e=>wizUpdate({prompt:e.target.value})}
                    placeholder="Define what this node does, how it processes inputs, and what it outputs..."
                    spellCheck="false"/>
                </div>

                {/* CONSTRAINTS */}
                <div className="wiz-field">
                  <label>Constraints (optional)</label>
                  <textarea value={w.constraints} onChange={e=>wizUpdate({constraints:e.target.value})}
                    placeholder="e.g. Max 5% per trade, no override, must log all decisions..."
                    style={{minHeight:50}} spellCheck="false"/>
                </div>
              </div>
              <div className="wiz-foot">
                <button onClick={()=>setWizard(null)}>Cancel</button>
                <button className="primary" disabled={!canCreate} onClick={doCreate}
                  style={{color:canCreate?t.accent:'#666'}}>Create Node</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* ── RESIZE HANDLES ── */
function resizeHandles(id,onStart){
  const s=12;
  return[
    {k:'nw',s:{top:-3,left:-3,width:s,height:s,cursor:'nwse-resize'}},
    {k:'ne',s:{top:-3,right:-3,width:s,height:s,cursor:'nesw-resize'}},
    {k:'sw',s:{bottom:-3,left:-3,width:s,height:s,cursor:'nesw-resize'}},
    {k:'se',s:{bottom:-3,right:-3,width:s,height:s,cursor:'nwse-resize'}},
    {k:'n',s:{top:-3,left:s,right:s,height:s,cursor:'ns-resize'}},
    {k:'s',s:{bottom:-3,left:s,right:s,height:s,cursor:'ns-resize'}},
    {k:'w',s:{top:s,bottom:s,left:-3,width:s,cursor:'ew-resize'}},
    {k:'e',s:{top:s,bottom:s,right:-3,width:s,cursor:'ew-resize'}},
  ].map(h=><div key={h.k} onMouseDown={e=>onStart(e,id,h.k)}
    style={{position:'absolute',...h.s,zIndex:20,pointerEvents:'auto'}}/>);
}
function nodeResizeHandles(id,w,h,onStart){
  const s=8;
  return[
    {k:'nw',s:{top:0,left:0,width:s,height:s,cursor:'nwse-resize'}},
    {k:'ne',s:{top:0,right:0,width:s,height:s,cursor:'nesw-resize'}},
    {k:'sw',s:{bottom:0,left:0,width:s,height:s,cursor:'nesw-resize'}},
    {k:'se',s:{bottom:0,right:0,width:s,height:s,cursor:'nwse-resize'}},
    {k:'n',s:{top:0,left:s,right:s,height:s,cursor:'ns-resize'}},
    {k:'s',s:{bottom:0,left:s,right:s,height:s,cursor:'ns-resize'}},
    {k:'w',s:{top:s,bottom:s,left:0,width:s,cursor:'ew-resize'}},
    {k:'e',s:{top:s,bottom:s,right:0,width:s,cursor:'ew-resize'}},
  ].map(h=><div key={h.k} onMouseDown={e=>onStart(e,id,h.k)}
    style={{position:'absolute',...h.s,zIndex:6,pointerEvents:'auto'}}/>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
